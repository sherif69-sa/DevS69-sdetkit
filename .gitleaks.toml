title = "sdetkit gitleaks config"

[allowlist]
description = "Allow known test fixtures and documentation placeholders"
paths = [
  '''^tests/''',
  '''^docs/artifacts/''',
  '''^docs/day-[0-9]+-ultra-upgrade-report\.md$''',
  '''^docs/contributor-funnel\.md$''',
]
regexes = [
  '''TOPSECRET''',
  '''SHOULD_NOT_LEAK''',
  '''super-secret''',
  '''token=abc''',
  '''bearer:TOPSECRET''',
]
