name: Secret Protection Review Bot

on:
  workflow_dispatch:
  schedule:
    - cron: "45 6 * * 6"

permissions:
  contents: read
  issues: write
  security-events: read

jobs:
  secret-protection-review:
    runs-on: ubuntu-latest
    steps:
      - name: Review secret protection posture and backlog
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
        env:
          GHAS_TOKEN: ${{ secrets.GHAS_READ_TOKEN }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const weekOf = new Date().toISOString().slice(0, 10);
            const labels = [
              { name: 'maintenance', color: '0E8A16', description: 'Automated maintenance tracking' },
              { name: 'security', color: 'b60205', description: 'Security operations and hardening work' },
              { name: 'ghas', color: '5319e7', description: 'GitHub Advanced Security automation and triage' },
              { name: 'priority:medium', color: 'fbca04', description: 'Medium-priority work item' },
            ];

            for (const label of labels) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name: label.name });
              } catch {
                await github.rest.issues.createLabel({ owner, repo, ...label });
              }
            }

            const ghasToken = process.env.GHAS_TOKEN || github.token;
            const headers = {
              accept: 'application/vnd.github+json',
              authorization: `Bearer ${ghasToken}`,
              'x-github-api-version': '2022-11-28',
            };
            const notes = [];
            const dayMs = 24 * 60 * 60 * 1000;

            async function fetchConfiguration() {
              try {
                const response = await github.request('GET /repos/{owner}/{repo}/code-security-configuration', {
                  owner,
                  repo,
                  headers,
                });
                return response.data;
              } catch (error) {
                notes.push(`Repository security configuration unavailable: ${error.message}`);
                return null;
              }
            }

            async function fetchSecretAlerts() {
              try {
                return await github.paginate('GET /repos/{owner}/{repo}/secret-scanning/alerts', {
                  owner,
                  repo,
                  state: 'open',
                  per_page: 100,
                  headers,
                });
              } catch (error) {
                notes.push(`Secret scanning alerts unavailable: ${error.message}. Add GHAS_READ_TOKEN if broader security scopes are required.`);
                return [];
              }
            }

            function ageDays(alert) {
              const raw = alert.created_at || alert.updated_at || alert.resolved_at;
              const at = new Date(raw).getTime();
              if (!Number.isFinite(at)) return 0;
              return Math.max(0, Math.floor((Date.now() - at) / dayMs));
            }

            function ageBuckets(alerts) {
              const buckets = { '0-6d': 0, '7-13d': 0, '14-29d': 0, '30+d': 0 };
              for (const alert of alerts) {
                const age = ageDays(alert);
                if (age >= 30) buckets['30+d'] += 1;
                else if (age >= 14) buckets['14-29d'] += 1;
                else if (age >= 7) buckets['7-13d'] += 1;
                else buckets['0-6d'] += 1;
              }
              return buckets;
            }

            function topSecretTypes(alerts) {
              const counts = new Map();
              for (const alert of alerts) {
                const key = alert.secret_type_display_name || alert.secret_type || 'unknown';
                counts.set(key, (counts.get(key) || 0) + 1);
              }
              return [...counts.entries()]
                .sort((a, b) => b[1] - a[1] || String(a[0]).localeCompare(String(b[0])))
                .slice(0, 5);
            }

            const configuration = await fetchConfiguration();
            const secretAlerts = await fetchSecretAlerts();
            const bypassedAlerts = secretAlerts.filter((alert) => alert.push_protection_bypassed === true);
            const topTypes = topSecretTypes(secretAlerts);
            const configRows = [
              ['secret_scanning', 'Secret scanning'],
              ['secret_scanning_push_protection', 'Push protection'],
              ['secret_scanning_validity_checks', 'Validity checks'],
              ['secret_scanning_non_provider_patterns', 'Non-provider patterns'],
              ['secret_scanning_generic_secrets', 'Generic secrets'],
              ['secret_scanning_delegated_alert_dismissal', 'Delegated alert dismissal'],
              ['secret_scanning_delegated_bypass', 'Delegated bypass'],
            ].map(([key, label]) => {
              const raw = configuration && Object.prototype.hasOwnProperty.call(configuration, key)
                ? configuration[key]
                : null;
              return `- ${label}: **${raw ?? 'unavailable'}**`;
            });
            const delegatedBypassReviewersLine = configuration && Array.isArray(configuration.secret_scanning_delegated_bypass_options?.reviewers)
              ? `- Delegated bypass reviewers: **${configuration.secret_scanning_delegated_bypass_options.reviewers.length}**`
              : '- Delegated bypass reviewers: unavailable.';
            const configSection = configuration
              ? [
                `- Attached configuration: **${configuration.name || 'attached'}**`,
                ...configRows,
                delegatedBypassReviewersLine,
              ]
              : [
                '- Repository code security configuration was not visible via API for this run.',
                '- Configuration detail rows are omitted until code-security configuration access is available.',
              ];

            const title = `🔑 Secret protection review (${weekOf})`;
            const body = [
              'This issue is auto-generated to keep newer GitHub secret protection controls visible, owned, and tied to the open secret-scanning queue.',
              '',
              '## Open secret alert review',
              `- Open secret scanning alerts: **${secretAlerts.length}**`,
              `- Push-protection bypass follow-up alerts: **${bypassedAlerts.length}**`,
              `- Alert age buckets: \`${JSON.stringify(ageBuckets(secretAlerts))}\``,
              '',
              '## Most common open secret types',
              ...(topTypes.length
                ? topTypes.map(([name, count]) => `- **${name}**: ${count}`)
                : ['- No open secret alerts were returned for this repository.']),
              '',
              '## Repository secret protection configuration',
              ...configSection,
              '',
              '## Suggested weekly follow-up',
              '- [ ] Review every push-protection bypass alert the same week it appears and record disposition/owner.',
              '- [ ] Confirm validity checks and generic/non-provider coverage still match the repo risk profile.',
              '- [ ] Verify delegated bypass and delegated dismissal settings still match the current operating model.',
              '- [ ] Link any resulting remediation PR or tracking issue back to this review issue.',
              '',
              '## Review links',
              `- Secret scanning: https://github.com/${owner}/${repo}/security/secret-scanning`,
              `- Security overview: https://github.com/${owner}/${repo}/security`,
              '',
              '## Notes',
              ...(notes.length ? notes.map((note) => `- ${note}`) : ['- Secret protection APIs responded without fallback warnings.']),
            ].join('\n');

            const openIssues = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              labels: 'ghas',
              per_page: 100,
            });
            const priorIssues = openIssues.data.filter((issue) => issue.title.startsWith('🔑 Secret protection review'));

            for (const oldIssue of priorIssues) {
              if (oldIssue.title !== title) {
                await github.rest.issues.update({ owner, repo, issue_number: oldIssue.number, state: 'closed' });
              }
            }

            const existing = priorIssues.find((issue) => issue.title === title);
            if (existing) {
              await github.rest.issues.update({ owner, repo, issue_number: existing.number, body });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
                labels: ['maintenance', 'security', 'ghas', 'priority:medium'],
              });
            }
