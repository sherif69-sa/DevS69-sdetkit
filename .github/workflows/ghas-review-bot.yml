# Local equivalent command:
#   python -m sdetkit workflow-governance-report --root . --format text
#   See docs/ci/workflow-local-equivalents.md#ghas-review-bot for workflow-specific operator notes.
name: GHAS Review Bot

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * 2"

permissions:
  actions: read
  contents: read
  issues: write
  security-events: read

jobs:
  ghas-review-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - name: Build and publish GHAS digest
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
        env:
          GHAS_TOKEN: ${{ secrets.GHAS_READ_TOKEN }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const {
              collectedAlerts,
              unavailableAlerts,
              digestAlertMetrics,
            } = require(`${process.env.GITHUB_WORKSPACE}/scripts/ghas_tracker_state.js`);
            const weekOf = new Date().toISOString().slice(0, 10);
            const labels = [
              { name: 'maintenance', color: '0E8A16', description: 'Automated maintenance tracking' },
              { name: 'security', color: 'b60205', description: 'Security operations and hardening work' },
              { name: 'ghas', color: '5319e7', description: 'GitHub Advanced Security automation and triage' },
              { name: 'priority:high', color: 'd93f0b', description: 'High-priority work item' },
            ];

            for (const label of labels) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name: label.name });
              } catch {
                await github.rest.issues.createLabel({ owner, repo, ...label });
              }
            }

            const fallbackNotes = [];
            const dayMs = 24 * 60 * 60 * 1000;
            const trackedWorkflows = [
              { file: 'security.yml', maxAgeDays: 14 },
              { file: 'osv-scanner.yml', maxAgeDays: 14 },
              { file: 'dependency-audit.yml', maxAgeDays: 14 },
              { file: 'security-maintenance-bot.yml', maxAgeDays: 14 },
              { file: 'dependency-auto-merge.yml', maxAgeDays: 14 },
              { file: 'sbom.yml', maxAgeDays: 14 },
              { file: 'ghas-review-bot.yml', maxAgeDays: 14 },
              { file: 'ghas-campaign-bot.yml', maxAgeDays: 14 },
              { file: 'ghas-alert-sla-bot.yml', maxAgeDays: 14 },
              { file: 'ghas-metrics-export-bot.yml', maxAgeDays: 14 },
              { file: 'security-configuration-audit-bot.yml', maxAgeDays: 35 },
              { file: 'secret-protection-review-bot.yml', maxAgeDays: 14 },
              { file: 'dependency-review.yml', maxAgeDays: 14 },
              { file: 'dependency-radar-bot.yml', maxAgeDays: 14 },
            ];

            const workflowRows = [];
            const ageInDays = (isoAt) => {
              const at = new Date(isoAt || '').getTime();
              if (!Number.isFinite(at)) {
                return null;
              }
              return Math.max(0, Math.floor((Date.now() - at) / dayMs));
            };
            for (const trackedWorkflow of trackedWorkflows) {
              const workflowFile = trackedWorkflow.file;
              try {
                const runs = await github.rest.actions.listWorkflowRuns({
                  owner,
                  repo,
                  workflow_id: workflowFile,
                  per_page: 1,
                });
                const latest = runs.data.workflow_runs?.[0];
                const ageDays = ageInDays(latest?.updated_at);
                workflowRows.push({
                  workflow: workflowFile,
                  status: latest ? (latest.conclusion || latest.status || 'unknown') : 'no-runs',
                  updatedAt: latest?.updated_at || 'n/a',
                  ageDays,
                  maxAgeDays: trackedWorkflow.maxAgeDays,
                  stale: ageDays !== null ? ageDays >= trackedWorkflow.maxAgeDays : null,
                  url: latest?.html_url || `https://github.com/${owner}/${repo}/actions/workflows/${workflowFile}`,
                });
              } catch (error) {
                workflowRows.push({
                  workflow: workflowFile,
                  status: 'inspection-failed',
                  updatedAt: 'n/a',
                  ageDays: null,
                  maxAgeDays: trackedWorkflow.maxAgeDays,
                  stale: null,
                  url: `https://github.com/${owner}/${repo}/actions/workflows/${workflowFile}`,
                });
                fallbackNotes.push(`Unable to inspect ${workflowFile}: ${error.message}`);
              }
            }

            const ghasToken = process.env.GHAS_TOKEN || github.token;
            const headers = {
              accept: 'application/vnd.github+json',
              authorization: `Bearer ${ghasToken}`,
              'x-github-api-version': '2022-11-28',
            };

            async function fetchAlerts(path, label, priority = 'open') {
              try {
                const response = await github.request(`GET ${path}`, {
                  owner,
                  repo,
                  state: priority,
                  per_page: 100,
                  headers,
                });
                return collectedAlerts(response.data, label);
              } catch (error) {
                return unavailableAlerts(label, error);
              }
            }

            const codeScanning = await fetchAlerts('/repos/{owner}/{repo}/code-scanning/alerts', 'Code scanning');
            const dependabot = await fetchAlerts('/repos/{owner}/{repo}/dependabot/alerts', 'Dependabot alerts');
            const secretScanning = await fetchAlerts('/repos/{owner}/{repo}/secret-scanning/alerts', 'Secret scanning alerts');
            const digestMetrics = digestAlertMetrics(codeScanning, dependabot, secretScanning);

            for (const result of [codeScanning, dependabot, secretScanning]) {
              if (result.note) {
                fallbackNotes.push(
                  `${result.note}. Add secret GHAS_READ_TOKEN for private security APIs if needed.`
                );
              }
            }

            const digestTitle = `🛡️ GHAS weekly digest (${weekOf})`;
            const digestBody = [
              'This issue is auto-generated to keep GitHub Advanced Security review visible and actionable.',
              '',
              '## Alert totals',
              `- Open code scanning alerts: **${digestMetrics.codeScanning}**`,
              `- Open Dependabot alerts: **${digestMetrics.dependabot}**`,
              `- Open secret scanning alerts: **${digestMetrics.secretScanning}**`,
              `- Secret scanning review queue (push-protection/bypass follow-up): **${digestMetrics.pushProtectionBypassed}**`,
              '',
              '## Collection status',
              `- Code scanning: **${codeScanning.status}**`,
              `- Dependabot: **${dependabot.status}**`,
              `- Secret scanning: **${secretScanning.status}**`,
              '',
              '## Review links',
              `- Code scanning: https://github.com/${owner}/${repo}/security/code-scanning`,
              `- Dependabot: https://github.com/${owner}/${repo}/security/dependabot`,
              `- Secret scanning: https://github.com/${owner}/${repo}/security/secret-scanning`,
              `- Security overview: https://github.com/${owner}/${repo}/security`,
              '',
              '## Workflow freshness',
              '| Workflow | Latest result | Updated at | Age (days) | Maximum age (days) | Stale | Link |',
              '| --- | --- | --- | --- | --- | --- | --- |',
              ...workflowRows.map((row) => `| ${row.workflow} | ${row.status} | ${row.updatedAt} | ${row.ageDays ?? 'n/a'} | ${row.maxAgeDays} | ${row.stale === null ? 'n/a' : (row.stale ? 'yes' : 'no')} | [open](${row.url}) |`),
              '',
              '## Required follow-up',
              '- [ ] Review every open GHAS alert and document disposition for anything that is still open at the end of the week.',
              '- [ ] Create or refresh a security campaign for any alert slice that remains open for 14+ days.',
              '- [ ] Use Copilot Autofix or targeted remediation PRs where CodeQL findings support it, then validate in CI.',
              '- [ ] Convert repeat offenders into issues or PRs with owners and rollback notes.',
              '- [ ] Escalate any new high-severity finding into the weekly maintenance issue.',
              '',
              '## Notes',
              ...(fallbackNotes.length ? fallbackNotes.map((note) => `- ${note}`) : ['- GHAS API queries completed without fallback warnings.']),
            ].join('\n');

            const openIssues = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              labels: 'ghas',
              per_page: 100,
            });
            const priorDigests = openIssues.data.filter((issue) => issue.title.startsWith('🛡️ GHAS weekly digest'));

            for (const oldIssue of priorDigests) {
              if (oldIssue.title !== digestTitle) {
                await github.rest.issues.update({ owner, repo, issue_number: oldIssue.number, state: 'closed' });
              }
            }

            const existing = priorDigests.find((issue) => issue.title === digestTitle);
            if (existing) {
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: existing.number,
                body: digestBody,
              });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title: digestTitle,
                body: digestBody,
                labels: ['maintenance', 'security', 'ghas', 'priority:high'],
              });
            }
