name: Formatter benchmark diagnosis

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnose-focused-proof:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: feature/formatter-candidate-benchmark

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.12"

      - name: Install focused proof dependencies
        run: |
          python -m pip install -q --upgrade pip
          python -m pip install -q -c constraints-ci.txt -e .[dev,test]

      - name: Run focused proof and retain diagnostics
        id: focused
        shell: bash
        run: |
          python -m ruff check --fix \
            src/sdetkit/formatter_candidate_benchmark.py \
            tests/test_formatter_candidate_benchmark.py
          python -m ruff format \
            src/sdetkit/formatter_candidate_benchmark.py \
            tests/test_formatter_candidate_benchmark.py
          set +e
          python -m pytest -q \
            tests/test_formatter_candidate_benchmark.py \
            tests/test_remediation_research_contract.py \
            tests/test_platform_capability_matrix.py \
            -o addopts= \
            > formatter-benchmark-focused.log 2>&1
          rc=$?
          set -e
          printf '%s\n' "$rc" > formatter-benchmark-focused.rc
          echo "rc=$rc" >> "$GITHUB_OUTPUT"

      - name: Upload focused diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: formatter-benchmark-focused-diagnostics
          path: |
            formatter-benchmark-focused.log
            formatter-benchmark-focused.rc
          if-no-files-found: error
          retention-days: 7

      - name: Preserve focused result
        if: always()
        run: exit "${{ steps.focused.outputs.rc || '1' }}"
