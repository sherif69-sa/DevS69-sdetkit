name: maintenance-issue-command-center

on:
  schedule:
    - cron: '17 6 * * *'
  workflow_dispatch:

env:
  COMMAND_CENTER_TITLE: "🧠 Maintenance command center (rolling)"
  MAX_OPEN_BOT_TRACKERS: "4"

permissions:
  contents: write
  issues: write

jobs:
  command-center:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'

      - name: Build doctor + adaptive reviewer snapshots
        run: |
          mkdir -p build/maintenance
          PYTHONPATH=src python -m sdetkit doctor --format json --out build/maintenance/doctor.json || true
          PYTHONPATH=src python -m sdetkit review . --no-workspace --format json > build/maintenance/review.json || true

      - name: Update command center, close overflow trackers, and learn from problems
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PYTHONPATH=src python tools/maintenance_command_center.py \
            --owner "${{ github.repository_owner }}" \
            --repo "${{ github.event.repository.name }}" \
            --token "${GH_TOKEN}" \
            --command-center-title "${COMMAND_CENTER_TITLE}" \
            --max-open-trackers "${MAX_OPEN_BOT_TRACKERS}" \
            --doctor-json build/maintenance/doctor.json \
            --review-json build/maintenance/review.json \
            --db-path .sdetkit/maintenance/issue-learning-db.jsonl \
            --rollup-path .sdetkit/maintenance/issue-learning-rollup.json

      - name: Commit learning DB refresh
        run: |
          if git diff --quiet -- .sdetkit/maintenance/issue-learning-db.jsonl .sdetkit/maintenance/issue-learning-rollup.json; then
            echo "No learning DB updates to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .sdetkit/maintenance/issue-learning-db.jsonl .sdetkit/maintenance/issue-learning-rollup.json
          git commit -m "chore(maintenance): update issue learning db"
          git push
