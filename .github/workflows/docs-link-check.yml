# Local equivalent command:
#   python -m sdetkit workflow-governance-report --root . --format text
#   See docs/ci/workflow-local-equivalents.md#docs-link-check for workflow-specific operator notes.
name: Docs Link Check

on:
  pull_request:
    paths:
      - "README.md"
      - "docs/**"
      - ".github/workflows/docs-link-check.yml"
  push:
    branches: [main]
    paths:
      - "README.md"
      - "docs/**"
      - ".github/workflows/docs-link-check.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-link-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs-link-check:
    name: Validate Markdown links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run lychee link checker
        uses: lycheeverse/lychee-action@e7477775783ea5526144ba13e8db5eec57747ce8 # v2.9.0
        with:
          fail: true
          args: >-
            --verbose
            --no-progress
            --accept 200,429
            --max-concurrency 12
            README.md docs/**/*.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
