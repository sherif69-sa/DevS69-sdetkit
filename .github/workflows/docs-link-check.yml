# Local equivalent command:
#   python -m sdetkit workflow-governance-report --root . --format text
#   See docs/ci/workflow-local-equivalents.md#docs-link-check for workflow-specific operator notes.
name: Docs Link Check

on:
  pull_request:
    paths:
      - "README.md"
      - "docs/**"
      - ".github/workflows/docs-link-check.yml"
  push:
    branches: [main]
    paths:
      - "README.md"
      - "docs/**"
      - ".github/workflows/docs-link-check.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-link-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs-link-check:
    name: Validate Markdown links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Run lychee link checker
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          fail: true
          args: >-
            --verbose
            --no-progress
            --accept 200,429
            --max-concurrency 12
            README.md docs/**/*.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
