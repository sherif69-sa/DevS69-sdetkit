# Local equivalent command:
#   python -m sdetkit workflow-governance-report --root . --format text
#   See docs/ci/workflow-local-equivalents.md#adaptive-ops-weekly for workflow-specific operator notes.
name: adaptive-ops-weekly

on:
  schedule:
    - cron: "15 3 * * 1"
  workflow_dispatch:
    inputs:
      adaptive_scenario:
        description: "Scenario profile (fast|balanced|strict)"
        required: false
        default: "balanced"

permissions:
  contents: read

jobs:
  adaptive-ops:
    runs-on: ubuntu-latest
    env:
      ADAPTIVE_SCENARIO: ${{ github.event.inputs.adaptive_scenario || 'balanced' }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"

      - name: Install repo
        run: |
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install -c constraints-ci.txt -e .[dev,test,docs]

      - name: Build adaptive ops bundle
        shell: bash
        run: |
          set -euo pipefail
          DATE_TAG="$(date -u +%F)"
          make adaptive-ops-bundle DATE_TAG="$DATE_TAG" ADAPTIVE_SCENARIO="$ADAPTIVE_SCENARIO"

      - name: Upload adaptive artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: adaptive-ops-${{ github.run_id }}
          retention-days: 7
          path: |
            docs/artifacts/adaptive-postcheck-*.json
            docs/artifacts/adaptive-scenario-database-*.json
            docs/artifacts/adaptive-ops-summary-*.md
            docs/artifacts/adaptive-ops-summary-*.json
