name: Temporary formatter observation product control

on:
  pull_request:
    types: [opened, reopened]

permissions:
  contents: write

jobs:
  align-and-prove:
    if: github.event.pull_request.head.ref == 'agent/formatter-proposal-observation-product-control'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: '3.12'
          cache: pip

      - name: Apply deterministic alignment
        run: |
          set -euo pipefail
          python scripts/apply_formatter_observation_portfolio_alignment.py
          python scripts/apply_formatter_observation_matrix_alignment.py
          python scripts/apply_formatter_observation_roadmap_delta.py
          python scripts/apply_formatter_observation_operator_delta.py
          python scripts/apply_formatter_observation_navigation.py

      - name: Install constrained proof environment
        run: |
          set -euo pipefail
          python -m pip install -c constraints-ci.txt -e '.[dev,test,docs]'

      - name: Run focused proof
        run: |
          set -euo pipefail
          python -m ruff format \
            src/sdetkit/product_maturity_radar_portfolio.py \
            tests/test_product_maturity_radar_portfolio.py \
            tests/test_platform_capability_matrix.py
          python -m ruff check \
            src/sdetkit/product_maturity_radar_portfolio.py \
            tests/test_product_maturity_radar_portfolio.py \
            tests/test_platform_capability_matrix.py
          python -m ruff format --check \
            src/sdetkit/product_maturity_radar_portfolio.py \
            tests/test_product_maturity_radar_portfolio.py \
            tests/test_platform_capability_matrix.py
          python -m mypy src/sdetkit/product_maturity_radar_portfolio.py
          python -m pytest -q \
            tests/test_formatter_policy_proposal_observation.py \
            tests/test_platform_capability_matrix.py \
            tests/test_product_maturity_radar_portfolio.py \
            -o addopts=
          NO_MKDOCS_2_WARNING=1 python -m mkdocs build --strict

      - name: Remove one-use helpers and push review head
        run: |
          set -euo pipefail
          rm -f \
            scripts/apply_formatter_observation_portfolio_alignment.py \
            scripts/apply_formatter_observation_matrix_alignment.py \
            scripts/apply_formatter_observation_roadmap_delta.py \
            scripts/apply_formatter_observation_operator_delta.py \
            scripts/apply_formatter_observation_navigation.py \
            .github/workflows/temporary-formatter-observation-product-control.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --check
          git commit -m 'feat(product): align formatter proposal observation control truth'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
