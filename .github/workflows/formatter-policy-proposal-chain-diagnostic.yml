name: Formatter policy proposal chain diagnostics

on:
  pull_request:
    types: [reopened]

permissions:
  contents: write

jobs:
  diagnose-chain:
    if: github.head_ref == 'feature/formatter-policy-proposal'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout proposal branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: feature/formatter-policy-proposal
          fetch-depth: 0

      - name: Reproduce chain and retain diagnostics
        shell: bash
        run: |
          set +e
          python scripts/formatter_policy_proposal_align.py > /tmp/align.log 2>&1
          align_rc=$?
          python -m pip install -c constraints-ci.txt -e '.[dev,test,docs]' > /tmp/install.log 2>&1
          install_rc=$?
          python -m ruff format src/sdetkit/formatter_policy_proposal.py tests/test_formatter_policy_proposal.py > /tmp/format.log 2>&1
          format_rc=$?
          head_sha="$(git rev-parse HEAD)"
          rm -rf build/formatter-candidate-benchmark build/formatter-candidate-verifier build/formatter-policy-proposal build/formatter-policy-approval.json
          python -m sdetkit.formatter_candidate_benchmark \
            --source-repository sherif69-sa/DevS69-sdetkit \
            --source-commit-sha "${head_sha}" \
            --pr-number 2142 \
            --reviewer-id proof-maintainer \
            --reviewed-at 2026-07-21T02:30:00Z \
            --reviewer-decision accept \
            --reviewer-notes "Accepted disposable evidence for proposal proof." \
            --contract-json docs/contracts/remediation-research.v1.json \
            --out-dir build/formatter-candidate-benchmark \
            --format json > /tmp/benchmark.log 2>&1
          benchmark_rc=$?
          python -m sdetkit.formatter_candidate_verifier \
            --benchmark-dir build/formatter-candidate-benchmark \
            --out-dir build/formatter-candidate-verifier \
            --repo sherif69-sa/DevS69-sdetkit \
            --branch feature/formatter-policy-proposal \
            --commit-sha "${head_sha}" \
            --pr-number 2142 \
            --reviewed-at 2026-07-21T02:30:00Z \
            --format json > /tmp/verifier.log 2>&1
          verifier_rc=$?
          python - <<'PY' > /tmp/approval.log 2>&1
          import hashlib
          import json
          from pathlib import Path

          report = Path("build/formatter-candidate-verifier/formatter-candidate-verifier.json")
          payload = json.loads(report.read_text(encoding="utf-8"))
          approval = {
              "schema_version": "sdetkit.formatter_policy_approval.v1",
              "provider": "github",
              "provider_identity_verified": True,
              "reviewer_id": "sherif69-sa",
              "approved_at": "2026-07-21T02:35:00Z",
              "decision": "approve_proposal",
              "source_repository": "sherif69-sa/DevS69-sdetkit",
              "source_commit_sha": payload["source_commit_sha"],
              "source_pr_number": 2142,
              "approval_reference": "https://github.com/sherif69-sa/DevS69-sdetkit/pull/2142",
              "verifier_report_sha256": hashlib.sha256(report.read_bytes()).hexdigest(),
              "limitations_acknowledged": True,
          }
          Path("build/formatter-policy-approval.json").write_text(
              json.dumps(approval, indent=2, sort_keys=True) + "\n", encoding="utf-8"
          )
          PY
          approval_rc=$?
          python -m sdetkit.formatter_policy_proposal \
            --verifier-dir build/formatter-candidate-verifier \
            --approval-record build/formatter-policy-approval.json \
            --contract-json docs/contracts/formatter-policy-proposal.v1.json \
            --out-dir build/formatter-policy-proposal \
            --format json > /tmp/proposal.log 2>&1
          proposal_rc=$?
          {
            printf 'align_rc=%s\ninstall_rc=%s\nformat_rc=%s\nbenchmark_rc=%s\nverifier_rc=%s\napproval_rc=%s\nproposal_rc=%s\n' \
              "$align_rc" "$install_rc" "$format_rc" "$benchmark_rc" "$verifier_rc" "$approval_rc" "$proposal_rc"
            for name in align format benchmark verifier approval proposal; do
              printf '\n== %s ==\n' "$name"
              tail -n 160 "/tmp/${name}.log"
            done
          } > formatter-policy-proposal-chain-diagnostic.txt
          exit 0

      - name: Commit diagnostic and remove helper
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/formatter-policy-proposal-chain-diagnostic.yml
          git add formatter-policy-proposal-chain-diagnostic.txt
          git commit -m "chore(remediation): retain proposal chain diagnostics"
          git push origin HEAD:feature/formatter-policy-proposal
