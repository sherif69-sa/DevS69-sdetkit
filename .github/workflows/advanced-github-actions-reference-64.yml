name: GitHub Actions Advanced Reference

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      python-versions:
        required: false
        type: string
        default: '["3.11", "3.12", "3.13"]'
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    name: Validate (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]
    concurrency:
      group: name64-reference-${{ github.workflow }}-${{ github.ref }}-${{ matrix.os }}-py${{ matrix.python-version }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8  # v6.0.0
        with:
          path: ~/.cache/pip
          key: name64-${{ runner.os }}-py${{ matrix.python-version }}-${{ hashFiles('requirements*.txt', 'pyproject.toml') }}
          restore-keys: |
            name64-${{ runner.os }}-py${{ matrix.python-version }}-
            name64-${{ runner.os }}-

      - name: Install deps
        run: |
          python -m pip install -c constraints-ci.txt --upgrade pip
          if [ -f requirements.txt ]; then python -m pip install -c constraints-ci.txt -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then python -m pip install -c constraints-ci.txt -r requirements-dev.txt; fi

      - name: Lint + tests
        run: |
          python -m pytest -q
