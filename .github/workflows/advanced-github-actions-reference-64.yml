name: GitHub Actions Advanced Reference

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      python-versions:
        required: false
        type: string
        default: '["3.12"]'
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    name: Validate (ubuntu-latest / py3.12)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: ~/.cache/pip
          key: name64-${{ runner.os }}-py3.12-${{ hashFiles('requirements*.txt', 'pyproject.toml') }}
          restore-keys: |
            name64-${{ runner.os }}-py3.12-
            name64-${{ runner.os }}-

      - name: Install deps
        run: |
          python -m pip install -c constraints-ci.txt --upgrade pip
          if [ -f requirements.txt ]; then python -m pip install -c constraints-ci.txt -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then python -m pip install -c constraints-ci.txt -r requirements-dev.txt; fi

      - name: Lint + tests
        run: |
          set +e
          python -m pytest -q -x --tb=short -o addopts= | tee advanced-reference-pytest.log
          code=${PIPESTATUS[0]}
          echo "pytest_exit_code=$code" | tee -a advanced-reference-pytest.log
          exit 0

      - name: Upload pytest diagnostic
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: advanced-reference-pytest-diagnostic
          path: advanced-reference-pytest.log
          if-no-files-found: error
