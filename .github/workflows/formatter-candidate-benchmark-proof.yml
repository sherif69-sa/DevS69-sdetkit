name: Formatter candidate benchmark proof

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  prove-and-finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: feature/formatter-candidate-benchmark
          fetch-depth: 0

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.12"

      - name: Align roadmap and navigation
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text(encoding="utf-8")
              if new in text:
                  return
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{path}: expected one marker, found {count}")
              file.write_text(text.replace(old, new, 1), encoding="utf-8")

          replace_once(
              "docs/docs-map.md",
              "[Remediation research contract](contracts/remediation-research.v1.json), [Remediation research guide](remediation-research-contract.md), [Curated advanced docs material map]",
              "[Remediation research contract](contracts/remediation-research.v1.json), [Remediation research guide](remediation-research-contract.md), [Formatter candidate benchmark](formatter-candidate-benchmark.md), [Curated advanced docs material map]",
          )
          replace_once(
              "docs/docs-map.md",
              "[Remediation research contract](contracts/remediation-research.v1.json), [Remediation research guide](remediation-research-contract.md)",
              "[Remediation research contract](contracts/remediation-research.v1.json), [Remediation research guide](remediation-research-contract.md), [Formatter candidate benchmark](formatter-candidate-benchmark.md)",
          )
          replace_once(
              "docs/docs-map.md",
              "[Automation bots](automation-bots.md), [Remediation research guide](remediation-research-contract.md)",
              "[Automation bots](automation-bots.md), [Remediation research guide](remediation-research-contract.md), [Formatter candidate benchmark](formatter-candidate-benchmark.md)",
          )
          replace_once(
              "mkdocs.yml",
              "      - Remediation research contract: remediation-research-contract.md\n",
              "      - Remediation research contract: remediation-research-contract.md\n      - Formatter candidate benchmark: formatter-candidate-benchmark.md\n",
          )
          replace_once(
              "docs/roadmap/product-roadmap.md",
              "| Remediation research contract | A versioned local-first contract validates formatter-only candidate evidence, exact scope, inventories, proof, rollback, reviewer state, scenarios, limitations, and false-authority counts without granting mutation authority. |\n",
              "| Remediation research contract | A versioned local-first contract validates formatter-only candidate evidence, exact scope, inventories, proof, rollback, reviewer state, scenarios, limitations, and false-authority counts without granting mutation authority. |\n| Candidate benchmark: formatter-only | A disposable local fixture executes the pinned formatter, retains exact before/after digests and diff evidence, proves all six research scenarios, verifies rollback, reports false positives explicitly, and grants no mutation or promotion authority. |\n",
          )
          replace_once(
              "docs/roadmap/product-roadmap.md",
              "| 1 | **Candidate benchmark: formatter-only** | Evaluate the first mechanical family through the versioned remediation-research contract without promotion. | Benchmark evidence proves zero out-of-scope writes, zero test weakening, deterministic rollback, retained artifacts, exact source digests, and explicit false-positive reporting. |\n| 2 | **Verifier and trajectory proof** | Connect the candidate evidence to ProtectedVerifier, ReplayableBenchmarkHarness, TrajectoryStore, and RepoMemory. | Claimed files equal actual writes, proof inputs are not mutated or shadowed, rollback restores exact bytes, and reviewed trajectories retain zero unsafe false-authority decisions. |\n| 3 | **Conditional narrow policy promotion** | Consider exactly one family only after independent proof and human review. | A separate authenticated contract preserves branch-only scope, rollback, audit, no merge authority, and all denied security, release, dependency, workflow-permission, and semantic-equivalence surfaces. |\n",
              "| 1 | **Verifier and trajectory proof** | Connect the retained formatter-candidate evidence to ProtectedVerifier, ReplayableBenchmarkHarness, TrajectoryStore, and RepoMemory. | Claimed files equal actual writes, proof inputs are not mutated or shadowed, rollback restores exact bytes, and reviewed trajectories retain zero unsafe false-authority decisions. |\n| 2 | **Conditional narrow policy promotion** | Consider exactly one family only after independent proof and human review. | A separate authenticated contract preserves branch-only scope, rollback, audit, no merge authority, and all denied security, release, dependency, workflow-permission, and semantic-equivalence surfaces. |\n",
          )
          replace_once(
              "docs/roadmap/product-roadmap.md",
              "The active `guarded_remediation_promotion` lane now advances to the formatter-only candidate benchmark.",
              "The formatter-only candidate benchmark is implemented through a disposable local fixture and the versioned research contract. The active `guarded_remediation_promotion` lane now advances to verifier and trajectory proof without changing SafetyGate policy or granting patch authority.",
          )
          PY

      - name: Install proof dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -c constraints-ci.txt -e .[dev,test,docs,packaging]

      - name: Format and lint focused scope
        run: |
          python -m ruff check --fix \
            src/sdetkit/formatter_candidate_benchmark.py \
            tests/test_formatter_candidate_benchmark.py
          python -m ruff format \
            src/sdetkit/formatter_candidate_benchmark.py \
            tests/test_formatter_candidate_benchmark.py
          python -m ruff check \
            src/sdetkit/formatter_candidate_benchmark.py \
            tests/test_formatter_candidate_benchmark.py

      - name: Run focused contract proof
        run: |
          python -m pytest -q \
            tests/test_formatter_candidate_benchmark.py \
            tests/test_remediation_research_contract.py \
            tests/test_platform_capability_matrix.py \
            -o addopts=

      - name: Run real formatter candidate benchmark
        shell: bash
        run: |
          rm -rf build/formatter-candidate-benchmark
          python -m sdetkit.formatter_candidate_benchmark \
            --source-repository "${GITHUB_REPOSITORY}" \
            --source-commit-sha "$(git rev-parse HEAD)" \
            --pr-number "${{ github.event.pull_request.number }}" \
            --reviewer-id "maintainer-review-pending" \
            --reviewed-at "2026-07-21T00:00:00Z" \
            --reviewer-decision defer \
            --reviewer-notes "Evidence retained for human review; no promotion decision." \
            --contract-json docs/contracts/remediation-research.v1.json \
            --out-dir build/formatter-candidate-benchmark \
            --format json \
            > build/formatter-candidate-benchmark/cli-output.json
          python - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(
              Path("build/formatter-candidate-benchmark/formatter-candidate-benchmark.json").read_text(
                  encoding="utf-8"
              )
          )
          contract = json.loads(
              Path("build/formatter-candidate-benchmark/remediation-research-report.json").read_text(
                  encoding="utf-8"
              )
          )
          assert report["status"] == "passed"
          assert report["scenario_count"] == 6
          assert report["matched_scenario_count"] == 6
          assert report["out_of_scope_write_count"] == 0
          assert report["test_weakening_count"] == 0
          assert report["false_positive_count"] == 0
          assert report["rollback_verified"] is True
          assert contract["report_status"] == "review_required"
          assert "reviewer_has_not_accepted" in contract["readiness_reasons"]
          assert all(report[field] is False for field in (
              "automation_allowed",
              "patch_application_allowed",
              "merge_authorized",
              "publication_authorized",
              "security_dismissal_allowed",
              "semantic_equivalence_proven",
          ))
          PY

      - name: Run strict docs proof
        run: NO_MKDOCS_2_WARNING=1 python -m mkdocs build --strict

      - name: Commit clean review branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm \
            .github/workflows/formatter-candidate-benchmark-proof.yml \
            .github/workflows/formatter-benchmark-diagnosis.yml
          git add \
            src/sdetkit/formatter_candidate_benchmark.py \
            tests/test_formatter_candidate_benchmark.py \
            docs/formatter-candidate-benchmark.md \
            docs/docs-map.md \
            docs/roadmap/product-roadmap.md \
            mkdocs.yml
          git commit -m "feat(remediation): prove formatter candidate benchmark"
          git push origin HEAD:feature/formatter-candidate-benchmark
