# Trusted default-branch terminal publisher for PR Quality evidence.
# This workflow checks out only the repository default branch and never executes PR code.
name: PR Quality Terminal Publisher

on:
  workflow_run:
    workflows: ["PR Quality Comment"]
    types: [completed]

permissions: {}

concurrency:
  group: pr-quality-terminal-publisher-${{ github.event.workflow_run.id }}
  cancel-in-progress: true

jobs:
  publish-terminal-snapshot:
    if: >-
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 18
    permissions:
      actions: read
      contents: read
      issues: write
      pull-requests: read
      security-events: read
    steps:
      - name: Checkout trusted default-branch publisher code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 1
          persist-credentials: false

      - name: Download exact-head PR Quality handoff
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: pr-quality-publisher-handoff
          path: build/pr-quality-terminal/handoff
          repository: ${{ github.repository }}
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      - name: Build terminal exact-head snapshot and final comment
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}
          EXPECTED_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          SOURCE_RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          set -euo pipefail
          test -n "$PR_NUMBER"
          python scripts/pr_quality_terminal_snapshot.py \
            --repository "$REPOSITORY" \
            --pr-number "$PR_NUMBER" \
            --head-sha "$EXPECTED_HEAD_SHA" \
            --source-run-id "$SOURCE_RUN_ID" \
            --handoff-manifest build/pr-quality-terminal/handoff/manifest.json \
            --review-model build/pr-quality-terminal/handoff/payload/pr-review-model.json \
            --required-checks-contract docs/contracts/required-checks.v1.json \
            --snapshot-output build/pr-quality-terminal/terminal-snapshot.json \
            --comment-output build/pr-quality-terminal/comment-body.md \
            --timeout-seconds 600 \
            --poll-interval-seconds 15 \
            --stable-polls 2

      - name: Sanitize final terminal comment
        run: |
          python - <<'PY'
          from __future__ import annotations

          import re
          from pathlib import Path

          path = Path("build/pr-quality-terminal/comment-body.md")
          body = path.read_text(encoding="utf-8")
          encoded = body.encode("utf-8")
          if len(encoded) > 60000:
              raise SystemExit(
                  f"terminal PR Quality comment exceeds limit: {len(encoded)}"
              )
          if any(ord(char) < 32 and char not in "\n\r\t" for char in body):
              raise SystemExit("terminal PR Quality comment has unsafe controls")
          if re.search(
              r"<\s*(script|iframe|object|embed|img)\b",
              body,
              re.IGNORECASE,
          ):
              raise SystemExit("terminal PR Quality comment has blocked HTML")
          if re.search(r"javascript\s*:", body, re.IGNORECASE):
              raise SystemExit("terminal PR Quality comment has a javascript URL")
          body = re.sub(r"(?<![\w`])@(?=[A-Za-z0-9-])", "@\u200b", body)
          path.write_text(body, encoding="utf-8")
          PY

      - name: Reverify current head immediately before publication
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}
          EXPECTED_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          current_head="$(
            gh api \
              -H "Accept: application/vnd.github+json" \
              "repos/${REPOSITORY}/pulls/${PR_NUMBER}" \
              --jq '.head.sha'
          )"
          if [ "$current_head" != "$EXPECTED_HEAD_SHA" ]; then
            echo "publisher refuses stale evidence: current=$current_head expected=$EXPECTED_HEAD_SHA" >&2
            exit 1
          fi

      - name: Publish final SDET Quality Gate comment
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}
        run: |
          set -euo pipefail
          body_path="build/pr-quality-terminal/comment-body.md"
          request_path="build/pr-quality-terminal/comment-request.json"
          response_path="build/pr-quality-terminal/comment-response.json"

          BODY_PATH="$body_path" REQUEST_PATH="$request_path" python - <<'PY'
          import json
          import os
          from pathlib import Path

          body = Path(os.environ["BODY_PATH"]).read_text(encoding="utf-8")
          Path(os.environ["REQUEST_PATH"]).write_text(
              json.dumps({"body": body}) + "\n",
              encoding="utf-8",
          )
          PY

          existing_id="$(
            gh api \
              -H "Accept: application/vnd.github+json" \
              "repos/${REPOSITORY}/issues/${PR_NUMBER}/comments?per_page=100" \
              --jq 'first(.[] | select(.user.type == "Bot" and (.body | startswith("### SDET Quality Gate")))) | .id // ""'
          )"
          if [ -n "$existing_id" ]; then
            gh api \
              --method PATCH \
              -H "Accept: application/vnd.github+json" \
              "repos/${REPOSITORY}/issues/comments/${existing_id}" \
              --input "$request_path" \
              > "$response_path"
          else
            gh api \
              --method POST \
              -H "Accept: application/vnd.github+json" \
              "repos/${REPOSITORY}/issues/${PR_NUMBER}/comments" \
              --input "$request_path" \
              > "$response_path"
          fi

      - name: Upload terminal review evidence
        if: always() && hashFiles('build/pr-quality-terminal/terminal-snapshot.json') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: pr-quality-terminal-snapshot
          retention-days: 14
          path: |
            build/pr-quality-terminal/terminal-snapshot.json
            build/pr-quality-terminal/comment-body.md
            build/pr-quality-terminal/comment-response.json
