name: Security Configuration Audit Bot

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 1 * *"

permissions:
  contents: read
  issues: write
  security-events: read

jobs:
  security-configuration-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Audit security configuration and local GHAS coverage
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd  # v8.0.0
        env:
          GHAS_TOKEN: ${{ secrets.GHAS_READ_TOKEN }}
        with:
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const monthOf = new Date().toISOString().slice(0, 7);
            const labels = [
              { name: 'maintenance', color: '0E8A16', description: 'Automated maintenance tracking' },
              { name: 'security', color: 'b60205', description: 'Security operations and hardening work' },
              { name: 'ghas', color: '5319e7', description: 'GitHub Advanced Security automation and triage' },
              { name: 'priority:medium', color: 'fbca04', description: 'Medium-priority work item' },
            ];
            for (const label of labels) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name: label.name });
              } catch {
                await github.rest.issues.createLabel({ owner, repo, ...label });
              }
            }

            const ghasToken = process.env.GHAS_TOKEN || github.token;
            const headers = {
              accept: 'application/vnd.github+json',
              authorization: `Bearer ${ghasToken}`,
              'x-github-api-version': '2022-11-28',
            };
            const notes = [];

            const expectedWorkflows = [
              'security.yml',
              'osv-scanner.yml',
              'dependency-audit.yml',
              'sbom.yml',
              'dependency-review.yml',
              'ghas-review-bot.yml',
              'ghas-campaign-bot.yml',
              'ghas-alert-sla-bot.yml',
              'ghas-metrics-export-bot.yml',
              'security-configuration-audit-bot.yml',
              'security-maintenance-bot.yml',
              'dependency-radar-bot.yml',
            ];
            const presentWorkflows = expectedWorkflows.filter((name) => fs.existsSync(`.github/workflows/${name}`));
            const missingWorkflows = expectedWorkflows.filter((name) => !fs.existsSync(`.github/workflows/${name}`));
            const localSignals = [
              ['.github/codeql-config.yml', fs.existsSync('.github/codeql-config.yml')],
              ['.github/dependabot.yml', fs.existsSync('.github/dependabot.yml')],
              ['.github/pip-audit-baseline.json', fs.existsSync('.github/pip-audit-baseline.json')],
            ];

            async function fetchConfiguration() {
              try {
                const response = await github.request('GET /repos/{owner}/{repo}/code-security-configuration', {
                  owner,
                  repo,
                  headers,
                });
                return response.data;
              } catch (error) {
                notes.push(`Repository security configuration unavailable: ${error.message}`);
                return null;
              }
            }

            async function fetchAlerts(path, label) {
              try {
                const response = await github.request(`GET ${path}`, {
                  owner,
                  repo,
                  state: 'open',
                  per_page: 100,
                  headers,
                });
                return Array.isArray(response.data) ? response.data.length : 0;
              } catch (error) {
                notes.push(`${label} unavailable: ${error.message}`);
                return 'unknown';
              }
            }

            const configuration = await fetchConfiguration();
            const codeAlerts = await fetchAlerts('/repos/{owner}/{repo}/code-scanning/alerts', 'Code scanning alerts');
            const secretAlerts = await fetchAlerts('/repos/{owner}/{repo}/secret-scanning/alerts', 'Secret scanning alerts');
            const dependabotAlerts = await fetchAlerts('/repos/{owner}/{repo}/dependabot/alerts', 'Dependabot alerts');

            const title = `🧱 GHAS configuration audit (${monthOf})`;
            const body = [
              'This issue is auto-generated to verify that repository-local automation still matches the intended GitHub Advanced Security operating model.',
              '',
              '## Local workflow coverage',
              `- Present expected workflows: **${presentWorkflows.length}/${expectedWorkflows.length}**`,
              ...(presentWorkflows.length ? presentWorkflows.map((name) => `- ✅ ${name}`) : ['- No expected workflows were present.']),
              ...(missingWorkflows.length ? ['', '### Missing workflows', ...missingWorkflows.map((name) => `- ⚠️ ${name}`)] : []),
              '',
              '## Local configuration files',
              ...localSignals.map(([path, present]) => `- ${present ? '✅' : '⚠️'} ${path}`),
              '',
              '## Repository security configuration',
              configuration
                ? `- Attached configuration: **${configuration.name || 'unnamed'}**`
                : '- No repository-attached code security configuration was visible through the API.',
              configuration && configuration.code_security
                ? `- Code security: **${configuration.code_security}**`
                : '- Code security: unavailable.',
              configuration && configuration.secret_protection
                ? `- Secret protection: **${configuration.secret_protection}**`
                : '- Secret protection: unavailable.',
              configuration && configuration.dependency_graph
                ? `- Dependency graph: **${configuration.dependency_graph}**`
                : '- Dependency graph: unavailable.',
              configuration && configuration.dependency_graph_autosubmit_action
                ? `- Automatic dependency submission: **${configuration.dependency_graph_autosubmit_action}**`
                : '- Automatic dependency submission: unavailable.',
              '',
              '## Open alert snapshot',
              `- Code scanning alerts: **${codeAlerts}**`,
              `- Secret scanning alerts: **${secretAlerts}**`,
              `- Dependabot alerts: **${dependabotAlerts}**`,
              '',
              '## Suggested monthly follow-up',
              '- [ ] Confirm the repo still uses the intended GitHub-recommended or custom security configuration.',
              '- [ ] Keep dependency review, SBOM, and scanning workflows aligned with that configuration.',
              '- [ ] If this is a user-owned repository, document which org-only GHAS features are intentionally unavailable.',
              '',
              '## Notes',
              ...(notes.length ? notes.map((note) => `- ${note}`) : ['- Configuration and alert APIs responded without fallback warnings.']),
            ].join('\n');

            const openIssues = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              labels: 'ghas',
              per_page: 100,
            });
            const priorIssues = openIssues.data.filter((issue) => issue.title.startsWith('🧱 GHAS configuration audit'));

            for (const oldIssue of priorIssues) {
              if (oldIssue.title !== title) {
                await github.rest.issues.update({ owner, repo, issue_number: oldIssue.number, state: 'closed' });
              }
            }

            const existing = priorIssues.find((issue) => issue.title === title);
            if (existing) {
              await github.rest.issues.update({ owner, repo, issue_number: existing.number, body });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
                labels: ['maintenance', 'security', 'ghas', 'priority:medium'],
              });
            }
