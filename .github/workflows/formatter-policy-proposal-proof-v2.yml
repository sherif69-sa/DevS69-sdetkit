name: Formatter policy proposal proof v2

on:
  pull_request:
    types: [reopened]

permissions:
  contents: write

concurrency:
  group: formatter-policy-proposal-proof-v2
  cancel-in-progress: false

jobs:
  prove-and-clean:
    if: github.head_ref == 'feature/formatter-policy-proposal'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout proposal branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: feature/formatter-policy-proposal
          fetch-depth: 0

      - name: Align product-control truth
        run: |
          set -euo pipefail
          python scripts/formatter_policy_proposal_align.py

      - name: Install proof dependencies
        run: |
          set -euo pipefail
          python -m pip install -c constraints-ci.txt -e '.[dev,test,docs]'

      - name: Run focused quality and contract proof
        run: |
          set -euo pipefail
          files=(
            src/sdetkit/formatter_policy_proposal.py
            src/sdetkit/product_maturity_radar_portfolio.py
            tests/test_formatter_policy_proposal.py
            tests/test_platform_capability_matrix.py
            tests/test_product_maturity_radar_portfolio.py
            tests/test_quality_truth_baseline.py
          )
          python -m ruff format "${files[@]}"
          python -m ruff check --fix "${files[@]}"
          python -m ruff format --check "${files[@]}"
          python -m ruff check "${files[@]}"
          python -m mypy src/sdetkit/formatter_policy_proposal.py
          python -m pytest -q \
            tests/test_formatter_policy_proposal.py \
            tests/test_platform_capability_matrix.py \
            tests/test_product_maturity_radar_portfolio.py \
            tests/test_quality_truth_baseline.py \
            -o addopts=

      - name: Run real formatter-to-proposal evidence chain
        run: |
          set -euo pipefail
          rm -rf \
            build/formatter-candidate-benchmark \
            build/formatter-candidate-verifier \
            build/formatter-policy-proposal \
            build/formatter-policy-approval.json
          head_sha="$(git rev-parse HEAD)"
          python -m sdetkit.formatter_candidate_benchmark \
            --source-repository sherif69-sa/DevS69-sdetkit \
            --source-commit-sha "${head_sha}" \
            --pr-number 2142 \
            --reviewer-id proof-maintainer \
            --reviewed-at 2026-07-21T02:30:00Z \
            --reviewer-decision accept \
            --reviewer-notes "Accepted disposable evidence for proposal proof." \
            --contract-json docs/contracts/remediation-research.v1.json \
            --out-dir build/formatter-candidate-benchmark \
            --format json > /tmp/formatter-benchmark.json
          python -m sdetkit.formatter_candidate_verifier \
            --benchmark-dir build/formatter-candidate-benchmark \
            --out-dir build/formatter-candidate-verifier \
            --repo sherif69-sa/DevS69-sdetkit \
            --branch feature/formatter-policy-proposal \
            --commit-sha "${head_sha}" \
            --pr-number 2142 \
            --reviewed-at 2026-07-21T02:30:00Z \
            --format json > /tmp/formatter-verifier.json
          python - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          report = Path("build/formatter-candidate-verifier/formatter-candidate-verifier.json")
          payload = json.loads(report.read_text(encoding="utf-8"))
          approval = {
              "schema_version": "sdetkit.formatter_policy_approval.v1",
              "provider": "github",
              "provider_identity_verified": True,
              "reviewer_id": "sherif69-sa",
              "approved_at": "2026-07-21T02:35:00Z",
              "decision": "approve_proposal",
              "source_repository": "sherif69-sa/DevS69-sdetkit",
              "source_commit_sha": payload["source_commit_sha"],
              "source_pr_number": 2142,
              "approval_reference": "https://github.com/sherif69-sa/DevS69-sdetkit/pull/2142",
              "verifier_report_sha256": hashlib.sha256(report.read_bytes()).hexdigest(),
              "limitations_acknowledged": True,
          }
          Path("build/formatter-policy-approval.json").write_text(
              json.dumps(approval, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY
          python -m sdetkit.formatter_policy_proposal \
            --verifier-dir build/formatter-candidate-verifier \
            --approval-record build/formatter-policy-approval.json \
            --contract-json docs/contracts/formatter-policy-proposal.v1.json \
            --out-dir build/formatter-policy-proposal \
            --format json > /tmp/formatter-policy-proposal.json
          python - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path("/tmp/formatter-policy-proposal.json").read_text())
          assert payload["proposal_eligible"] is True
          assert payload["execution_eligible"] is False
          assert payload["branch_execution_allowed"] is False
          assert payload["safe_fix_allowed"] is False
          for field in (
              "automation_allowed",
              "patch_application_allowed",
              "merge_authorized",
              "publication_authorized",
              "security_dismissal_allowed",
              "semantic_equivalence_proven",
          ):
              assert payload[field] is False, field
          print("formatter_policy_proposal_chain=pass")
          PY

      - name: Run strict documentation proof
        run: |
          set -euo pipefail
          NO_MKDOCS_2_WARNING=1 python -m mkdocs build --strict

      - name: Commit clean review head
        run: |
          set -euo pipefail
          rm -rf \
            build/formatter-candidate-benchmark \
            build/formatter-candidate-verifier \
            build/formatter-policy-proposal \
            build/formatter-policy-approval.json \
            site
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -f --ignore-unmatch \
            .github/workflows/formatter-policy-proposal-proof.yml \
            .github/workflows/formatter-policy-proposal-activation.yml \
            .github/workflows/formatter-policy-proposal-proof-v2.yml \
            scripts/formatter_policy_proposal_align.py
          git add \
            src/sdetkit/formatter_policy_proposal.py \
            src/sdetkit/product_maturity_radar_portfolio.py \
            tests/test_formatter_policy_proposal.py \
            tests/test_platform_capability_matrix.py \
            tests/test_product_maturity_radar_portfolio.py \
            tests/test_quality_truth_baseline.py \
            docs/contracts/formatter-policy-proposal.v1.json \
            docs/contracts/platform-capability-matrix.v1.json \
            docs/contracts/quality-truth-baseline.v1.json \
            docs/formatter-policy-proposal.md \
            docs/docs-map.md \
            docs/roadmap/product-roadmap.md \
            docs/operator-reviewed-kpi-portfolio-report.md \
            mkdocs.yml \
            pyproject.toml
          git diff --cached --check
          git commit -m "feat(remediation): add formatter policy proposal eligibility"
          git push origin HEAD:feature/formatter-policy-proposal
