name: Temporary diagnostic plan artifact registration transport

on:
  push:
    branches:
      - feature/register-diagnostic-execution-plan-artifact

permissions:
  contents: write

jobs:
  apply-approved-patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: feature/register-diagnostic-execution-plan-artifact
          fetch-depth: 0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"

      - name: Apply the approved four-file patch
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from __future__ import annotations

          import json
          from pathlib import Path

          source_path = Path("src/sdetkit/artifact_contract_index.py")
          source = source_path.read_text(encoding="utf-8")
          assert "diagnostic_execution_plan," not in source
          import_anchor = "    cross_report_consistency,\n    diagnostic_job,"
          assert source.count(import_anchor) == 1
          source = source.replace(
              import_anchor,
              "    cross_report_consistency,\n    diagnostic_execution_plan,\n    diagnostic_job,",
          )

          entry_anchor = '''            {
                          "id": "adoption-learning-report-json",'''
          assert source.count(entry_anchor) == 1
          entry = '''            {
                          "id": "diagnostic-execution-plan-json",
                          "path": diagnostic_execution_plan.DEFAULT_OUT,
                          "produced_by": (
                              "python -m sdetkit.diagnostic_execution_plan "
                              "--root . "
                              "--out build/sdetkit/diagnostic-execution-plan.json "
                              "--format json"
                          ),
                          "schema_version": diagnostic_execution_plan.SCHEMA_VERSION,
                          "required_fields": [
                              "schema_version",
                              "plan_status",
                              "repo_root",
                              "repo_identity",
                              "source_artifacts",
                              "summary",
                              "commands",
                              "review_first_items",
                              "policies",
                              "rules",
                              "execution_allowed",
                              "automation_allowed",
                              "patch_application_allowed",
                              "merge_authorized",
                              "semantic_equivalence_proven",
                              "authority_boundary",
                          ],
                          "stability": "advanced",
                      },
          '''
          source = source.replace(entry_anchor, entry + entry_anchor)
          source_path.write_text(source, encoding="utf-8")

          test_path = Path("tests/test_artifact_contract_index.py")
          tests = test_path.read_text(encoding="utf-8")
          assert "diagnostic_execution_plan," not in tests
          test_import_anchor = "    diagnostic_job,\n    diagnostic_signal_snapshot,"
          assert tests.count(test_import_anchor) == 1
          tests = tests.replace(
              test_import_anchor,
              "    diagnostic_execution_plan,\n    diagnostic_job,\n    diagnostic_signal_snapshot,",
          )

          schema_anchor = '''    entries = {item["id"]: item for item in payload["artifacts"]}
              assert (
                  entries["diagnostic-signal-snapshot-json"]["schema_version"]'''
          assert tests.count(schema_anchor) == 1
          schema_assertion = '''    entries = {item["id"]: item for item in payload["artifacts"]}
              assert (
                  entries["diagnostic-execution-plan-json"]["schema_version"]
                  == diagnostic_execution_plan.SCHEMA_VERSION
              )
              assert (
                  entries["diagnostic-signal-snapshot-json"]["schema_version"]'''
          tests = tests.replace(schema_anchor, schema_assertion)

          test_anchor = "\ndef test_artifact_contract_index_includes_adoption_learning_report_json() -> None:\n"
          assert tests.count(test_anchor) == 1
          dedicated_test = '''
          def test_artifact_contract_index_includes_diagnostic_execution_plan_json() -> None:
              payload = build_index()
              entries = {item["id"]: item for item in payload["artifacts"]}

              artifact_id = "diagnostic-execution-plan-json"
              assert artifact_id in entries

              entry = entries[artifact_id]
              assert entry["schema_version"] == diagnostic_execution_plan.SCHEMA_VERSION
              assert entry["path"] == diagnostic_execution_plan.DEFAULT_OUT
              assert entry["stability"] == "advanced"

              assert {
                  "schema_version",
                  "plan_status",
                  "repo_identity",
                  "source_artifacts",
                  "summary",
                  "commands",
                  "review_first_items",
                  "policies",
                  "rules",
                  "execution_allowed",
                  "automation_allowed",
                  "patch_application_allowed",
                  "merge_authorized",
                  "semantic_equivalence_proven",
                  "authority_boundary",
              }.issubset(set(entry["required_fields"]))

              assert entry["produced_by"].startswith(
                  "python -m sdetkit.diagnostic_execution_plan "
              )
              assert "--root ." in entry["produced_by"]
              assert "--out build/sdetkit/diagnostic-execution-plan.json" in entry["produced_by"]
              assert "--format json" in entry["produced_by"]

          '''
          tests = tests.replace(test_anchor, "\n" + dedicated_test + test_anchor.lstrip("\n"))
          test_path.write_text(tests, encoding="utf-8")

          docs_path = Path("docs/adoption.md")
          docs = docs_path.read_text(encoding="utf-8")
          docs_anchor = (
              "This is an evidence-only handoff. It does not run proof commands, install "
              "dependencies, mutate the repository, authorize automation, or authorize merge.\n\n"
              "## Stage 1 — local proof in the team repo"
          )
          assert docs.count(docs_anchor) == 1
          docs_section = '''This is an evidence-only handoff. It does not run proof commands, install dependencies, mutate the repository, authorize automation, or authorize merge.

          ## Build the diagnostic execution plan

          Convert the discovered repository surface into a deterministic, non-executing command plan:

          ```bash
          python -m sdetkit.diagnostic_execution_plan \\
            --root . \\
            --out build/sdetkit/diagnostic-execution-plan.json \\
            --format json
          ```

          The generated `diagnostic-execution-plan-json` artifact records ordered commands, structured
          arguments, repository-relative working directories, evidence references, expected artifacts,
          timeouts, review reasons, and isolation policies. It does not execute commands or authorize
          execution, automation, dependency installation, target mutation, patch application, or merge.

          ## Stage 1 — local proof in the team repo'''
          docs = docs.replace(docs_anchor, docs_section)
          docs_path.write_text(docs, encoding="utf-8")

          index_path = Path("docs/artifact-contract-index.json")
          index = json.loads(index_path.read_text(encoding="utf-8"))
          artifacts = index["artifacts"]
          assert not any(item.get("id") == "diagnostic-execution-plan-json" for item in artifacts)
          position = next(
              i + 1 for i, item in enumerate(artifacts) if item.get("id") == "adoption-surface-json"
          )
          artifacts.insert(
              position,
              {
                  "id": "diagnostic-execution-plan-json",
                  "path": "build/sdetkit/diagnostic-execution-plan.json",
                  "produced_by": (
                      "python -m sdetkit.diagnostic_execution_plan --root . "
                      "--out build/sdetkit/diagnostic-execution-plan.json --format json"
                  ),
                  "schema_version": "sdetkit.diagnostic_execution_plan.v1",
                  "required_fields": [
                      "schema_version",
                      "plan_status",
                      "repo_root",
                      "repo_identity",
                      "source_artifacts",
                      "summary",
                      "commands",
                      "review_first_items",
                      "policies",
                      "rules",
                      "execution_allowed",
                      "automation_allowed",
                      "patch_application_allowed",
                      "merge_authorized",
                      "semantic_equivalence_proven",
                      "authority_boundary",
                  ],
                  "stability": "advanced",
              },
          )
          index_path.write_text(
              json.dumps(index, ensure_ascii=True, sort_keys=False, indent=2) + "\n",
              encoding="utf-8",
          )

          Path(".github/workflows/_temporary_register_diagnostic_execution_plan_artifact.yml").unlink()
          PY

          python -m compileall -q \
            src/sdetkit/artifact_contract_index.py \
            tests/test_artifact_contract_index.py
          git diff --check

          mapfile -t changed < <(git diff --name-only)
          expected=(
            docs/adoption.md
            docs/artifact-contract-index.json
            src/sdetkit/artifact_contract_index.py
            tests/test_artifact_contract_index.py
            .github/workflows/_temporary_register_diagnostic_execution_plan_artifact.yml
          )
          printf '%s\n' "${changed[@]}" | sort > /tmp/actual-files
          printf '%s\n' "${expected[@]}" | sort > /tmp/expected-files
          diff -u /tmp/expected-files /tmp/actual-files

      - name: Commit exact approved result
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "SDETKit Patch Transport"
          git config user.email "patch-transport@invalid.local"
          git add -A
          git commit -m "feat(artifacts): register diagnostic execution plan contract"
          git diff --name-only origin/main...HEAD | sort | tee /tmp/final-files
          cat > /tmp/expected-final-files <<'EOF'
          docs/adoption.md
          docs/artifact-contract-index.json
          src/sdetkit/artifact_contract_index.py
          tests/test_artifact_contract_index.py
          EOF
          diff -u /tmp/expected-final-files /tmp/final-files
          git push origin HEAD:feature/register-diagnostic-execution-plan-artifact
