name: Formatter proposal review packet v2

on:
  push:
    branches: [agent/formatter-proposal-review-packet]

permissions:
  contents: write

jobs:
  generate-and-prove:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: agent/formatter-proposal-review-packet
          fetch-depth: 0

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.12"

      - name: Install constrained proof stack
        run: |
          python -m pip install --upgrade pip
          python -m pip install -c constraints-ci.txt -e .[dev,test,docs,packaging]

      - name: Generate retained packet
        run: python scripts/generate_formatter_proposal_review_packet.py

      - name: Apply canonical focused style
        run: |
          python -m ruff format \
            scripts/generate_formatter_proposal_review_packet.py \
            tests/test_formatter_policy_proposal_review_packet.py
          python -m ruff check --fix \
            scripts/generate_formatter_proposal_review_packet.py \
            tests/test_formatter_policy_proposal_review_packet.py
          python -m ruff format --check \
            scripts/generate_formatter_proposal_review_packet.py \
            tests/test_formatter_policy_proposal_review_packet.py
          python -m ruff check \
            scripts/generate_formatter_proposal_review_packet.py \
            tests/test_formatter_policy_proposal_review_packet.py

      - name: Prove packet and observation boundary
        run: |
          python -m pytest -q \
            tests/test_formatter_policy_proposal_review_packet.py \
            tests/test_formatter_policy_proposal.py \
            tests/test_formatter_policy_proposal_observation.py \
            -o addopts=
          NO_MKDOCS_2_WARNING=1 python -m mkdocs build --strict

      - name: Commit clean review packet
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm \
            .github/workflows/formatter-proposal-review-packet-v2.yml \
            scripts/generate_formatter_proposal_review_packet.py
          git add \
            docs/evidence/formatter-policy-proposal/review-packet-2141 \
            tests/test_formatter_policy_proposal_review_packet.py
          git commit -m "feat(product): retain formatter proposal review packet"
          git push origin HEAD:agent/formatter-proposal-review-packet
