name: phase3-quality-contract

on:
  workflow_dispatch:
  push:
    paths:
      - 'Makefile'
      - 'scripts/check_phase3_quality_contract.py'
      - 'scripts/build_phase3_trend_delta.py'
      - 'scripts/phase3_persist_baseline_history.py'
      - 'scripts/phase3_quality_engine.py'
      - 'tests/test_phase3_*.py'

permissions:
  contents: read

jobs:
  phase3-contract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.11'

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -c constraints-ci.txt -r requirements-test.txt -r requirements-docs.txt -e .

      - name: Seed baseline summary for contract lane
        run: |
          python scripts/seed_quality_baseline_summary_fixture.py --summary build/phase1-baseline/phase1-baseline-summary.json

      - name: Run quality-contract tests
        run: |
          pytest -q \
            tests/test_phase3_quality_contract.py \
            tests/test_phase3_trend_delta.py \
            tests/test_phase3_remediation_payload_v2.py \
            tests/test_phase3_next_pass_determinism.py \
            tests/test_phase3_baseline_history_persist.py

      - name: Run quality-contract operational lane
        run: |
          make quality-contract-run

      - name: Upload quality-contract artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: phase3-quality-artifacts
          path: |
            build/phase3-quality/*.json
            build/phase3-quality/*.md
            build/phase1-baseline/history/*.json
          if-no-files-found: error
