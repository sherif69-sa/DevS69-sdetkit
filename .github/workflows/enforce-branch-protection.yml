# Local equivalent command:
#   python -m sdetkit workflow-governance-report --root . --format text
#   See docs/ci/workflow-local-equivalents.md#enforce-branch-protection for workflow-specific operator notes.
name: enforce-branch-protection

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "15 7 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  protect-main:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - name: Setup Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: "3.12"

      - name: Install repo
        run: python -m pip install -c constraints-ci.txt -e .

      - name: Enforce branch protection
        env:
          BRANCH_PROTECTION_TOKEN: ${{ secrets.BRANCH_PROTECTION_TOKEN }}
        run: |
          if [ -z "${BRANCH_PROTECTION_TOKEN}" ]; then
            echo "BRANCH_PROTECTION_TOKEN is not set; skipping enforcement."
            exit 0
          fi
          python tools/enforce_branch_protection.py \
            --owner "${{ github.repository_owner }}" \
            --repo "${{ github.event.repository.name }}" \
            --branch "main" \
            --token "${BRANCH_PROTECTION_TOKEN}" \
            --required-check "ci" \
            --required-check "maintenance-autopilot" \
            --required-approving-review-count 0 \
            --enforce-admins \
            --disable-pr-reviews
