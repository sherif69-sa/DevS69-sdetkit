# Trusted default-branch lifecycle reconciliation for the canonical PR Quality comment.
# This workflow never checks out or executes pull-request repository code.
name: PR Quality Lifecycle Reconciliation

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Optional merged pull request number to reconcile"
        required: false
        type: string

permissions: {}

concurrency:
  group: pr-quality-lifecycle-${{ inputs.pr_number || github.sha || github.run_id }}
  cancel-in-progress: false

jobs:
  reconcile:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      issues: write
      pull-requests: read
    steps:
      - name: Reconcile merged PR Quality comment lifecycle
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          INPUT_PR_NUMBER: ${{ inputs.pr_number }}
        run: |
          set -euo pipefail
          mkdir -p build/pr-quality-lifecycle

          python3 - <<'PY'
          from __future__ import annotations

          import json
          import os
          import subprocess
          from pathlib import Path
          from typing import Any

          repository = os.environ["REPOSITORY"]
          event_name = os.environ["EVENT_NAME"]
          input_pr_number = os.environ.get("INPUT_PR_NUMBER", "").strip()

          def gh_json(*args: str, method: str = "GET", payload: dict[str, Any] | None = None) -> Any:
              command = [
                  "gh",
                  "api",
                  "-H",
                  "Accept: application/vnd.github+json",
              ]
              if method != "GET":
                  command.extend(["--method", method])
              if payload is not None:
                  command.extend(["--input", "-"])
              command.extend(args)
              completed = subprocess.run(
                  command,
                  check=True,
                  input=(json.dumps(payload) if payload is not None else None),
                  text=True,
                  capture_output=True,
              )
              return json.loads(completed.stdout) if completed.stdout.strip() else {}

          def positive_pr_number(raw: str) -> int:
              value = int(raw)
              if value <= 0:
                  raise ValueError("pull request number must be positive")
              return value

          if input_pr_number:
              candidates = [positive_pr_number(input_pr_number)]
              source = "manual_recovery"
          else:
              rows = gh_json(
                  f"repos/{repository}/pulls?state=closed&sort=updated&direction=desc&per_page=100"
              )
              candidates = [
                  int(row["number"])
                  for row in rows
                  if isinstance(row, dict) and row.get("merged_at")
              ]
              source = "trusted_main_push" if event_name == "push" else "trusted_recovery_scan"

          result: dict[str, Any] = {
              "schema_version": "sdetkit.pr_quality_lifecycle_reconciliation.v1",
              "source": source,
              "repository": repository,
              "candidate_count": len(candidates),
              "updated": [],
              "already_reconciled": [],
              "missing_comment": [],
              "not_merged": [],
              "reporting_only": True,
              "merge_authorized": False,
              "semantic_equivalence_proven": False,
          }

          for pr_number in candidates:
              pull = gh_json(f"repos/{repository}/pulls/{pr_number}")
              merged = bool(pull.get("merged_at"))
              state = str(pull.get("state") or "")
              merge_commit_sha = str(pull.get("merge_commit_sha") or "")
              head = pull.get("head") if isinstance(pull.get("head"), dict) else {}
              head_sha = str(head.get("sha") or "")

              if not (merged and state == "closed" and merge_commit_sha and head_sha):
                  result["not_merged"].append(pr_number)
                  continue

              comments = gh_json(
                  f"repos/{repository}/issues/{pr_number}/comments?per_page=100"
              )
              quality_comment = next(
                  (
                      row
                      for row in comments
                      if isinstance(row, dict)
                      and isinstance(row.get("user"), dict)
                      and row["user"].get("type") == "Bot"
                      and str(row.get("body") or "").startswith("### SDET Quality Gate")
                  ),
                  None,
              )
              if quality_comment is None:
                  result["missing_comment"].append(pr_number)
                  continue

              existing_body = str(quality_comment.get("body") or "")
              if "## ✅ Merged" in existing_body:
                  result["already_reconciled"].append(pr_number)
                  continue

              body = "\n".join(
                  [
                      "### SDET Quality Gate",
                      "",
                      (
                          f"> Final lifecycle reconciliation for PR #{pr_number} after GitHub "
                          "recorded the pull request as merged."
                      ),
                      "",
                      "## ✅ Merged",
                      "",
                      (
                          "The earlier pre-merge Quality Gate snapshot is historical and is no "
                          "longer an active merge verdict."
                      ),
                      "",
                      "| Lifecycle signal | Result |",
                      "|---|---|",
                      "| Pull request state | `merged` |",
                      f"| Final PR head | `{head_sha[:12]}` |",
                      f"| Merge commit | `{merge_commit_sha[:12]}` |",
                      "| Previous Quality Gate report | Superseded after merge |",
                      "",
                      (
                          "> 🔒 Authority: `reporting only`. This lifecycle update records the "
                          "merged state; it does not authorize the merge or retroactively prove "
                          "individual checks."
                      ),
                      "",
                  ]
              )
              comment_id = int(quality_comment["id"])
              gh_json(
                  f"repos/{repository}/issues/comments/{comment_id}",
                  method="PATCH",
                  payload={"body": body},
              )
              result["updated"].append(
                  {
                      "pr_number": pr_number,
                      "comment_id": comment_id,
                      "head_sha": head_sha,
                      "merge_commit_sha": merge_commit_sha,
                  }
              )

          output = Path("build/pr-quality-lifecycle/reconciliation.json")
          output.write_text(
              json.dumps(result, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )

          summary = [
              "## PR Quality lifecycle reconciliation",
              "",
              f"- Source: `{source}`",
              f"- Candidates: **{len(candidates)}**",
              f"- Updated: **{len(result['updated'])}**",
              f"- Already reconciled: **{len(result['already_reconciled'])}**",
              f"- Missing canonical comment: **{len(result['missing_comment'])}**",
              f"- Not merged: **{len(result['not_merged'])}**",
              "- Comment creation: **disabled**",
              "- Repository code execution: **disabled**",
          ]
          summary_path = os.environ.get("GITHUB_STEP_SUMMARY")
          if summary_path:
              Path(summary_path).write_text("\n".join(summary) + "\n", encoding="utf-8")

          print(f"reconciliation_source={source}")
          print(f"reconciled_comment_count={len(result['updated'])}")
          print("comment_creation_allowed=false")
          print("repository_code_execution_allowed=false")
          PY

      - name: Upload lifecycle reconciliation evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: pr-quality-lifecycle-reconciliation
          retention-days: 14
          path: build/pr-quality-lifecycle/reconciliation.json
