# Local equivalent command:
#   python -m sdetkit workflow-governance-report --root . --format text
#   See docs/ci/workflow-local-equivalents.md#osv-scanner for workflow-specific operator notes.
name: OSV Vulnerability Scan

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "45 4 * * *"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  scan:
    name: OSV scheduled/repo scan
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
    with:
      scan-args: |-
        -r
        ./
      fail-on-vuln: false
      upload-sarif: true
