name: OSV Vulnerability Scan

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "45 4 * * *"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  scan:
    name: OSV scheduled/repo scan
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@c51854704019a247608d928f370c98740469d4b5 # v2.3.5
    with:
      scan-args: |-
        -r
        ./
      fail-on-vuln: false
      upload-sarif: true
