name: Temporary diagnostic plan artifact formatter correction

on:
  push:
    branches:
      - feature/register-diagnostic-execution-plan-artifact
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: temporary-diagnostic-plan-format-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  apply-exact-formatter-correction:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: feature/register-diagnostic-execution-plan-artifact
          fetch-depth: 0

      - name: Apply exact ruff-format result
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path("tests/test_artifact_contract_index.py")
          text = path.read_text(encoding="utf-8")
          old = '''    assert entry["produced_by"].startswith(
              "python -m sdetkit.diagnostic_execution_plan "
          )
          '''
          new = '''    assert entry["produced_by"].startswith("python -m sdetkit.diagnostic_execution_plan ")
          '''
          assert text.count(old) == 1
          path.write_text(text.replace(old, new), encoding="utf-8")
          Path(".github/workflows/_temporary_format_diagnostic_plan_artifact_test.yml").unlink()
          PY

          test "$(git hash-object tests/test_artifact_contract_index.py)" = \
            "93985877743710dbfa480716cef627e7f5292d51"
          python -m compileall -q tests/test_artifact_contract_index.py
          git diff --check

      - name: Commit exact formatter result
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "SDETKit Patch Transport"
          git config user.email "patch-transport@invalid.local"
          git add -A
          git commit -m "style(artifacts): apply formatter to diagnostic plan contract test"
          git diff --name-only origin/main...HEAD | sort | tee /tmp/final-files
          cat > /tmp/expected-final-files <<'EOF'
          docs/adoption.md
          docs/artifact-contract-index.json
          src/sdetkit/artifact_contract_index.py
          tests/test_artifact_contract_index.py
          EOF
          diff -u /tmp/expected-final-files /tmp/final-files
          git push origin HEAD:feature/register-diagnostic-execution-plan-artifact
