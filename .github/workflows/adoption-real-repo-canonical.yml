# Local equivalent command:
#   python -m sdetkit workflow-governance-report --root . --format text
#   See docs/ci/workflow-local-equivalents.md#adoption-real-repo-canonical for workflow-specific operator notes.
name: Adoption real-repo canonical replay

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "examples/adoption/real-repo/**"
      - "artifacts/adoption/real-repo-golden/**"
      - "docs/real-repo-adoption.md"
      - "docs/live-adoption-product-proof.md"
      - "docs/current-product-delta.md"
      - "docs/adoption-product-kpi-evidence.md"
      - "docs/formatter-policy-proposal-observation.md"
      - "docs/operator-reviewed-kpi-portfolio-report.md"
      - "docs/roadmap/product-roadmap.md"
      - "docs/evidence/adoption-product-kpi/**"
      - "docs/evidence/formatter-policy-proposal/**"
      - "docs/contracts/platform-capability-matrix.v1.json"
      - "docs/contracts/current-product-delta.v1.json"
      - "docs/contracts/adoption-product-kpi-evidence.v1.json"
      - "docs/contracts/formatter-policy-proposal-observation.v1.json"
      - "docs/ci-artifact-walkthrough.md"
      - "scripts/regenerate_real_repo_adoption_goldens.py"
      - "scripts/real_repo_adoption_projection.py"
      - "src/sdetkit/adoption_product_kpi_*.py"
      - "src/sdetkit/formatter_policy_proposal_observation.py"
      - "src/sdetkit/_formatter_policy_proposal_observation_*.py"
      - "src/sdetkit/product_maturity_radar.py"
      - "src/sdetkit/product_maturity_radar_portfolio.py"
      - "src/sdetkit/data/current_product_delta.v1.json"
      - "tests/test_adoption_product_kpi_*.py"
      - "tests/test_formatter_policy_proposal_observation.py"
      - "tests/test_product_maturity_radar.py"
      - "tests/test_product_maturity_radar_portfolio.py"
      - "tests/test_platform_capability_matrix.py"
      - "tests/test_current_product_delta_contract.py"
      - "tests/test_release_candidate_workflow_contract.py"
      - "pyproject.toml"
      - "CHANGELOG.md"
      - ".github/workflows/adoption-real-repo-canonical.yml"

permissions:
  contents: read

jobs:
  replay:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: "3.12"

      - name: Install sdetkit from this repo
        run: python -m pip install -c constraints-ci.txt -e .

      - name: Verify canonical goldens are fresh
        run: python scripts/regenerate_real_repo_adoption_goldens.py --check

      - name: Run canonical fixture path (capture rc, keep artifacts)
        working-directory: examples/adoption/real-repo
        shell: bash
        run: |
          set +e
          mkdir -p build

          python -m sdetkit gate fast --format json --stable-json --out build/gate-fast.json
          echo $? > build/gate-fast.rc

          python -m sdetkit gate release --format json --out build/release-preflight.json
          echo $? > build/release-preflight.rc

          python -m sdetkit doctor --format json --out build/doctor.json
          echo $? > build/doctor.rc

          python ../../../scripts/real_repo_adoption_projection.py \
            --fixture-root . \
            --repo-root ../../.. \
            --build-dir build \
            --out build/adoption-proof-summary.json

          set -e

      - name: Build reviewed product KPI evidence report
        run: |
          python -m sdetkit.adoption_product_kpi_report \
            --observations-json docs/evidence/adoption-product-kpi/reviewed-kpi-records.v1.json \
            --out build/sdetkit/adoption-product-kpi-report.json \
            --format text

      - name: Verify reviewed product KPI evidence freshness
        run: |
          python -m sdetkit.adoption_product_kpi_report \
            --observations-json docs/evidence/adoption-product-kpi/reviewed-kpi-records.v1.json \
            --out build/sdetkit/adoption-product-kpi-report.json \
            --check-freshness \
            --format text

      - name: Build formatter proposal observation report
        run: |
          python -m sdetkit.formatter_policy_proposal_observation \
            --observations docs/evidence/formatter-policy-proposal/reviewed-observations.v1.json \
            --out-dir build/formatter-policy-proposal-observation \
            --format text

      - name: Build product maturity radar
        run: |
          python -m sdetkit.product_maturity_radar \
            --root . \
            --out build/sdetkit/product-maturity-radar.json \
            --format text

      - name: Build reviewed KPI portfolio projection
        run: |
          python -m sdetkit.product_maturity_radar_portfolio \
            --root . \
            --radar-json build/sdetkit/product-maturity-radar.json \
            --kpi-report-json build/sdetkit/adoption-product-kpi-report.json \
            --proposal-observation-report-json build/formatter-policy-proposal-observation/formatter-policy-proposal-observation.json \
            --out build/sdetkit/product-maturity-radar-portfolio.json \
            --format text

      - name: Verify reviewed KPI portfolio freshness
        run: |
          python -m sdetkit.product_maturity_radar_portfolio \
            --root . \
            --radar-json build/sdetkit/product-maturity-radar.json \
            --kpi-report-json build/sdetkit/adoption-product-kpi-report.json \
            --proposal-observation-report-json build/formatter-policy-proposal-observation/formatter-policy-proposal-observation.json \
            --out build/sdetkit/product-maturity-radar-portfolio.json \
            --check-freshness \
            --format text

      - name: Upload canonical replay artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: adoption-real-repo-canonical
          retention-days: 14
          path: |
            examples/adoption/real-repo/build/gate-fast.json
            examples/adoption/real-repo/build/release-preflight.json
            examples/adoption/real-repo/build/doctor.json
            examples/adoption/real-repo/build/gate-fast.rc
            examples/adoption/real-repo/build/release-preflight.rc
            examples/adoption/real-repo/build/doctor.rc
            examples/adoption/real-repo/build/adoption-proof-summary.json
            build/sdetkit/adoption-product-kpi-report.json
            build/sdetkit/adoption-product-kpi-report.md
            build/formatter-policy-proposal-observation/formatter-policy-proposal-observation.json
            build/formatter-policy-proposal-observation/formatter-policy-proposal-observation.md
            build/sdetkit/product-maturity-radar.json
            build/sdetkit/product-maturity-radar.md
            build/sdetkit/product-maturity-radar-portfolio.json
            build/sdetkit/product-maturity-radar-portfolio.md
            docs/contracts/platform-capability-matrix.v1.json
            docs/contracts/formatter-policy-proposal-observation.v1.json
            docs/evidence/adoption-product-kpi/reviewed-kpi-records.v1.json
            docs/evidence/adoption-product-kpi/pallets-click-679a7a0-reviewed.json
            docs/evidence/adoption-product-kpi/devs69-pr2118-first-failure-reviewed.json
            docs/evidence/formatter-policy-proposal/reviewed-observations.v1.json
          if-no-files-found: error
