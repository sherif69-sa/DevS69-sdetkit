# Local equivalent command:
#   python -m sdetkit workflow-governance-report --root . --format text
#   See docs/ci/workflow-local-equivalents.md#adoption-real-repo-canonical for workflow-specific operator notes.
name: Adoption real-repo canonical replay

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "examples/adoption/real-repo/**"
      - "artifacts/adoption/real-repo-golden/**"
      - "docs/real-repo-adoption.md"
      - "docs/live-adoption-product-proof.md"
      - "docs/current-product-delta.md"
      - "docs/contracts/current-product-delta.v1.json"
      - "docs/ci-artifact-walkthrough.md"
      - "scripts/regenerate_real_repo_adoption_goldens.py"
      - "scripts/real_repo_adoption_projection.py"
      - "src/sdetkit/data/current_product_delta.v1.json"
      - "tests/test_current_product_delta_contract.py"
      - "tests/test_release_candidate_workflow_contract.py"
      - "pyproject.toml"
      - "CHANGELOG.md"
      - ".github/workflows/adoption-real-repo-canonical.yml"

permissions:
  contents: read

jobs:
  replay:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"

      - name: Install sdetkit from this repo
        run: python -m pip install -c constraints-ci.txt -e .

      - name: Verify canonical goldens are fresh
        run: python scripts/regenerate_real_repo_adoption_goldens.py --check

      - name: Run canonical fixture path (capture rc, keep artifacts)
        working-directory: examples/adoption/real-repo
        shell: bash
        run: |
          set +e
          mkdir -p build

          python -m sdetkit gate fast --format json --stable-json --out build/gate-fast.json
          echo $? > build/gate-fast.rc

          python -m sdetkit gate release --format json --out build/release-preflight.json
          echo $? > build/release-preflight.rc

          python -m sdetkit doctor --format json --out build/doctor.json
          echo $? > build/doctor.rc

          python ../../../scripts/real_repo_adoption_projection.py \
            --fixture-root . \
            --repo-root ../../.. \
            --build-dir build \
            --out build/adoption-proof-summary.json

          set -e

      - name: Upload SHA-bound canonical replay artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: adoption-real-repo-canonical-${{ github.sha }}
          retention-days: 14
          path: |
            examples/adoption/real-repo/build/gate-fast.json
            examples/adoption/real-repo/build/release-preflight.json
            examples/adoption/real-repo/build/doctor.json
            examples/adoption/real-repo/build/gate-fast.rc
            examples/adoption/real-repo/build/release-preflight.rc
            examples/adoption/real-repo/build/doctor.rc
            examples/adoption/real-repo/build/adoption-proof-summary.json
          if-no-files-found: error
