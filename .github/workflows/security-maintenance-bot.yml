name: Security Maintenance Bot

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    # Weekly run every Monname at 03:30 UTC.
    - cron: "30 3 * * 1"

permissions:
  actions: read
  contents: read
  issues: write
  security-events: write

jobs:
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Install gitleaks CLI
        run: |
          set -euo pipefail
          version="8.24.2"
          arch="linux_x64"
          url="https://github.com/gitleaks/gitleaks/releases/download/v${version}/gitleaks_${version}_${arch}.tar.gz"
          curl -fsSL "$url" -o /tmp/gitleaks.tar.gz
          mkdir -p /tmp/gitleaks-bin
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp/gitleaks-bin gitleaks
          chmod +x /tmp/gitleaks-bin/gitleaks
          /tmp/gitleaks-bin/gitleaks version

      - name: Run gitleaks
        run: |
          set -euo pipefail
          /tmp/gitleaks-bin/gitleaks detect \
            --source . \
            --config .gitleaks.toml \
            --gitleaks-ignore-path .gitleaksignore \
            --no-git \
            --report-format sarif \
            --report-path results.sarif \
            --redact \
            --exit-code 1

      - name: Check SARIF presence
        if: always()
        id: sarif
        run: |
          if [ -f results.sarif ]; then
            echo 'present=true' >> "$GITHUB_OUTPUT"
          else
            echo 'present=false' >> "$GITHUB_OUTPUT"
          fi

      - name: Send SARIF
        if: steps.sarif.outputs.present == 'true'
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225  # v4
        with:
          sarif_file: results.sarif

  weekly-maintenance-issue:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Create or update weekly maintenance issues
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const weekOf = new Date().toISOString().slice(0, 10);

            const maintenanceLabel = 'maintenance';
            const enhancementLabel = 'enhancement';
            const weakSpotLabel = 'maintenance:weak-spot';
            const priorityLabel = 'priority:medium';

            const labels = [
              { name: maintenanceLabel, color: '0E8A16', description: 'Automated maintenance tracking' },
              { name: enhancementLabel, color: 'a2eeef', description: 'Feature work and product improvements' },
              { name: weakSpotLabel, color: '5319e7', description: 'Auto-detected maintenance weak spots and follow-up suggestions' },
              { name: 'priority:high', color: 'd93f0b', description: 'High-priority work item' },
              { name: priorityLabel, color: 'fbca04', description: 'Medium-priority work item' },
              { name: 'priority:low', color: '0e8a16', description: 'Low-priority work item' },
            ];

            for (const lbl of labels) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name: lbl.name });
              } catch {
                await github.rest.issues.createLabel({ owner, repo, ...lbl });
              }
            }

            const openIssues = (await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: 'open',
              per_page: 100,
            })).filter((issue) => !issue.pull_request);
            const recentIssues = [];
            let recentIssuePages = 0;
            for await (const response of github.paginate.iterator(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: 'all',
              per_page: 100,
            })) {
              recentIssues.push(...response.data.filter((issue) => !issue.pull_request));
              recentIssuePages += 1;
              if (recentIssuePages >= 3) {
                break;
              }
            }
            const hasLabel = (issue, label) => issue.labels?.some((entry) => {
              if (typeof entry === 'string') {
                return entry === label;
              }
              return entry?.name === label;
            });
            const findIssueByPrefix = (prefix) => recentIssues.find((issue) => issue.title.startsWith(prefix));
            const relatedIssueLinks = [
              ['GHAS digest', '🛡️ GHAS weekly digest'],
              ['GHAS campaign planner', '🧭 GHAS campaign planner'],
              ['GHAS alert SLA tracker', '⏱️ GHAS alert SLA tracker'],
              ['GHAS metrics snapshot', '📊 GHAS metrics snapshot'],
              ['GHAS CodeQL hotspots', '🧪 GHAS CodeQL hotspots'],
              ['GHAS configuration audit', '🧱 GHAS configuration audit'],
              ['Workflow governance audit', '🧾 Workflow governance audit'],
              ['Secret protection review', '🔑 Secret protection review'],
              ['Repo optimization control loop', '🧠 Repo optimization control loop'],
              ['Dependency radar', '📡 Dependency radar + runtime watchlist'],
            ]
              .map(([label, prefix]) => {
                const issue = findIssueByPrefix(prefix);
                return issue ? `- ${label}: ${issue.html_url}` : null;
              })
              .filter(Boolean);

            const mainTitle = `🔐 Weekly security + maintenance checklist (${weekOf})`;
            const mainBody = [
              'This issue is auto-generated to keep the repository secure and continuously updated.',
              '',
              '## Security auto-update checklist',
              '- [ ] Review Dependabot PRs and approve any major upgrades.',
              '- [ ] Confirm all GHAS and security workflows are green in Actions (security.yml, osv-scanner.yml, dependency-audit.yml, sbom.yml, dependency-review.yml, ghas-review-bot.yml, ghas-campaign-bot.yml, ghas-alert-sla-bot.yml, ghas-metrics-export-bot.yml, ghas-codeql-hotspots-bot.yml, security-configuration-audit-bot.yml, secret-protection-review-bot.yml, workflow-governance-bot.yml, security-maintenance-bot.yml).',
              '- [ ] Review GitHub code scanning, Dependabot, and secret-scanning alerts and close/resolution as needed.',
              '- [ ] Review the weekly GHAS digest issue and assign owners to any open high-severity findings.',
              '- [ ] Review the GHAS campaign planner issue for Copilot Autofix opportunities, alert-age slices, and push-protection bypass follow-up.',
              '- [ ] Review the GHAS alert SLA tracker and convert every 14+ day breach into an owned issue or PR.',
              '- [ ] Review the GHAS metrics snapshot artifact before weekly reporting or roadmap updates.',
              '- [ ] Review the GHAS CodeQL hotspots issue and batch the top rule or file into one remediation lane.',
              '- [ ] Review the latest workflow governance audit for permissions/pinning drift.',
              '- [ ] Review the secret protection review issue for push-protection bypass, delegated bypass, and validity-check follow-up.',
              '- [ ] Review the repo optimization control-loop issue and choose one `now` candidate or search mission.',
              '- [ ] Review open vulnerabilities in Dependency graph.',
              '',
              '## Suggested enhancement pipeline',
              '- [ ] Open at least 1 enhancement issue from customer/user feedback.',
              '- [ ] Tag enhancements with `enhancement` and priority labels.',
              '- [ ] Link roadmap updates in `docs/roadmap.md`.',
              '- [ ] Review the dependency radar issue and select at least one validation-linked upgrade candidate.',
              '',
              '## Related weekly issue links',
              ...(relatedIssueLinks.length ? relatedIssueLinks : ['- No related weekly issues are currently open.']),
              '',
              '## Quick links',
              `- Code scanning: https://github.com/${owner}/${repo}/security/code-scanning`,
              `- Dependabot: https://github.com/${owner}/${repo}/security/dependabot`,
              `- Actions: https://github.com/${owner}/${repo}/actions`,
            ].join('\n');

            const maintenanceIssues = openIssues.filter((issue) => hasLabel(issue, maintenanceLabel));
            const previousMaintenance = maintenanceIssues.filter((i) => i.title.startsWith('🔐 Weekly security + maintenance checklist'));
            for (const oldIssue of previousMaintenance) {
              if (oldIssue.title !== mainTitle) {
                await github.rest.issues.update({ owner, repo, issue_number: oldIssue.number, state: 'closed' });
              }
            }

            const existingMain = previousMaintenance.find((i) => i.title === mainTitle);
            if (existingMain) {
              await github.rest.issues.update({ owner, repo, issue_number: existingMain.number, body: mainBody });
            } else {
              await github.rest.issues.create({ owner, repo, title: mainTitle, body: mainBody, labels: [maintenanceLabel] });
            }

            const monthOf = weekOf.slice(0, 7);
            const enhancementTitle = `🧩 Monthly enhancement intake from user feedback (${monthOf})`;
            const enhancementBody = [
              'This issue is auto-generated to ensure at least one enhancement candidate is always tracked.',
              '',
              '## Enhancement backlog starter',
              '- [ ] Capture one concrete user pain point from support, issues, or docs feedback.',
              '- [ ] Define acceptance criteria and expected impact.',
              '- [ ] Add/update roadmap context in `docs/roadmap.md`.',
              '',
              '## Candidate details (fill in)',
              '- **User pain point:**',
              '- **Acceptance criteria:**',
              '- **Expected impact:**',
              '',
              '## Suggested metadata',
              `- Labels: \`${enhancementLabel}\`, \`${priorityLabel}\``,
              '- Link the final implementation PR back to this issue.',
            ].join('\n');

            const enhancementIssues = openIssues.filter(
              (issue) => hasLabel(issue, enhancementLabel)
                && issue.title.startsWith('🧩 Monthly enhancement intake from user feedback'),
            );
            for (const oldIssue of enhancementIssues) {
              if (oldIssue.title !== enhancementTitle) {
                await github.rest.issues.update({ owner, repo, issue_number: oldIssue.number, state: 'closed' });
              }
            }
            const existingEnhancement = enhancementIssues.find((i) => i.title === enhancementTitle);
            if (existingEnhancement) {
              await github.rest.issues.update({ owner, repo, issue_number: existingEnhancement.number, body: enhancementBody });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title: enhancementTitle,
                body: enhancementBody,
                labels: [enhancementLabel, priorityLabel],
              });
            }

            const trackedWorkflows = [
              'security.yml',
              'osv-scanner.yml',
              'dependency-audit.yml',
              'sbom.yml',
              'dependency-review.yml',
              'ghas-review-bot.yml',
              'ghas-campaign-bot.yml',
              'ghas-alert-sla-bot.yml',
              'ghas-metrics-export-bot.yml',
              'security-configuration-audit-bot.yml',
              'secret-protection-review-bot.yml',
              'dependency-radar-bot.yml',
              'repo-optimization-bot.yml',
              'workflow-governance-bot.yml',
              'ghas-codeql-hotspots-bot.yml',
              'security-maintenance-bot.yml',
              'ci.yml',
              'quality.yml',
            ];
            const now = Date.now();
            const staleMs = 14 * 24 * 60 * 60 * 1000;
            const weakSpots = [];
            const automatedMaintenancePrefixes = [
              '🔐 Weekly security + maintenance checklist',
              '🛠️ Weekly maintenance weak-spot report',
              '🤖 Worker alignment radar',
              '📚 Docs experience radar',
              '📡 Dependency radar + runtime watchlist',
              '⚡ Runtime fast-follow watchlist',
              '📣 Adapter smoke pack',
              '🕸️ Integration topology radar',
              '🧾 Workflow governance audit',
              '🧱 GHAS configuration audit',
              '🧩 Monthly enhancement intake from user feedback',
              '🧠 Repo optimization control loop',
            ];

            for (const workflowFile of trackedWorkflows) {
              try {
                const runs = await github.rest.actions.listWorkflowRuns({
                  owner,
                  repo,
                  workflow_id: workflowFile,
                  per_page: 5,
                });
                const latest = runs.data.workflow_runs?.[0];
                if (!latest) {
                  weakSpots.push({
                    area: `Workflow: ${workflowFile}`,
                    observation: 'No workflow runs found.',
                    suggestion: `Trigger \`${workflowFile}\` manually and verify the workflow is enabled.`,
                  });
                  continue;
                }

                const updatedAt = new Date(latest.updated_at).getTime();
                if (Number.isFinite(updatedAt) && now - updatedAt > staleMs) {
                  weakSpots.push({
                    area: `Workflow freshness: ${workflowFile}`,
                    observation: `Latest run is stale (${latest.updated_at}).`,
                    suggestion: 'Review schedule/event triggers to ensure regular execution.',
                  });
                }

                const status = latest.status || 'unknown';
                if (status !== 'completed') {
                  continue;
                }

                const conclusion = latest.conclusion || 'unknown';
                if (!['success', 'neutral', 'skipped'].includes(conclusion)) {
                  weakSpots.push({
                    area: `Workflow health: ${workflowFile}`,
                    observation: `Latest run ended with \`${conclusion}\` (run ${latest.html_url}).`,
                    suggestion: 'Triage failing jobs and convert recurring incidents into maintenance backlog items.',
                  });
                }
              } catch (error) {
                weakSpots.push({
                  area: `Workflow inspection: ${workflowFile}`,
                  observation: `Unable to inspect workflow runs (${error.message}).`,
                  suggestion: 'Check workflow file name/permissions and re-run this automation.',
                });
              }
            }

            const staleOpenIssues = openIssues.filter((issue) => {
              if (!hasLabel(issue, maintenanceLabel)) return false;
              if (automatedMaintenancePrefixes.some((prefix) => issue.title.startsWith(prefix))) return false;
              const updatedAt = new Date(issue.updated_at).getTime();
              return Number.isFinite(updatedAt) && now - updatedAt > staleMs;
            });

            if (staleOpenIssues.length > 0) {
              weakSpots.push({
                area: 'Maintenance issue hygiene',
                observation: `${staleOpenIssues.length} maintenance issue(s) have been open with no recent updates for 14+ days.`,
                suggestion: 'Close outdated trackers or convert them into actionable implementation issues with owners.',
              });
            }

            const weakTitle = `🛠️ Weekly maintenance weak-spot report (${weekOf})`;
            const weakBody = [
              'This issue is auto-generated to identify weaker spots in maintenance operations and propose concrete follow-up actions.',
              '',
              `Detected weak spots: **${weakSpots.length}**`,
              '',
              '| Area | Observation | Suggested action |',
              '| --- | --- | --- |',
              ...(weakSpots.length
                ? weakSpots.map((spot) => `| ${spot.area} | ${spot.observation} | ${spot.suggestion} |`)
                : ['| Baseline | No weak spots detected this week. | Keep current maintenance cadence and continue monitoring. |']),
              '',
              '## Suggested follow-up workflow',
              '- [ ] Convert high-impact weak spots into `enhancement` or `maintenance` issues.',
              '- [ ] Add acceptance criteria and expected impact to each follow-up issue.',
              '- [ ] Link implemented fixes back to this report and `docs/roadmap.md`.',
            ].join('\n');

            const weakOpen = openIssues.filter(
              (issue) => hasLabel(issue, maintenanceLabel)
                && hasLabel(issue, weakSpotLabel)
                && issue.title.startsWith('🛠️ Weekly maintenance weak-spot report'),
            );

            for (const oldIssue of weakOpen) {
              if (oldIssue.title !== weakTitle) {
                await github.rest.issues.update({ owner, repo, issue_number: oldIssue.number, state: 'closed' });
              }
            }

            const existingWeak = weakOpen.find((i) => i.title === weakTitle);
            if (existingWeak) {
              await github.rest.issues.update({ owner, repo, issue_number: existingWeak.number, body: weakBody });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title: weakTitle,
                body: weakBody,
                labels: [maintenanceLabel, weakSpotLabel, priorityLabel],
              });
            }
