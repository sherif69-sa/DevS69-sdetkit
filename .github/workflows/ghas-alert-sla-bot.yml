# Local equivalent command:
#   python -m sdetkit workflow-governance-report --root . --format text
#   See docs/ci/workflow-local-equivalents.md#ghas-alert-sla-bot for workflow-specific operator notes.
name: GHAS Alert SLA Bot

on:
  workflow_dispatch:
  schedule:
    - cron: "15 6 * * 3"

permissions:
  contents: read
  issues: write
  security-events: read

jobs:
  ghas-alert-sla:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - name: Create GHAS alert SLA tracker issue
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
        env:
          GHAS_TOKEN: ${{ secrets.GHAS_READ_TOKEN }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const {
              collectedAlerts,
              unavailableAlerts,
              metricOrUnknown,
              slaAlertMetrics,
            } = require(`${process.env.GITHUB_WORKSPACE}/scripts/ghas_tracker_state.js`);
            const weekOf = new Date().toISOString().slice(0, 10);
            const labels = [
              { name: 'maintenance', color: '0E8A16', description: 'Automated maintenance tracking' },
              { name: 'security', color: 'b60205', description: 'Security operations and hardening work' },
              { name: 'ghas', color: '5319e7', description: 'GitHub Advanced Security automation and triage' },
              { name: 'priority:high', color: 'd93f0b', description: 'High-priority work item' },
            ];

            for (const label of labels) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name: label.name });
              } catch {
                await github.rest.issues.createLabel({ owner, repo, ...label });
              }
            }

            const ghasToken = process.env.GHAS_TOKEN || github.token;
            const headers = {
              accept: 'application/vnd.github+json',
              authorization: `Bearer ${ghasToken}`,
              'x-github-api-version': '2022-11-28',
            };
            const notes = [];
            const dayMs = 24 * 60 * 60 * 1000;

            async function fetchAlerts(path, label) {
              try {
                const alerts = await github.paginate(`GET ${path}`, {
                  owner,
                  repo,
                  state: 'open',
                  per_page: 100,
                  headers,
                });
                return collectedAlerts(alerts, label);
              } catch (error) {
                const result = unavailableAlerts(label, error);
                notes.push(
                  `${result.note}. Add GHAS_READ_TOKEN if broader security scopes are required.`
                );
                return result;
              }
            }

            function ageDays(alert) {
              const raw = alert.created_at || alert.updated_at || alert.dismissed_at;
              const createdMs = new Date(raw).getTime();
              if (!Number.isFinite(createdMs)) return 0;
              return Math.max(0, Math.floor((Date.now() - createdMs) / dayMs));
            }

            function summarizeSeverity(alerts, pickSeverity) {
              const counts = new Map();
              for (const alert of alerts) {
                const severity = pickSeverity(alert);
                counts.set(severity, (counts.get(severity) || 0) + 1);
              }
              return counts;
            }

            function topOldCodeRules(alerts) {
              const counts = new Map();
              for (const alert of alerts.filter((item) => ageDays(item) >= 14)) {
                const key = alert.rule?.id || alert.rule?.name || 'unknown-rule';
                counts.set(key, (counts.get(key) || 0) + 1);
              }
              return [...counts.entries()]
                .sort((a, b) => b[1] - a[1] || String(a[0]).localeCompare(String(b[0])))
                .slice(0, 5);
            }

            function mapLines(map, prefix, preferredOrder = []) {
              if (map.size === 0) return [`- ${prefix}: none`];
              const rank = new Map(preferredOrder.map((name, index) => [name, index]));
              return [...map.entries()]
                .sort((a, b) => {
                  const left = rank.has(a[0]) ? rank.get(a[0]) : Number.MAX_SAFE_INTEGER;
                  const right = rank.has(b[0]) ? rank.get(b[0]) : Number.MAX_SAFE_INTEGER;
                  if (left !== right) return left - right;
                  return String(a[0]).localeCompare(String(b[0]));
                })
                .map(([key, value]) => `- ${prefix} ${key}: **${value}**`);
            }

            const codeAlerts = await fetchAlerts('/repos/{owner}/{repo}/code-scanning/alerts', 'Code scanning alerts');
            const dependabotAlerts = await fetchAlerts('/repos/{owner}/{repo}/dependabot/alerts', 'Dependabot alerts');
            const secretAlerts = await fetchAlerts('/repos/{owner}/{repo}/secret-scanning/alerts', 'Secret scanning alerts');
            const slaMetrics = slaAlertMetrics(codeAlerts, dependabotAlerts, secretAlerts, ageDays);

            const codeSeverity = metricOrUnknown(
              codeAlerts,
              (alerts) => summarizeSeverity(
                alerts,
                (alert) => alert.rule?.security_severity_level || alert.rule?.severity || 'unknown'
              )
            );
            const dependabotSeverity = metricOrUnknown(
              dependabotAlerts,
              (alerts) => summarizeSeverity(
                alerts,
                (alert) => alert.security_vulnerability?.severity || alert.severity || 'unknown'
              )
            );
            const severityOrder = ['critical', 'high', 'medium', 'low', 'warning', 'note', 'unknown'];
            const oldCodeRules = metricOrUnknown(codeAlerts, topOldCodeRules);

            const title = `⏱️ GHAS alert SLA tracker (${weekOf})`;
            const body = [
              'This issue is auto-generated to force older GHAS backlog slices into a time-bound remediation lane.',
              '',
              '## SLA snapshot',
              `- Open code scanning alerts: **${slaMetrics.codeScanning}**`,
              `- Open Dependabot alerts: **${slaMetrics.dependabot}**`,
              `- Open secret scanning alerts: **${slaMetrics.secretScanning}**`,
              `- Secret-scanning alerts with push-protection bypass: **${slaMetrics.secretBypassed}**`,
              '',
              '## Age-based SLA breaches',
              `- Code scanning aged 7+ days: **${slaMetrics.codeAged7}**`,
              `- Code scanning aged 14+ days: **${slaMetrics.codeAged14}**`,
              `- Code scanning aged 30+ days: **${slaMetrics.codeAged30}**`,
              `- High-severity code scanning alerts aged 14+ days: **${slaMetrics.highSeverityCodeAged}**`,
              `- Dependabot alerts aged 7+ days: **${slaMetrics.dependabotAged7}**`,
              `- Dependabot alerts aged 14+ days: **${slaMetrics.dependabotAged14}**`,
              `- Dependabot alerts aged 30+ days: **${slaMetrics.dependabotAged30}**`,
              `- High/critical Dependabot alerts aged 14+ days: **${slaMetrics.criticalDependabotAged}**`,
              `- Secret scanning alerts aged 7+ days: **${slaMetrics.secretAged7}**`,
              `- Secret scanning alerts aged 14+ days: **${slaMetrics.secretAged14}**`,
              `- Secret scanning alerts aged 30+ days: **${slaMetrics.secretAged30}**`,
              `- Push-protection bypassed secret alerts aged 7+ days: **${slaMetrics.secretBypassedAged}**`,
              '',
              '## Severity slices',
              ...(codeSeverity === 'unknown' ? ['- Code scanning severity: unknown'] : mapLines(codeSeverity, 'Code scanning severity', severityOrder)),
              ...(dependabotSeverity === 'unknown' ? ['- Dependabot severity: unknown'] : mapLines(dependabotSeverity, 'Dependabot severity', severityOrder)),
              '',
              '## Older CodeQL rules to batch together',
              ...(oldCodeRules === 'unknown'
                ? ['- Code-scanning rule age data: unknown.']
                : (oldCodeRules.length
                  ? oldCodeRules.map(([rule, count]) => `- ${rule}: **${count}** alert(s) aged 14+ days`)
                  : ['- No code-scanning rules currently breach the 14+ day SLA window.'])),
              '',
              '## Suggested execution lane',
              '- [ ] Convert every 14+ day high-severity code or Dependabot alert into an owned issue or PR.',
              '- [ ] Group 14+ day CodeQL alerts by rule into one focused remediation batch and use Copilot Autofix when appropriate.',
              '- [ ] Treat push-protection bypassed secret alerts as same-week work until resolved or explicitly dismissed.',
              '- [ ] Link resulting PRs or follow-up issues back to this SLA tracker for audit history.',
              '',
              '## Collection status',
              `- Code scanning: **${codeAlerts.status}**`,
              `- Dependabot: **${dependabotAlerts.status}**`,
              `- Secret scanning: **${secretAlerts.status}**`,
              '',
              '## Review links',
              `- Code scanning: https://github.com/${owner}/${repo}/security/code-scanning`,
              `- Dependabot: https://github.com/${owner}/${repo}/security/dependabot`,
              `- Secret scanning: https://github.com/${owner}/${repo}/security/secret-scanning`,
              '',
              '## Notes',
              ...(notes.length ? notes.map((note) => `- ${note}`) : ['- GHAS APIs responded without fallback warnings.']),
            ].join('\n');

            const openIssues = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              labels: 'ghas',
              per_page: 100,
            });
            const priorIssues = openIssues.data.filter((issue) => issue.title.startsWith('⏱️ GHAS alert SLA tracker'));

            for (const oldIssue of priorIssues) {
              if (oldIssue.title !== title) {
                await github.rest.issues.update({ owner, repo, issue_number: oldIssue.number, state: 'closed' });
              }
            }

            const existing = priorIssues.find((issue) => issue.title === title);
            if (existing) {
              await github.rest.issues.update({ owner, repo, issue_number: existing.number, body });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
                labels: ['maintenance', 'security', 'ghas', 'priority:high'],
              });
            }
