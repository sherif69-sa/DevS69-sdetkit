name: agent-format-once

on:
  push:
    branches:
      - agent/dotnet-failure-vector

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: agent/dotnet-failure-vector
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"

      - name: Format the adapter
        run: |
          python -m pip install ruff==0.15.21
          python -m ruff format --line-length 100 src/sdetkit/failure_vector_adapters.py

      - name: Commit formatter output
        run: |
          if git diff --quiet -- src/sdetkit/failure_vector_adapters.py; then
            echo "No formatter changes required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/sdetkit/failure_vector_adapters.py
          git commit -m "style(diagnosis): apply ruff formatting"
          git push origin HEAD:agent/dotnet-failure-vector
