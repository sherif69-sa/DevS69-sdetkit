name: Formatter policy proposal activation

on:
  pull_request:
    types: [synchronize]

permissions:
  contents: write

jobs:
  activate:
    if: github.head_ref == 'feature/formatter-policy-proposal'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout proposal branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: feature/formatter-policy-proposal
          fetch-depth: 0

      - name: Add reopen event and remove activation helper
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          path = Path('.github/workflows/formatter-policy-proposal-proof.yml')
          text = path.read_text(encoding='utf-8')
          old = 'on:\n  push:\n'
          new = 'on:\n  pull_request:\n    types: [reopened]\n  push:\n'
          if text.count(old) != 1:
              raise SystemExit(f'expected one workflow event marker, found {text.count(old)}')
          path.write_text(text.replace(old, new), encoding='utf-8')
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/formatter-policy-proposal-activation.yml
          git add .github/workflows/formatter-policy-proposal-proof.yml
          git commit -m "chore(remediation): arm proposal proof on reopen"
          git push origin HEAD:feature/formatter-policy-proposal
