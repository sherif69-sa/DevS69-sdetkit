name: diagnose-pr-2006-pytest

on:
  push:
    branches:
      - feat/adoption-gitlab-ci-proof-commands

permissions:
  contents: write

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: feat/adoption-gitlab-ci-proof-commands
          fetch-depth: 0
      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          python -m pip install -c constraints-ci.txt --upgrade pip
          python -m pip install -c constraints-ci.txt -r requirements.txt
      - name: Run concise pytest diagnostic
        run: |
          set +e
          python -m pytest -q -x --tb=short | tee pytest-pr-2006-diagnostic.log
          code=${PIPESTATUS[0]}
          echo "pytest_exit_code=$code" | tee -a pytest-pr-2006-diagnostic.log
          exit 0
      - name: Upload diagnostic
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: pytest-pr-2006-diagnostic
          path: pytest-pr-2006-diagnostic.log
      - name: Remove temporary diagnostic workflow
        run: |
          rm .github/workflows/diagnose-pr-2006-pytest.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/workflows/diagnose-pr-2006-pytest.yml
          git commit -m 'chore(adoption): remove temporary pytest diagnostic'
          git push origin HEAD:feat/adoption-gitlab-ci-proof-commands
