# Local equivalent command:
#   python -m sdetkit workflow-governance-report --root . --format text
#   See docs/ci/workflow-local-equivalents.md#versioning for workflow-specific operator notes.
name: Versioning & Changelog

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  changelog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: "3.12"

      - name: Ensure CHANGELOG has current version
        run: |
          set -euo pipefail
          version=$(python - <<'PY'
          import re
          from pathlib import Path
          text = Path('pyproject.toml').read_text(encoding='utf-8')
          m = re.search(r'^version\s*=\s*"([^"]+)"', text, re.M)
          if not m:
              raise SystemExit('version not found')
          print(m.group(1))
          PY
          )
          if ! grep -Eq "^##[[:space:]]+\[?v?${version}\]?" CHANGELOG.md; then
            echo "CHANGELOG.md missing heading for version ${version}"
            exit 1
          fi
