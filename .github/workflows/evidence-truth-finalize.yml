name: Evidence truth finalization

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  refresh-and-prove:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: agent/evidence-truth-dogfood
          fetch-depth: 0

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.12"

      - name: Replace committed secret-shaped fixture
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("tests/contract/check_installed_wheel.py")
          text = path.read_text(encoding="utf-8")
          call_line = '        (fixture / "config.env").write_text(\n'
          secret_literal = '"token=' + "gh" + "p_" + "ABCDEFGHIJKLMNOPQRSTUVWXYZ1234567890" + r'\n",'
          old_line = "            " + secret_literal + "\n"
          new_line = '            f"token={fake_secret}\\n",\n'
          if text.count(call_line) != 1 or text.count(old_line) != 1:
              raise SystemExit("installed-wheel security fixture markers do not match")
          text = text.replace(
              call_line,
              '        fake_secret = "gh" + "p_" + ("ABCD" * 8) + "1234"\n' + call_line,
              1,
          )
          text = text.replace(old_line, new_line, 1)
          path.write_text(text, encoding="utf-8")
          PY

      - name: Install proof dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -c constraints-ci.txt -e .[dev,test,docs,packaging]

      - name: Refresh canonical generated evidence
        run: |
          python scripts/sync_feature_registry_docs.py
          python scripts/regenerate_real_repo_adoption_goldens.py
          git status --short
          git diff --stat

      - name: Validate focused source and contracts
        run: |
          python -m ruff format tests/contract/check_installed_wheel.py
          python -m ruff check \
            src/sdetkit/cpp_operator_proof.py \
            src/sdetkit/doctor.py \
            src/sdetkit/failure_vector_cpp.py \
            src/sdetkit/investigate.py \
            src/sdetkit/repo.py \
            tests/contract/check_installed_wheel.py \
            tests/test_cpp_failure_vector_adapters.py \
            tests/test_cpp_operator_proof.py \
            tests/test_doctor_evidence_truth.py \
            tests/test_investigate_failure.py \
            tests/test_repo_version_truth.py
          python -m pytest -q \
            tests/test_cpp_failure_vector_adapters.py \
            tests/test_cpp_operator_proof.py \
            tests/test_doctor_evidence_truth.py \
            tests/test_investigate_failure.py \
            tests/test_repo_version_truth.py \
            -o addopts=

      - name: Validate freshness and repository audit
        run: |
          python scripts/check_generated_artifacts_freshness.py
          sdetkit repo check --format json --out report.json --force

      - name: Validate isolated wheel dogfood
        shell: bash
        run: |
          rm -rf dist build/wheel-final .venv-final
          python -m build > build-wheel.log 2>&1
          python -m venv .venv-final
          . .venv-final/bin/activate
          WHEEL_PATH="$(find dist -type f -name '*.whl' | head -n 1)"
          python -m pip install -q -c constraints-ci.txt "$WHEEL_PATH"
          python tests/contract/check_installed_wheel.py \
            --python "$(pwd)/.venv-final/bin/python" \
            --repo-root "$(pwd)"

      - name: Commit clean finalization
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/evidence-truth-finalize.yml
          git add \
            tests/contract/check_installed_wheel.py \
            docs/feature-registry.md \
            artifacts/adoption/real-repo-golden
          git commit -m "fix(evidence): refresh dogfood evidence truth"
          git push origin HEAD:agent/evidence-truth-dogfood
