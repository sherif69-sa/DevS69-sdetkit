name: PR Quality Comment

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml
            requirements-test.txt
            requirements-docs.txt

      - name: Install dependencies
        run: |
          python -m pip install -r requirements-test.txt -r requirements-docs.txt -e .

      - name: Run quality gate
        id: quality
        continue-on-error: true
        env:
          COV_FAIL_UNDER: "95"
        run: |
          bash quality.sh cov 2>&1 | tee quality.log

      - name: Build adaptive diagnosis
        if: always()
        continue-on-error: true
        run: |
          mkdir -p build/pr-quality
          PYTHONPATH=src python -m sdetkit.adaptive_diagnosis \
            --log quality.log \
            --format json \
            --out build/pr-quality/adaptive-diagnosis.json
          python - <<'PY' > build/pr-quality/adaptive-diagnosis-comment.md
          import json
          from pathlib import Path

          path = Path("build/pr-quality/adaptive-diagnosis.json")
          if not path.exists():
              raise SystemExit(0)

          payload = json.loads(path.read_text(encoding="utf-8"))
          if payload.get("status") in {"clear", "monitor"}:
              raise SystemExit(0)

          diagnoses = payload.get("diagnoses") or []
          if not diagnoses:
              raise SystemExit(0)

          first = diagnoses[0]
          fixes = first.get("recommended_fix") or []
          commands = first.get("proof_commands") or []

          print("### Adaptive Diagnosis")
          print(f"- status: `{payload.get('status', 'unknown')}`")
          print(f"- risk score: `{payload.get('risk_score', 'unknown')}`")
          print(f"- confidence: `{payload.get('confidence', 'unknown')}`")
          print(f"- primary issue: **{first.get('title', 'Unknown issue')}**")
          print()
          print("Why developers miss it:")
          print(first.get("why_developers_miss_it", "No hidden-risk explanation available."))
          if fixes:
              print()
              print("Recommended fix:")
              print(f"- {fixes[0]}")
          if commands:
              print()
              print("Proof command:")
              print(f"- `{commands[0]}`")
          PY

      - name: Build PR comment body
        run: |
          mkdir -p build/pr-quality
          coverage_line="$(grep -E 'Total coverage: [0-9]+\.[0-9]+%' quality.log | tail -n1 || true)"
          coverage_pct="$(echo "$coverage_line" | sed -E 's/.*Total coverage: ([0-9]+\.[0-9]+)%.*/\1/' || true)"
          [ -z "$coverage_pct" ] && coverage_pct="unknown"

          if [ "${{ steps.quality.outcome }}" = "success" ]; then
            {
              echo '✅ quality.sh cov passed'
              echo "- coverage: ${coverage_pct}%"
              echo '- checks: lint + tests + coverage gate are green for this PR run'
              if [ -s build/pr-quality/adaptive-diagnosis-comment.md ]; then
                echo ''
                cat build/pr-quality/adaptive-diagnosis-comment.md
              fi
            } > build/pr-quality/pr-comment-body.md
          else
            {
              echo '❌ quality.sh cov failed (see workflow logs for details)'
              echo "- coverage (last reported): ${coverage_pct}%"
              echo '- suggested fix: run `python -m pip install -r requirements-test.txt -e . && bash quality.sh cov` locally'
              if [ -s build/pr-quality/adaptive-diagnosis-comment.md ]; then
                echo ''
                cat build/pr-quality/adaptive-diagnosis-comment.md
              fi
            } > build/pr-quality/pr-comment-body.md
          fi

      - name: Comment on PR
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
        with:
          script: |
            const fs = require('fs');
            const text = fs.readFileSync('build/pr-quality/pr-comment-body.md', 'utf8');
            const body = `### SDET Quality Gate\n${text}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
