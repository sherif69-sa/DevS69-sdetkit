name: PR Quality Comment

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  issues: write
  pull-requests: write
  checks: read
  actions: read
  security-events: read
concurrency:
  group: pr-quality-comment-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml
            requirements-test.txt
            requirements-docs.txt

      - name: Install dependencies
        run: |
          python -m pip install -c constraints-ci.txt -r requirements-test.txt -r requirements-docs.txt -e .

      - name: Run quality gate
        id: quality
        continue-on-error: true
        env:
          COV_FAIL_UNDER: "95"
        run: |
          set -o pipefail
          bash quality.sh cov 2>&1 | tee quality.log

      - name: Build adaptive failure intelligence bundle
        if: always()
        run: |
          mkdir -p build/pr-quality/failure-intelligence
          if [ -f quality.log ]; then
            proof_flag="--proof-failed"
            if [ "${{ steps.quality.outcome }}" = "success" ]; then
              proof_flag="--proof-passed"
            fi
            PYTHONPATH=src python -m sdetkit adaptive failure-bundle \
              --log quality.log \
              --out-dir build/pr-quality/failure-intelligence \
              "${proof_flag}" \
              --format text
          fi

      - name: Run adaptive sentinel scan
        if: always()
        run: |
          mkdir -p build/sdetkit/sentinel
          PYTHONPATH=src python -m sdetkit adaptive sentinel scan \
            --root . \
            --out-dir build/sdetkit/sentinel \
            --format text \
            --no-fail

      - name: Collect security review evidence
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY_OWNER: ${{ github.repository_owner }}
          REPOSITORY_NAME: ${{ github.event.repository.name }}
        run: |
          mkdir -p build/pr-quality/security-review
          gh api graphql \
            -F owner="$REPOSITORY_OWNER" \
            -F repo="$REPOSITORY_NAME" \
            -F number="$PR_NUMBER" \
            -f query='
              query($owner: String!, $repo: String!, $number: Int!) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $number) {
                    reviewThreads(first: 100) {
                      nodes {
                        isResolved
                        isOutdated
                        path
                        line
                        comments(first: 20) {
                          nodes {
                            author { login }
                            body
                            url
                            createdAt
                          }
                        }
                      }
                    }
                  }
                }
              }
            ' > build/pr-quality/security-review/review-threads.json || echo '{"data":{}}' > build/pr-quality/security-review/review-threads.json

          PYTHONPATH=src python -m sdetkit.security_review_evidence \
            --review-threads-json build/pr-quality/security-review/review-threads.json \
            --sentinel-control-room build/sdetkit/sentinel/control-room.json \
            --merged-control-room build/sdetkit/sentinel/control-room-with-security-review.json \
            --out-dir build/pr-quality/security-review

      - name: Collect code scanning alert evidence
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY_OWNER: ${{ github.repository_owner }}
          REPOSITORY_NAME: ${{ github.event.repository.name }}
        run: |
          mkdir -p build/pr-quality/code-scanning

          collection_status="collected"
          collection_reason=""
          if ! gh api             -H "Accept: application/vnd.github+json"             "repos/$REPOSITORY_OWNER/$REPOSITORY_NAME/code-scanning/alerts?state=open&pr=$PR_NUMBER&per_page=100"             > build/pr-quality/code-scanning/alerts-raw.json; then
            collection_status="unavailable"
            collection_reason="GitHub code-scanning alerts API was unavailable or not permitted."
            printf '[]\n' > build/pr-quality/code-scanning/alerts-raw.json
          fi

          COLLECTION_STATUS="$collection_status" COLLECTION_REASON="$collection_reason" python - <<'PYCODE'
          import json
          import os
          from pathlib import Path

          raw_path = Path("build/pr-quality/code-scanning/alerts-raw.json")
          raw = json.loads(raw_path.read_text(encoding="utf-8"))
          alerts = raw if isinstance(raw, list) else []

          payload = {
              "collection_status": os.environ["COLLECTION_STATUS"],
              "collection_reason": os.environ["COLLECTION_REASON"],
              "alerts": alerts,
          }
          Path("build/pr-quality/code-scanning/alerts.json").write_text(
              json.dumps(payload, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PYCODE


      - name: Diagnose security findings read-only
        if: always()
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          mkdir -p build/pr-quality/security-diagnosis
          PYTHONPATH=src python -m sdetkit.security_finding_diagnosis \
            --review-threads-json build/pr-quality/security-review/review-threads.json \
            --code-scanning-alerts-json build/pr-quality/code-scanning/alerts.json \
            --current-head-sha "$HEAD_SHA" \
            --root . \
            --out-dir build/pr-quality/security-diagnosis \
            --format json

      - name: Build PR check intelligence action report
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY_OWNER: ${{ github.repository_owner }}
          REPOSITORY_NAME: ${{ github.event.repository.name }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          QUALITY_OUTCOME: ${{ steps.quality.outcome }}
        run: |
          mkdir -p build/pr-quality/checks build/pr-quality/check-intelligence

          gh api \
            "repos/$REPOSITORY_OWNER/$REPOSITORY_NAME/commits/$HEAD_SHA/check-runs?per_page=100" \
            > build/pr-quality/checks/check-runs-raw.json \
            || echo '{"check_runs":[]}' > build/pr-quality/checks/check-runs-raw.json

          gh api \
            "repos/$REPOSITORY_OWNER/$REPOSITORY_NAME/commits/$HEAD_SHA/status" \
            > build/pr-quality/checks/combined-status-raw.json \
            || echo '{"statuses":[]}' > build/pr-quality/checks/combined-status-raw.json

          gh api \
            "repos/$REPOSITORY_OWNER/$REPOSITORY_NAME/branches/${{ github.event.pull_request.base.ref }}/protection/required_status_checks/contexts" \
            > build/pr-quality/checks/required-contexts.json \
            || echo '[]' > build/pr-quality/checks/required-contexts.json

          python - <<'PY'
          import json
          import os
          from pathlib import Path

          raw_path = Path("build/pr-quality/checks/check-runs-raw.json")
          status_path = Path("build/pr-quality/checks/combined-status-raw.json")
          required_path = Path("build/pr-quality/checks/required-contexts.json")

          payload = json.loads(raw_path.read_text(encoding="utf-8"))
          runs = payload.get("check_runs")
          if not isinstance(runs, list):
              runs = []

          statuses_payload = json.loads(status_path.read_text(encoding="utf-8"))
          statuses = statuses_payload.get("statuses")
          if not isinstance(statuses, list):
              statuses = []

          required_payload = json.loads(required_path.read_text(encoding="utf-8"))
          required_contexts = set(required_payload if isinstance(required_payload, list) else [])

          normalized = []
          for run in runs:
              if not isinstance(run, dict):
                  continue
              name = str(run.get("name") or "")
              item = dict(run)
              item["required"] = name in required_contexts
              normalized.append(item)

          state_to_conclusion = {
              "success": "success",
              "failure": "failure",
              "error": "failure",
              "pending": "",
          }
          for status in statuses:
              if not isinstance(status, dict):
                  continue
              context = str(status.get("context") or "")
              state = str(status.get("state") or "").lower()
              normalized.append(
                  {
                      "name": context,
                      "context": context,
                      "status": "completed" if state in {"success", "failure", "error"} else "queued",
                      "conclusion": state_to_conclusion.get(state, state),
                      "url": status.get("target_url") or "",
                      "required": context in required_contexts,
                  }
              )

          outcome = os.environ.get("QUALITY_OUTCOME", "failure")
          local_conclusion = "success" if outcome == "success" else "failure"
          normalized.append(
              {
                  "name": "PR Quality local quality gate",
                  "status": "completed",
                  "conclusion": local_conclusion,
                  "log_path": "quality.log",
                  "required": "PR Quality local quality gate" in required_contexts,
              }
          )

          Path("build/pr-quality/checks/check-runs.json").write_text(
              json.dumps(
                  {
                      "check_runs": normalized,
                      "required_contexts": sorted(required_contexts),
                  },
                  indent=2,
                  sort_keys=True,
              )
              + "\n",
              encoding="utf-8",
          )
          PY

          mkdir -p build/pr-quality/check-logs
          PYTHONPATH=src python -m sdetkit.failed_check_log_collection \
            --checks-json build/pr-quality/checks/check-runs.json \
            --out-dir build/pr-quality/check-logs

          bash build/pr-quality/check-logs/download-failed-check-logs.sh || true

          PYTHONPATH=src python -m sdetkit.failed_check_log_collection \
            --checks-json build/pr-quality/checks/check-runs.json \
            --out-dir build/pr-quality/check-logs

          PYTHONPATH=src python -m sdetkit.check_intelligence \
            --checks-json build/pr-quality/checks/check-runs.json \
            --logs-dir build/pr-quality/check-logs/failed-check-logs \
            --review-threads-json build/pr-quality/security-review/review-threads.json \
            --code-scanning-alerts-json build/pr-quality/code-scanning/alerts.json \
            --current-head-sha "$HEAD_SHA" \
            --out-dir build/pr-quality/check-intelligence


      - name: Build PR evidence graph
        if: always()
        run: |
          mkdir -p build/sdetkit/evidence-graph
          PYTHONPATH=src python -m sdetkit.evidence_graph \
            --sentinel-control-room build/sdetkit/sentinel/control-room-with-security-review.json \
            --failure-bundle build/pr-quality/failure-intelligence/failure-bundle.json \
            --pr-quality-action-report build/pr-quality/check-intelligence/action-report.json \
            --out-dir build/sdetkit/evidence-graph

      - name: Initialize PR comment status
        if: always()
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          mkdir -p build/pr-quality
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          Path("build/pr-quality/comment-status.json").write_text(
              json.dumps(
                  {
                      "status": "failed",
                      "pr_number": int(os.environ["PR_NUMBER"]),
                      "reason": "comment step did not complete",
                  },
                  indent=2,
                  sort_keys=True,
              )
              + "\n",
              encoding="utf-8",
          )
          PY

      - name: Commit approved safe formatting fixes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PYTHONPATH=src python tools/maintenance_autopilot.py \
            --owner "${{ github.repository_owner }}" \
            --repo "${{ github.event.repository.name }}" \
            --commit-safe-fixes \
            --check-intelligence-json build/pr-quality/check-intelligence/check-intelligence.json \
            --pr-quality-safe-bridge-only \
            --out-dir build/pr-quality/safe-formatting-autopilot

      - name: Build PR comment body
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          mkdir -p build/pr-quality
          {
            git fetch --no-tags --depth=100 origin "${{ github.event.pull_request.base.ref }}" >/dev/null 2>&1 || true
            git diff --name-only "origin/${{ github.event.pull_request.base.ref }}"...HEAD || git diff --name-only HEAD~1..HEAD || true
          } > build/pr-quality/changed-files.txt

          mkdir -p build/pr-quality/runtime-proof/isolated-proof
          mapfile -t changed_files < build/pr-quality/changed-files.txt
          claim_args=()
          for changed_file in "${changed_files[@]}"; do
            if [ -n "$changed_file" ]; then
              claim_args+=(--changed-file "$changed_file")
            fi
          done

          runtime_proof_rc=0
          PYTHONPATH=src python -m sdetkit.isolated_proof_runner \
            --repo-root . \
            --inventory-mode base_head \
            --base-ref "origin/${{ github.event.pull_request.base.ref }}" \
            --head-ref HEAD \
            "${claim_args[@]}" \
            --profile ruff_src_tests \
            --out-dir build/pr-quality/runtime-proof/isolated-proof \
            --format json \
            > build/pr-quality/runtime-proof/isolated-proof-cli.json \
            || runtime_proof_rc=$?


          printf '%s\n' "$runtime_proof_rc" > build/pr-quality/runtime-proof/isolated-proof-exit-code.txt

          mkdir -p \
            build/pr-quality/live-benchmark/workspace \
            build/pr-quality/live-benchmark/fixture-report \
            build/pr-quality/live-benchmark/live-report

          live_workspace_root="${RUNNER_TEMP}/sdetkit-pr-quality-live-benchmark-repositories"
          rm -rf "$live_workspace_root"

          live_workspace_rc=0
          PYTHONPATH=src python -m sdetkit.pr_quality_live_benchmark_workspace \
            --out-dir "$live_workspace_root" \
            --format json \
            > build/pr-quality/live-benchmark/workspace/workspace-cli.json \
            || live_workspace_rc=$?
          printf '%s\n' "$live_workspace_rc" \
            > build/pr-quality/live-benchmark/workspace/workspace-exit-code.txt

          live_benchmark_rc=2
          if [ "$live_workspace_rc" -eq 0 ] && [ -s "$live_workspace_root/workspace-manifest.json" ]; then
            cp "$live_workspace_root/workspace-manifest.json" \
              build/pr-quality/live-benchmark/workspace/workspace-manifest.json
            cp "$live_workspace_root/workspace-manifest.md" \
              build/pr-quality/live-benchmark/workspace/workspace-manifest.md

            mapfile -t live_args < <(
              LIVE_WORKSPACE_ROOT="$live_workspace_root" python - <<'PYCODE'
          import json
          import os
          from pathlib import Path

          manifest = json.loads(
              (Path(os.environ["LIVE_WORKSPACE_ROOT"]) / "workspace-manifest.json").read_text(
                  encoding="utf-8"
              )
          )
          for item in manifest["scenarios"]:
              print("--isolated-scenario")
              print(item["fixture_path"])
              print("--isolated-repo-root")
              print(item["repo_root"])
          PYCODE
            )

            live_benchmark_rc=0
            PYTHONPATH=src python -m sdetkit.replayable_benchmark_harness \
              "${live_args[@]}" \
              --out-dir build/pr-quality/live-benchmark/live-report \
              --format json \
              > build/pr-quality/live-benchmark/live-report/live-report-cli.json \
              || live_benchmark_rc=$?
          fi
          printf '%s\n' "$live_benchmark_rc" \
            > build/pr-quality/live-benchmark/live-report/live-report-exit-code.txt

          fixture_benchmark_rc=0
          PYTHONPATH=src python -m sdetkit.replayable_benchmark_harness \
            --scenario tests/fixtures/remediation_benchmark/nop_formatting_patch.json \
            --scenario tests/fixtures/remediation_benchmark/oracle_formatting_patch.json \
            --scenario tests/fixtures/remediation_benchmark/unsafe_protected_path_patch.json \
            --out-dir build/pr-quality/live-benchmark/fixture-report \
            --format json \
            > build/pr-quality/live-benchmark/fixture-report/fixture-report-cli.json \
            || fixture_benchmark_rc=$?
          printf '%s\n' "$fixture_benchmark_rc" \
            > build/pr-quality/live-benchmark/fixture-report/fixture-report-exit-code.txt

          PYTHONPATH=src python -m sdetkit.pr_quality_evidence_narrative \
            --quality-log quality.log \
            --quality-outcome "${{ steps.quality.outcome }}" \
            --sentinel-control-room build/sdetkit/sentinel/control-room-with-security-review.json \
            --evidence-graph build/sdetkit/evidence-graph/evidence-graph.json \
            --failure-bundle build/pr-quality/failure-intelligence/failure-bundle.json \
            --changed-files build/pr-quality/changed-files.txt \
            --out build/pr-quality/pr-evidence-narrative.md \
            --json-out build/pr-quality/pr-evidence-narrative.json

          mkdir -p build/pr-quality/trajectory
          PYTHONPATH=src python -m sdetkit.trajectory_store \
            --pr-quality-action-report build/pr-quality/check-intelligence/action-report.json \
            --check-intelligence build/pr-quality/check-intelligence/check-intelligence.json \
            --evidence-narrative build/pr-quality/pr-evidence-narrative.json \
            --out build/pr-quality/trajectory/trajectory.jsonl \
            --repo "${{ github.repository }}" \
            --branch "${{ github.event.pull_request.head.ref }}" \
            --commit-sha "${{ github.event.pull_request.head.sha }}" \
            --pr-number "${{ github.event.pull_request.number }}" \
            --format json \
            > build/pr-quality/trajectory/trajectory-metadata.json

          mkdir -p build/pr-quality/trajectory-pattern-insights build/pr-quality/repo-memory
          PYTHONPATH=src python -m sdetkit.trajectory_pattern_insights \
            --trajectory-jsonl build/pr-quality/trajectory/trajectory.jsonl \
            --json-out build/pr-quality/trajectory-pattern-insights/pattern-insights.json \
            --markdown-out build/pr-quality/trajectory-pattern-insights/pattern-insights.md \
            --format json \
            > build/pr-quality/trajectory-pattern-insights/pattern-insights-cli.json

          repo_memory_rc=2
          if [ -s build/pr-quality/live-benchmark/fixture-report/benchmark-report.json ] \
            && [ -s build/pr-quality/live-benchmark/live-report/benchmark-report.json ]; then
            repo_memory_rc=0
            PYTHONPATH=src python -m sdetkit.repo_memory \
              --pattern-insights build/pr-quality/trajectory-pattern-insights/pattern-insights.json \
              --benchmark-report build/pr-quality/live-benchmark/fixture-report/benchmark-report.json \
              --live-benchmark-report build/pr-quality/live-benchmark/live-report/benchmark-report.json \
              --out-dir build/pr-quality/repo-memory \
              --format json \
              > build/pr-quality/repo-memory/repo-memory-cli.json \
              || repo_memory_rc=$?
          fi
          printf '%s\n' "$repo_memory_rc" > build/pr-quality/repo-memory/repo-memory-exit-code.txt

          mkdir -p \
            build/pr-quality/trusted-history/download \
            build/pr-quality/trusted-history/evidence

          trusted_history_rc=2
          trusted_history_run_id=""
          trusted_history_head_sha=""

          if gh api --paginate \
            "repos/${REPOSITORY}/actions/workflows/repo-memory-history.yml/runs?branch=main&event=push&status=completed&per_page=100" \
            --jq '.workflow_runs[] | select(.conclusion == "success") | [.id, .head_sha] | @tsv' \
            > build/pr-quality/trusted-history/successful-main-runs.tsv; then
            while IFS=$'\t' read -r candidate_run_id candidate_head_sha; do
              if [ -z "$candidate_run_id" ] || [ -z "$candidate_head_sha" ]; then
                continue
              fi

              if git merge-base --is-ancestor "$candidate_head_sha" "$PR_BASE_SHA"; then
                trusted_history_run_id="$candidate_run_id"
                trusted_history_head_sha="$candidate_head_sha"
                break
              fi
            done < build/pr-quality/trusted-history/successful-main-runs.tsv
          fi

          if [ -n "$trusted_history_run_id" ]; then
            trusted_history_download_rc=0
            gh run download "$trusted_history_run_id" \
              --repo "$REPOSITORY" \
              --name repo-memory-profile-history \
              --dir build/pr-quality/trusted-history/download \
              || trusted_history_download_rc=$?

            history_summary="$(
              find build/pr-quality/trusted-history/download \
                -name repo-memory-history-summary.json \
                -print \
                -quit
            )"
            history_jsonl="$(
              find build/pr-quality/trusted-history/download \
                -name repo-memory-profile-history.jsonl \
                -print \
                -quit
            )"

            if [ "$trusted_history_download_rc" -eq 0 ] \
              && [ -n "$history_summary" ] \
              && [ -n "$history_jsonl" ] \
              && [ -f "$history_summary" ] \
              && [ -f "$history_jsonl" ]; then
              trusted_history_rc=0
              PYTHONPATH=src python -m sdetkit.trusted_history_evidence \
                --history-summary "$history_summary" \
                --history-jsonl "$history_jsonl" \
                --repo-root . \
                --selected-run-id "$trusted_history_run_id" \
                --selected-head-sha "$trusted_history_head_sha" \
                --base-sha "$PR_BASE_SHA" \
                --out-dir build/pr-quality/trusted-history/evidence \
                --format json \
                > build/pr-quality/trusted-history/evidence/evidence-cli.json \
                || trusted_history_rc=$?
            fi
          fi

          printf '%s\n' "$trusted_history_rc" \
            > build/pr-quality/trusted-history/trusted-history-exit-code.txt
          printf '%s\n' "$trusted_history_run_id" \
            > build/pr-quality/trusted-history/selected-run-id.txt
          printf '%s\n' "$trusted_history_head_sha" \
            > build/pr-quality/trusted-history/selected-head-sha.txt

          PYTHONPATH=src python -m sdetkit.pr_quality_runtime_proof_artifacts \
            --isolated-proof build/pr-quality/runtime-proof/isolated-proof/verification-evidence.json \
            --live-benchmark-report build/pr-quality/live-benchmark/live-report/benchmark-report.json \
            --repo-memory-profile build/pr-quality/repo-memory/repo-memory-profile.json \
            --trusted-history-evidence build/pr-quality/trusted-history/evidence/trusted-history-evidence.json \
            --out-dir build/pr-quality/runtime-proof/summary \
            --format json \
            > build/pr-quality/runtime-proof/summary-metadata.json

          PYTHONPATH=src python -m sdetkit.pr_quality_action_report \
            --action-report build/pr-quality/check-intelligence/action-report.json \
            --check-intelligence build/pr-quality/check-intelligence/check-intelligence.json \
            --evidence-narrative build/pr-quality/pr-evidence-narrative.json \
            --trajectory-jsonl build/pr-quality/trajectory/trajectory.jsonl \
            --runtime-proof-artifacts build/pr-quality/runtime-proof/summary/runtime-proof-artifacts.json \
            --security-finding-diagnosis build/pr-quality/security-diagnosis/security-finding-diagnosis.json \
            --out build/pr-quality/pr-comment-body.md \
            > build/pr-quality/pr-comment-metadata.json

      - name: Build verified operator evidence loop
        if: always()
        run: |
          mkdir -p build/sdetkit/operator-loop
          PYTHONPATH=src python -m sdetkit operator-loop \
            --repo . \
            --quality-log quality.log \
            --quality-outcome "${{ steps.quality.outcome }}" \
            --sentinel-control-room build/sdetkit/sentinel/control-room-with-security-review.json \
            --evidence-graph build/sdetkit/evidence-graph/evidence-graph.json \
            --failure-bundle build/pr-quality/failure-intelligence/failure-bundle.json \
            --changed-files build/pr-quality/changed-files.txt \
            --action-report build/pr-quality/check-intelligence/action-report.json \
            --check-intelligence build/pr-quality/check-intelligence/check-intelligence.json \
            --out-dir build/sdetkit/operator-loop \
            --format json \
            --verify \
            > build/sdetkit/operator-loop/operator-loop-stdout.json

      - name: Upload failure intelligence bundle
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: pr-quality-failure-intelligence
          path: build/pr-quality/failure-intelligence/
          if-no-files-found: ignore

      - name: Upload adaptive sentinel artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: pr-quality-adaptive-sentinel
          path: |
            build/sdetkit/sentinel/
            .sdetkit/adaptive-sentinel/
          if-no-files-found: ignore

      - name: Upload PR quality comment artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: pr-quality-comment
          path: |
            build/pr-quality/pr-comment-body.md
            build/pr-quality/pr-comment-metadata.json
            build/pr-quality/pr-evidence-narrative.json
            build/pr-quality/changed-files.txt
            build/pr-quality/comment-status.json
            build/pr-quality/checks/
            build/pr-quality/check-logs/
            build/pr-quality/check-intelligence/
            build/pr-quality/security-review/
            build/pr-quality/code-scanning/
            build/pr-quality/security-diagnosis/
            build/pr-quality/safe-formatting-autopilot/
            build/pr-quality/trajectory/
            build/pr-quality/trajectory-pattern-insights/
            build/pr-quality/live-benchmark/
            build/pr-quality/repo-memory/
            build/pr-quality/trusted-history/
            build/pr-quality/runtime-proof/
            build/pr-quality/pr-evidence-narrative.md
            build/sdetkit/evidence-graph/
            build/sdetkit/operator-loop/
          if-no-files-found: ignore

      - name: Comment on PR
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          publish_dir="build/pr-quality/comment-publish"
          request_path="$publish_dir/comment-request.json"
          response_path="$publish_dir/comment-response.json"
          body_path="$publish_dir/comment-body.md"

          mkdir -p "$publish_dir"

          printf '### SDET Quality Gate\n' > "$body_path"
          cat build/pr-quality/pr-comment-body.md >> "$body_path"

          BODY_PATH="$body_path" REQUEST_PATH="$request_path" python - <<'PYCODE'
          import json
          import os
          from pathlib import Path

          body = Path(os.environ["BODY_PATH"]).read_text(encoding="utf-8")
          Path(os.environ["REQUEST_PATH"]).write_text(
              json.dumps({"body": body}) + "\n",
              encoding="utf-8",
          )
          PYCODE

          publish_rc=1
          publish_status="failed"
          publish_reason="failed to publish SDET Quality Gate comment"
          existing_id=""

          if existing_id="$(
            gh api \
              -H "Accept: application/vnd.github+json" \
              "repos/${REPOSITORY}/issues/${PR_NUMBER}/comments?per_page=100" \
              --jq 'first(.[] | select(.user.type == "Bot" and (.body | startswith("### SDET Quality Gate")))) | .id // ""'
          )"; then
            if [ -n "$existing_id" ]; then
              if gh api \
                --method PATCH \
                -H "Accept: application/vnd.github+json" \
                "repos/${REPOSITORY}/issues/comments/${existing_id}" \
                --input "$request_path" \
                > "$response_path"; then
                publish_rc=0
                publish_status="updated"
                publish_reason="updated existing SDET Quality Gate comment"
              else
                publish_rc=$?
                publish_reason="failed to update existing SDET Quality Gate comment"
              fi
            else
              if gh api \
                --method POST \
                -H "Accept: application/vnd.github+json" \
                "repos/${REPOSITORY}/issues/${PR_NUMBER}/comments" \
                --input "$request_path" \
                > "$response_path"; then
                publish_rc=0
                publish_status="posted"
                publish_reason="posted SDET Quality Gate comment"
              else
                publish_rc=$?
                publish_reason="failed to post new SDET Quality Gate comment"
              fi
            fi
          else
            publish_rc=$?
            publish_reason="failed to list existing SDET Quality Gate comments"
          fi

          COMMENT_STATUS="$publish_status" \
          COMMENT_REASON="$publish_reason" \
          RESPONSE_PATH="$response_path" \
          PR_NUMBER="$PR_NUMBER" \
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const statusPath = 'build/pr-quality/comment-status.json';
          const readCommentMetadata = () => {
            const metadataPath = 'build/pr-quality/pr-comment-metadata.json';
            try {
              if (!fs.existsSync(metadataPath)) {
                return {};
              }
              return JSON.parse(fs.readFileSync(metadataPath, 'utf8'));
            } catch (error) {
              console.warn(
                `failed to read PR Quality comment metadata: ${
                  error && error.message ? error.message : error
                }`
              );
              return {};
            }
          };

          const writeStatus = (payload) => {
            const metadata = readCommentMetadata();
            const enrichedPayload = {
              ...payload,
              action_report_status: metadata.status || 'unknown',
              comment_result_title: metadata.result_title || 'unknown',
              evidence_signal_kind: metadata.evidence_signal_kind || 'unknown',
              evidence_signal_present: Boolean(metadata.evidence_signal_present),
              evidence_review_required: Boolean(metadata.evidence_review_required),
              trajectory_signal_present: Boolean(metadata.trajectory_signal_present),
              trajectory_record_count: Number(metadata.trajectory_record_count || 0),
              trajectory_review_first_count: Number(metadata.trajectory_review_first_count || 0),
              trajectory_auto_fix_allowed_count: Number(metadata.trajectory_auto_fix_allowed_count || 0),
              runtime_proof_artifacts_present: Boolean(metadata.runtime_proof_artifacts_present),
              runtime_proof_collection_status: metadata.runtime_proof_collection_status || 'not_collected',
              runtime_guard_violation_count: Number(metadata.runtime_guard_violation_count || 0),
              live_benchmark_collection_status: metadata.live_benchmark_collection_status || 'not_collected',
              live_benchmark_status: metadata.live_benchmark_status || 'not_collected',
              live_benchmark_scenario_count: Number(metadata.live_benchmark_scenario_count || 0),
              anti_cheat_rejection_count: Number(metadata.anti_cheat_rejection_count || 0),
              repo_memory_collection_status: metadata.repo_memory_collection_status || 'not_collected',
              repo_memory_status: metadata.repo_memory_status || 'not_collected',
              repo_memory_live_contract_proven: Boolean(metadata.repo_memory_live_contract_proven),
              trusted_history_collection_status: metadata.trusted_history_collection_status || 'not_collected',
              trusted_history_status: metadata.trusted_history_status || 'not_collected',
              trusted_history_record_count: Number(metadata.trusted_history_record_count || 0),
              trusted_history_base_ancestry_verified: Boolean(metadata.trusted_history_base_ancestry_verified),
              trusted_history_prior_input_read_only: Boolean(metadata.trusted_history_prior_input_read_only),
              trusted_history_automation_allowed: Boolean(metadata.trusted_history_automation_allowed),
              trusted_history_merge_authorized: Boolean(metadata.trusted_history_merge_authorized),
              trusted_history_semantic_equivalence_proven: Boolean(metadata.trusted_history_semantic_equivalence_proven),
            };
            fs.mkdirSync(path.dirname(statusPath), { recursive: true });
            fs.writeFileSync(
              statusPath,
              `${JSON.stringify(enrichedPayload, null, 2)}\n`,
              'utf8'
            );
          };

          const status = process.env.COMMENT_STATUS;
          const payload = {
            status,
            pr_number: Number(process.env.PR_NUMBER),
            reason: process.env.COMMENT_REASON,
          };

          const responsePath = process.env.RESPONSE_PATH;
          if ((status === 'posted' || status === 'updated') && fs.existsSync(responsePath)) {
            const response = JSON.parse(fs.readFileSync(responsePath, 'utf8'));
            payload.comment_id = response.id;
            payload.comment_url = response.html_url;
          }

          writeStatus(payload);

          if (status === 'posted') {
            process.stdout.write('comment_status=posted\n');
          } else if (status === 'updated') {
            process.stdout.write('comment_status=updated\n');
          } else {
            console.error(`comment_status=failed reason=${process.env.COMMENT_REASON}`);
          }
          NODE

          if [ "$publish_rc" -ne 0 ]; then
            exit "$publish_rc"
          fi

      - name: Verify PR Quality comment visibility
        if: always()
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("build/pr-quality/comment-status.json")
          if not path.exists():
              raise SystemExit("comment_status=missing: build/pr-quality/comment-status.json was not written")

          payload = json.loads(path.read_text(encoding="utf-8"))
          status = str(payload.get("status", "missing"))
          reason = str(payload.get("reason", ""))
          action_report_status = str(payload.get("action_report_status", "unknown"))
          comment_result_title = str(payload.get("comment_result_title", "unknown"))
          evidence_signal_kind = str(payload.get("evidence_signal_kind", "unknown"))
          evidence_signal_present = bool(payload.get("evidence_signal_present", False))
          evidence_review_required = bool(payload.get("evidence_review_required", False))
          trajectory_record_count = int(payload.get("trajectory_record_count", 0) or 0)
          trajectory_review_first_count = int(payload.get("trajectory_review_first_count", 0) or 0)
          trajectory_auto_fix_allowed_count = int(
              payload.get("trajectory_auto_fix_allowed_count", 0) or 0
          )
          runtime_proof_artifacts_present = bool(
              payload.get("runtime_proof_artifacts_present", False)
          )
          runtime_proof_collection_status = str(
              payload.get("runtime_proof_collection_status", "not_collected")
          )
          runtime_guard_violation_count = int(
              payload.get("runtime_guard_violation_count", 0) or 0
          )
          live_benchmark_collection_status = str(
              payload.get("live_benchmark_collection_status", "not_collected")
          )
          live_benchmark_status = str(
              payload.get("live_benchmark_status", "not_collected")
          )
          live_benchmark_scenario_count = int(
              payload.get("live_benchmark_scenario_count", 0) or 0
          )
          anti_cheat_rejection_count = int(
              payload.get("anti_cheat_rejection_count", 0) or 0
          )
          repo_memory_collection_status = str(
              payload.get("repo_memory_collection_status", "not_collected")
          )
          repo_memory_status = str(
              payload.get("repo_memory_status", "not_collected")
          )
          repo_memory_live_contract_proven = bool(
              payload.get("repo_memory_live_contract_proven", False)
          )
          history_semantic_key = "_".join(
              ("trusted", "history", "semantic", "equivalence", "proven")
          )
          trusted_history_collection_status = str(
              payload.get("trusted_history_collection_status", "not_collected")
          )
          trusted_history_status = str(
              payload.get("trusted_history_status", "not_collected")
          )
          trusted_history_record_count = int(
              payload.get("trusted_history_record_count", 0) or 0
          )
          trusted_history_base_ancestry_verified = bool(
              payload.get("trusted_history_base_ancestry_verified", False)
          )
          trusted_history_prior_input_read_only = bool(
              payload.get("trusted_history_prior_input_read_only", False)
          )
          trusted_history_automation_allowed = bool(
              payload.get("trusted_history_automation_allowed", False)
          )
          trusted_history_merge_authorized = bool(
              payload.get("trusted_history_merge_authorized", False)
          )
          trusted_history_semantic_equivalence_proven = bool(
              payload.get(history_semantic_key, False)
          )

          print(f"comment_status={status}")
          print(f"comment_reason={reason}")
          print(f"action_report_status={action_report_status}")
          print(f"comment_result_title={comment_result_title}")
          print(f"evidence_signal_kind={evidence_signal_kind}")
          print(f"evidence_signal_present={str(evidence_signal_present).lower()}")
          print(f"evidence_review_required={str(evidence_review_required).lower()}")
          print(f"trajectory_record_count={trajectory_record_count}")
          print(f"trajectory_review_first_count={trajectory_review_first_count}")
          print(f"trajectory_auto_fix_allowed_count={trajectory_auto_fix_allowed_count}")
          print(f"runtime_proof_artifacts_present={str(runtime_proof_artifacts_present).lower()}")
          print(f"runtime_proof_collection_status={runtime_proof_collection_status}")
          print(f"runtime_guard_violation_count={runtime_guard_violation_count}")
          print(f"live_benchmark_collection_status={live_benchmark_collection_status}")
          print(f"live_benchmark_status={live_benchmark_status}")
          print(f"live_benchmark_scenario_count={live_benchmark_scenario_count}")
          print(f"anti_cheat_rejection_count={anti_cheat_rejection_count}")
          print(f"repo_memory_collection_status={repo_memory_collection_status}")
          print(f"repo_memory_status={repo_memory_status}")
          print(
              f"repo_memory_live_contract_proven={str(repo_memory_live_contract_proven).lower()}"
          )
          print(f"trusted_history_collection_status={trusted_history_collection_status}")
          print(f"trusted_history_status={trusted_history_status}")
          print(f"trusted_history_record_count={trusted_history_record_count}")
          print(
              "trusted_history_base_ancestry_verified="
              f"{str(trusted_history_base_ancestry_verified).lower()}"
          )
          print(
              "trusted_history_prior_input_read_only="
              f"{str(trusted_history_prior_input_read_only).lower()}"
          )
          print(
              "trusted_history_automation_allowed="
              f"{str(trusted_history_automation_allowed).lower()}"
          )
          print(
              "trusted_history_merge_authorized="
              f"{str(trusted_history_merge_authorized).lower()}"
          )
          print(
              f"{history_semantic_key}="
              f"{str(trusted_history_semantic_equivalence_proven).lower()}"
          )

          if status not in {"posted", "updated"}:
              raise SystemExit(f"PR Quality comment was not posted or updated: status={status} reason={reason}")

          if action_report_status == "unknown":
              raise SystemExit("PR Quality comment signal metadata missing: action_report_status=unknown")
          if comment_result_title == "unknown":
              raise SystemExit("PR Quality comment signal metadata missing: comment_result_title=unknown")
          if evidence_signal_kind not in {"none", "proof", "review"}:
              raise SystemExit(
                  "PR Quality comment signal metadata invalid: "
                  f"evidence_signal_kind={evidence_signal_kind}"
              )

          if not runtime_proof_artifacts_present:
              raise SystemExit(
                  "PR Quality runtime proof artifacts missing from rendered comment metadata"
              )
          if runtime_proof_collection_status != "collected":
              raise SystemExit(
                  "PR Quality runtime proof collection failed after diagnostic comment publication: "
                  f"status={runtime_proof_collection_status}"
              )
          if live_benchmark_collection_status != "collected":
              raise SystemExit(
                  "PR Quality live benchmark collection failed after diagnostic comment publication: "
                  f"status={live_benchmark_collection_status}"
              )
          if live_benchmark_status != "passed":
              raise SystemExit(
                  "PR Quality live benchmark evidence failed: "
                  f"status={live_benchmark_status}"
              )
          if live_benchmark_scenario_count != 6 or anti_cheat_rejection_count != 2:
              raise SystemExit(
                  "PR Quality live benchmark contract incomplete: "
                  f"scenarios={live_benchmark_scenario_count} "
                  f"anti_cheat_rejections={anti_cheat_rejection_count}"
              )
          if repo_memory_collection_status != "collected":
              raise SystemExit(
                  "PR Quality RepoMemory collection failed after diagnostic comment publication: "
                  f"status={repo_memory_collection_status}"
              )
          if repo_memory_status != "live_proof_supported_memory":
              raise SystemExit(
                  "PR Quality RepoMemory live-proof status missing: "
                  f"status={repo_memory_status}"
              )
          if not repo_memory_live_contract_proven:
              raise SystemExit("PR Quality RepoMemory live contract was not proven")
          if trusted_history_collection_status != "collected":
              raise SystemExit(
                  "PR Quality trusted accepted-main history collection failed after "
                  "diagnostic comment publication: "
                  f"status={trusted_history_collection_status}"
              )
          if trusted_history_status != "trusted_history_verified":
              raise SystemExit(
                  "PR Quality trusted accepted-main history was not verified: "
                  f"status={trusted_history_status}"
              )
          if trusted_history_record_count < 1:
              raise SystemExit("PR Quality trusted accepted-main history has no records")
          if not trusted_history_base_ancestry_verified:
              raise SystemExit(
                  "PR Quality trusted accepted-main history base ancestry was not verified"
              )
          if not trusted_history_prior_input_read_only:
              raise SystemExit(
                  "PR Quality trusted accepted-main history did not preserve read-only input"
              )
          if trusted_history_automation_allowed:
              raise SystemExit("PR Quality trusted history attempted to allow automation")
          if trusted_history_merge_authorized:
              raise SystemExit("PR Quality trusted history attempted to authorize merge")
          if trusted_history_semantic_equivalence_proven:
              raise SystemExit(
                  "PR Quality trusted history attempted to claim semantic equivalence"
              )
          PY
