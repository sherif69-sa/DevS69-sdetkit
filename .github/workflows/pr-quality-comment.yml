          fi

          mkdir -p build/pr-quality/diagnostic-signal-snapshot
          diagnostic_signal_snapshot_rc=2
          if [ "$diagnostic_job_rc" -eq 0 ] \
            && [ -s build/pr-quality/diagnostic-job/diagnostic-worker-result.json ]; then
