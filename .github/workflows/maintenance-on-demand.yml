name: Maintenance On Demand

on:
  workflow_dispatch:
    inputs:
      mode:
        description: quick or full maintenance mode
        type: choice
        required: true
        default: full
        options:
          - quick
          - full
      fix:
        description: apply safe fixes
        type: boolean
        required: true
        default: false
      pr:
        description: open PR when fix introduces changes
        type: boolean
        required: true
        default: false
      issue_number:
        description: issue number to update
        type: number
        required: true
        default: 83

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  maintenance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project + dev/test extras
        run: |
          python -m pip install -c constraints-ci.txt -e .[dev,test]

      - name: Run maintenance
        run: bash scripts/maintenance_ci.sh "${{ inputs.mode }}" "${{ inputs.fix && 'true' || 'false' }}" artifacts/maintenance

      - name: Build annotation hygiene report
        if: always()
        shell: bash
        run: |
          if [ -f artifacts/maintenance.json ]; then
            python -m sdetkit.github_actions_annotation_hygiene_report \
              --maintenance-json artifacts/maintenance.json \
              --out-json artifacts/annotation-hygiene-report.json \
              --out-md artifacts/annotation-hygiene-report.md \
              --format md || true
          fi

      - name: Build maintenance priority rollup
        if: always()
        shell: bash
        run: |
          if [ -f artifacts/maintenance.json ]; then
            args=(--maintenance-json artifacts/maintenance.json)
            if [ -f artifacts/annotation-hygiene-report.json ]; then
              args+=(--annotation-report-json artifacts/annotation-hygiene-report.json)
            fi
            if [ -f artifacts/adaptive-safe-fix-learning-rollup.json ]; then
              args+=(--safe-fix-rollup-json artifacts/adaptive-safe-fix-learning-rollup.json)
            fi
            python -m sdetkit.maintenance_priority_rollup \
              "${args[@]}" \
              --out-json artifacts/maintenance-priority-rollup.json \
              --out-md artifacts/maintenance-priority-rollup.md \
              --format md || true
          fi

      - name: Build maintenance policy decisions
        if: always()
        shell: bash
        run: |
          if [ -f artifacts/maintenance-priority-rollup.json ]; then
            python -m sdetkit.maintenance_policy_decisions \
              --priority-rollup-json artifacts/maintenance-priority-rollup.json \
              --out-json artifacts/maintenance-policy-decisions.json \
              --out-md artifacts/maintenance-policy-decisions.md \
              --format md || true
          fi

      - name: Restore maintenance policy decision history
        if: always()
        shell: bash
        run: |
          mkdir -p artifacts .sdetkit/maintenance
          if [ -f .sdetkit/maintenance/policy-decisions-history.jsonl ]; then
            cp .sdetkit/maintenance/policy-decisions-history.jsonl artifacts/maintenance-policy-decisions-history.jsonl
          else
            : > artifacts/maintenance-policy-decisions-history.jsonl
          fi

      - name: Build maintenance policy memory context
        if: always()
        shell: bash
        run: |
          if [ -f artifacts/maintenance-policy-decisions.json ]; then
            args=(--policy-decisions-json artifacts/maintenance-policy-decisions.json)
            if [ -f artifacts/adaptive-safe-fix-learning-rollup.json ]; then
              args+=(--safe-fix-rollup-json artifacts/adaptive-safe-fix-learning-rollup.json)
            fi
            if [ -f artifacts/annotation-hygiene-report.json ]; then
              args+=(--annotation-report-json artifacts/annotation-hygiene-report.json)
            fi
            if [ -f artifacts/maintenance-policy-decisions-history.jsonl ]; then
              args+=(--history-jsonl artifacts/maintenance-policy-decisions-history.jsonl)
            fi
            python -m sdetkit.maintenance_policy_memory_context \
              "${args[@]}" \
              --out-json artifacts/maintenance-policy-memory-context.json \
              --out-md artifacts/maintenance-policy-memory-context.md \
              --format md || true
          fi

      - name: Build adaptive maintenance recommendations
        if: always()
        shell: bash
        run: |
          if [ -f artifacts/maintenance-policy-memory-context.json ]; then
            python -m sdetkit.maintenance_recommendations \
              --memory-context-json artifacts/maintenance-policy-memory-context.json \
              --out-json artifacts/maintenance-recommendations.json \
              --out-md artifacts/maintenance-recommendations.md \
              --format md || true
          fi

      - name: Build maintenance recommendation eligibility
        if: always()
        shell: bash
        run: |
          if [ -f artifacts/maintenance-recommendations.json ]; then
            python -m sdetkit.maintenance_recommendation_eligibility \
              --recommendations-json artifacts/maintenance-recommendations.json \
              --out-json artifacts/maintenance-recommendation-eligibility.json \
              --out-md artifacts/maintenance-recommendation-eligibility.md \
              --format md || true
          fi

      - name: Build maintenance action plan
        if: always()
        shell: bash
        run: |
          if [ -f artifacts/maintenance-recommendation-eligibility.json ]; then
            python -m sdetkit.maintenance_action_plan \
              --eligibility-json artifacts/maintenance-recommendation-eligibility.json \
              --out-json artifacts/maintenance-action-plan.json \
              --out-md artifacts/maintenance-action-plan.md \
              --format md || true
          fi

      - name: Record maintenance policy decision history
        if: always()
        shell: bash
        run: |
          if [ -f artifacts/maintenance-policy-decisions.json ]; then
            args=(
              --policy-decisions-json artifacts/maintenance-policy-decisions.json
              --history-jsonl artifacts/maintenance-policy-decisions-history.jsonl
              --run-id "${GITHUB_RUN_ID}"
            )
            if [ -f artifacts/maintenance-policy-memory-context.json ]; then
              args+=(--memory-context-json artifacts/maintenance-policy-memory-context.json)
            fi
            python -m sdetkit.maintenance_policy_decision_history \
              "${args[@]}" \
              --out-json artifacts/maintenance-policy-decision-history-summary.json \
              --out-md artifacts/maintenance-policy-decision-history-summary.md \
              --format md || true
          fi

      - name: Persist maintenance policy decision history
        if: always()
        shell: bash
        run: |
          if [ -f artifacts/maintenance-policy-decisions-history.jsonl ]; then
            mkdir -p .sdetkit/maintenance
            cp artifacts/maintenance-policy-decisions-history.jsonl .sdetkit/maintenance/policy-decisions-history.jsonl
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: maintenance-on-demand
          path: |
            artifacts/maintenance.json
            artifacts/maintenance.md
            artifacts/maintenance_fixed.json
            artifacts/maintenance_fixed.md
            artifacts/annotation-hygiene-report.json
            artifacts/annotation-hygiene-report.md
            artifacts/maintenance-priority-rollup.json
            artifacts/maintenance-priority-rollup.md
            artifacts/maintenance-policy-decisions.json
            artifacts/maintenance-policy-decisions.md
            artifacts/maintenance-policy-memory-context.json
            artifacts/maintenance-policy-memory-context.md
            artifacts/maintenance-recommendations.json
            artifacts/maintenance-recommendations.md
            artifacts/maintenance-recommendation-eligibility.json
            artifacts/maintenance-recommendation-eligibility.md
            artifacts/maintenance-action-plan.json
            artifacts/maintenance-action-plan.md
            artifacts/maintenance-policy-decisions-history.jsonl
            artifacts/maintenance-policy-decision-history-summary.json
            artifacts/maintenance-policy-decision-history-summary.md
            .sdetkit/maintenance/policy-decisions-history.jsonl
          if-no-files-found: ignore

      - name: Detect diff
        id: diff
        run: |
          if git diff --quiet; then
            echo "has_diff=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_diff=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare PR summary
        if: inputs.pr && steps.diff.outputs.has_diff == 'true'
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          before = json.loads(Path('artifacts/maintenance.json').read_text())
          after_path = Path('artifacts/maintenance_fixed.json')
          after = json.loads(after_path.read_text()) if after_path.exists() else before
          applied = []
          for name, item in after.get('checks', {}).items():
            for action in item.get('actions', []):
              if action.get('applied'):
                applied.append(f"- `{name}`: {action.get('title')}")
          Path('artifacts/pr_body.md').write_text(
            "\n".join([
              "## Maintenance on demand auto-fix",
              f"- score before: {before.get('score')}",
              f"- score after: {after.get('score')}",
              "- workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
              "",
              "### Applied actions",
              *(applied or ["- none"]),
              "",
              "### Policy memory",
              "- `.sdetkit/maintenance/policy-decisions-history.jsonl` is included when policy history changes during PR-mode maintenance.",
            ]) + "\n",
            encoding='utf-8',
          )
          PY

      - name: Create pull request
        id: cpr
        if: inputs.pr && steps.diff.outputs.has_diff == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1  # v8.1.1
        with:
          commit-message: 'chore: weekly maintenance'
          title: 'chore: weekly maintenance'
          body-path: artifacts/pr_body.md
          branch: automation/maintenance-on-demand
          base: main

      - name: Update maintenance issue
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
        env:
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          PR_URL: ${{ steps.cpr.outputs.pull-request-url }}
        with:
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issueDefault = Number(process.env.ISSUE_NUMBER || '83');
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${context.runId}`;

            const report = JSON.parse(fs.readFileSync('artifacts/maintenance.json', 'utf8'));
            const md = fs.existsSync('artifacts/maintenance.md')
              ? fs.readFileSync('artifacts/maintenance.md', 'utf8')
              : '';
            const annotationMd = fs.existsSync('artifacts/annotation-hygiene-report.md')
              ? fs.readFileSync('artifacts/annotation-hygiene-report.md', 'utf8')
              : '';
            const priorityMd = fs.existsSync('artifacts/maintenance-priority-rollup.md')
              ? fs.readFileSync('artifacts/maintenance-priority-rollup.md', 'utf8')
              : '';
            const policyMd = fs.existsSync('artifacts/maintenance-policy-decisions.md')
              ? fs.readFileSync('artifacts/maintenance-policy-decisions.md', 'utf8')
              : '';
            const memoryContextMd = fs.existsSync('artifacts/maintenance-policy-memory-context.md')
              ? fs.readFileSync('artifacts/maintenance-policy-memory-context.md', 'utf8')
              : '';
            const recommendationsMd = fs.existsSync('artifacts/maintenance-recommendations.md')
              ? fs.readFileSync('artifacts/maintenance-recommendations.md', 'utf8')
              : '';
            const recommendationEligibilityMd = fs.existsSync('artifacts/maintenance-recommendation-eligibility.md')
              ? fs.readFileSync('artifacts/maintenance-recommendation-eligibility.md', 'utf8')
              : '';
            const actionPlanMd = fs.existsSync('artifacts/maintenance-action-plan.md')
              ? fs.readFileSync('artifacts/maintenance-action-plan.md', 'utf8')
              : '';
            const historyMd = fs.existsSync('artifacts/maintenance-policy-decision-history-summary.md')
              ? fs.readFileSync('artifacts/maintenance-policy-decision-history-summary.md', 'utf8')
              : '';

            const rows = Object.entries(report.checks || {})
              .map(([name, item]) => `| ${name} | ${item.ok ? 'PASS' : 'FAIL'} | ${item.summary} |`)
              .join('\n');

            const comment = [
              `## Maintenance On-Demand (${new Date().toISOString()})`,
              `- score: ${report.score}`,
              `- workflow run: ${runUrl}`,
              `- pull request: ${process.env.PR_URL || 'not created'}`,
              '',
              '| Check | Status | Summary |',
              '| --- | --- | --- |',
              rows || '| n/a | n/a | n/a |',
              '',
              md.length > 5000 ? `${md.slice(0, 5000)}\n\n... (truncated)` : md,
              '',
              actionPlanMd
                ? '### Maintenance action plan'
                : '',
              actionPlanMd
                ? (actionPlanMd.length > 3000 ? `${actionPlanMd.slice(0, 3000)}\n\n... (truncated)` : actionPlanMd)
                : '',
              '',
              recommendationEligibilityMd
                ? '### Maintenance recommendation eligibility'
                : '',
              recommendationEligibilityMd
                ? (recommendationEligibilityMd.length > 3000 ? `${recommendationEligibilityMd.slice(0, 3000)}\n\n... (truncated)` : recommendationEligibilityMd)
                : '',
              '',
              recommendationsMd
                ? '### Adaptive maintenance recommendations'
                : '',
              recommendationsMd
                ? (recommendationsMd.length > 3000 ? `${recommendationsMd.slice(0, 3000)}\n\n... (truncated)` : recommendationsMd)
                : '',
              '',
              historyMd
                ? '### Maintenance policy decision history'
                : '',
              historyMd
                ? (historyMd.length > 3000 ? `${historyMd.slice(0, 3000)}\n\n... (truncated)` : historyMd)
                : '',
              '',
              memoryContextMd
                ? '### Maintenance policy memory context'
                : '',
              memoryContextMd
                ? (memoryContextMd.length > 3000 ? `${memoryContextMd.slice(0, 3000)}\n\n... (truncated)` : memoryContextMd)
                : '',
              '',
              policyMd
                ? '### Maintenance policy decisions'
                : '',
              policyMd
                ? (policyMd.length > 3000 ? `${policyMd.slice(0, 3000)}\n\n... (truncated)` : policyMd)
                : '',
              '',
              priorityMd
                ? '### Maintenance priority rollup'
                : '',
              priorityMd
                ? (priorityMd.length > 3000 ? `${priorityMd.slice(0, 3000)}\n\n... (truncated)` : priorityMd)
                : '',
              '',
              annotationMd
                ? '### GitHub Actions annotation hygiene'
                : '',
              annotationMd
                ? (annotationMd.length > 3000 ? `${annotationMd.slice(0, 3000)}\n\n... (truncated)` : annotationMd)
                : '',
            ].join('\n');

            let issueNumber = issueDefault;
            try {
              await github.rest.issues.get({ owner, repo, issue_number: issueDefault });
            } catch (error) {
              const created = await github.rest.issues.create({
                owner,
                repo,
                title: 'Weekly Maintenance',
                labels: ['maintenance'],
                body: 'Auto-created because requested maintenance issue was unavailable.',
              });
              issueNumber = created.data.number;
            }

            await github.rest.issues.createComment({ owner, repo, issue_number: issueNumber, body: comment });
