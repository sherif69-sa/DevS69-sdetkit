name: platform-readiness-quality-contract

on:
  workflow_dispatch:
  push:
    paths:
      - 'Makefile'
      - 'scripts/check_platform_readiness_quality_contract.py'
      - 'scripts/build_platform_readiness_trend_delta.py'
      - 'scripts/platform_readiness_persist_baseline_history.py'
      - 'scripts/platform_readiness_quality_engine.py'
      - 'tests/test_platform-readiness_*.py'

permissions:
  contents: read

jobs:
  platform-readiness-contract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.11'

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -c constraints-ci.txt -r requirements-test.txt -r requirements-docs.txt -e .

      - name: Seed baseline summary for contract lane
        run: |
          python scripts/seed_quality_baseline_summary_fixture.py --summary build/baseline-baseline/baseline-baseline-summary.json

      - name: Run quality-contract tests
        run: |
          pytest -q \
            tests/test_platform_readiness_quality_contract.py \
            tests/test_platform_readiness_trend_delta.py \
            tests/test_platform_readiness_remediation_payload_v2.py \
            tests/test_platform_readiness_followup_pass_determinism.py \
            tests/test_platform_readiness_baseline_history_persist.py

      - name: Run quality-contract operational lane
        run: |
          make quality-contract-run

      - name: Upload quality-contract artifacts
      # legacy artifact compatibility: phase3-quality-artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: platform-readiness-quality-artifacts
          path: |
            build/platform-readiness-quality/*.json
            build/phase3-quality/*.json
            build/platform-readiness-quality/*.md
            build/phase1-baseline/history/*.json
          if-no-files-found: error
