name: Invoke product control alignment

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: product-control-alignment-bootstrap-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  apply:
    if: github.head_ref == 'agent/guarded-remediation-product-control'
    name: Execute deterministic alignment patch
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: agent/guarded-remediation-product-control
          fetch-depth: 0

      - name: Apply and validate product-control patch
        shell: bash
        run: |
          set -euo pipefail
          python tools/apply_product_control_alignment.py
          python -m compileall -q \
            src/sdetkit/product_maturity_radar_portfolio.py \
            tests/test_product_maturity_radar_portfolio.py \
            tests/test_platform_capability_matrix.py
          git diff --check

      - name: Commit bounded product-control alignment
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm \
            .github/workflows/apply-product-control-alignment.yml \
            .github/workflows/invoke-product-control-alignment.yml \
            tools/apply_product_control_alignment.py
          git add \
            src/sdetkit/product_maturity_radar_portfolio.py \
            docs/roadmap/product-roadmap.md \
            docs/operator-reviewed-kpi-portfolio-report.md \
            tests/test_product_maturity_radar_portfolio.py \
            tests/test_platform_capability_matrix.py
          git commit -m "feat(product): align guarded remediation control truth"
          git push origin HEAD:agent/guarded-remediation-product-control
