name: Invoke product control alignment

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: product-control-alignment-bootstrap-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  apply:
    if: github.head_ref == 'agent/guarded-remediation-product-control'
    name: Execute deterministic alignment patch
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: agent/guarded-remediation-product-control
          fetch-depth: 1
          show-progress: false

      - name: Apply and validate product-control patch
        id: patch
        shell: bash
        run: |
          set -uo pipefail
          mkdir -p build/product-control-bootstrap
          python tools/apply_product_control_alignment.py \
            > build/product-control-bootstrap/patch.log 2>&1
          patch_rc=$?
          cat build/product-control-bootstrap/patch.log

          python - <<'PY'
          from pathlib import Path

          path = Path("tests/test_product_maturity_radar_portfolio.py")
          text = path.read_text(encoding="utf-8")
          start_marker = "def _fixture_paths(tmp_path: Path, *, keep_completed_gap: bool = False) -> dict[str, Path]:\n"
          end_marker = "def test_portfolio_report_integrates_reviewed_kpi_truth_without_inference(\n"
          start = text.find(start_marker)
          end = text.find(end_marker, start + len(start_marker))
          if start < 0 or end < 0:
              raise SystemExit("unable to repair KPI portfolio fixture section")
          replacement = r'''def _fixture_paths(tmp_path: Path, *, keep_completed_gap: bool = False) -> dict[str, Path]:
              radar = _write_json(tmp_path / "build" / "radar.json", _radar_payload())
              kpi = _write_json(tmp_path / "build" / "kpi.json", _kpi_payload())
              matrix = _write_json(
                  tmp_path / "docs" / "contracts" / "matrix.json",
                  _capability_matrix(keep_completed_gap=keep_completed_gap),
              )
              roadmap = tmp_path / "docs" / "roadmap.md"
              roadmap.parent.mkdir(parents=True, exist_ok=True)
              roadmap.write_text(
                  "The reviewed real-repository KPI baseline is complete.\n"
                  "Artifact: adoption-product-kpi-report.json\n"
                  "The baseline now contains two reviewed observations.\n"
                  "Next: `guarded_remediation_promotion`.\n",
                  encoding="utf-8",
              )
              operator = tmp_path / "docs" / "operator.md"
              operator.write_text(
                  "product-maturity-radar-portfolio.json\n"
                  "reviewed_observation_count\n"
                  "metrics_without_applicable_denominator\n"
                  "`guarded_remediation_promotion`\n",
                  encoding="utf-8",
              )
              return {
                  "radar_json": radar,
                  "kpi_report_json": kpi,
                  "capability_matrix_json": matrix,
                  "roadmap_markdown": roadmap,
                  "operator_guide_markdown": operator,
              }
          '''
          replacement = "\n".join(
              line[12:] if line.startswith("            ") else line
              for line in replacement.splitlines()
          ) + "\n\n"
          path.write_text(text[:start] + replacement + text[end:], encoding="utf-8")
          print("fixture_escape_repair=pass")
          PY

          python - <<'PY' > build/product-control-bootstrap/validation.log 2>&1
          import ast
          from pathlib import Path

          expected = {
              "src/sdetkit/product_maturity_radar_portfolio.py": (
                  'ACTIVE_ROADMAP_GAP = "guarded_remediation_promotion"',
                  '"roadmap_next_slice": ACTIVE_ROADMAP_GAP',
                  '"guarded_remediation_promotion_active"',
              ),
              "docs/roadmap/product-roadmap.md": (
                  "two reviewed observations",
                  "eleven reviewed pass outcomes",
                  "`guarded_remediation_promotion`",
                  "`measured_metric_count=7`",
                  "`unavailable_metric_count=0`",
              ),
              "docs/operator-reviewed-kpi-portfolio-report.md": (
                  "seven measured metrics",
                  "zero unavailable metrics",
                  "pass=11",
                  "not_applicable=3",
                  "`guarded_remediation_promotion`",
              ),
              "tests/test_product_maturity_radar_portfolio.py": (
                  "NOT_APPLICABLE_ONCE",
                  '== "reviewed_evidence_available"',
                  '== "guarded_remediation_promotion"',
                  '["pass"] == 11',
                  '["not_applicable"] == 3',
              ),
              "tests/test_platform_capability_matrix.py": (
                  'assert "two reviewed observations" in roadmap',
                  'assert "expand reviewed KPI denominators" not in roadmap',
              ),
          }
          for path, markers in expected.items():
              text = Path(path).read_text(encoding="utf-8")
              missing = [marker for marker in markers if marker not in text]
              if missing:
                  raise SystemExit(f"{path}: missing expected markers: {missing}")
          for path in (
              "src/sdetkit/product_maturity_radar_portfolio.py",
              "tests/test_product_maturity_radar_portfolio.py",
              "tests/test_platform_capability_matrix.py",
          ):
              ast.parse(Path(path).read_text(encoding="utf-8"), filename=path)
          for path in (
              "src/sdetkit/product_maturity_radar_portfolio.py",
              "docs/roadmap/product-roadmap.md",
              "docs/operator-reviewed-kpi-portfolio-report.md",
          ):
              if "expand reviewed KPI denominators" in Path(path).read_text(encoding="utf-8"):
                  raise SystemExit(f"{path}: stale active-lane marker remains")
          print("bounded_product_control_validation=pass")
          PY
          validation_rc=$?

          python - <<PY
          import json
          from pathlib import Path
          Path("build/product-control-bootstrap/status.json").write_text(
              json.dumps(
                  {
                      "patch_exit_code": $patch_rc,
                      "validation_exit_code": $validation_rc,
                      "ready_to_commit": $validation_rc == 0,
                  },
                  indent=2,
                  sort_keys=True,
              ) + "\n",
              encoding="utf-8",
          )
          PY

          cat build/product-control-bootstrap/validation.log
          cat build/product-control-bootstrap/status.json
          if [ "$validation_rc" -eq 0 ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload bootstrap diagnosis
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: product-control-bootstrap-diagnosis
          path: build/product-control-bootstrap/
          retention-days: 7
          if-no-files-found: error

      - name: Commit bounded product-control alignment
        if: steps.patch.outputs.ready == 'true'
        shell: bash
        run: |
          set -euo pipefail
          python -m compileall -q \
            src/sdetkit/product_maturity_radar_portfolio.py \
            tests/test_product_maturity_radar_portfolio.py \
            tests/test_platform_capability_matrix.py
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm \
            .github/workflows/apply-product-control-alignment.yml \
            .github/workflows/invoke-product-control-alignment.yml \
            tools/apply_product_control_alignment.py
          git add \
            src/sdetkit/product_maturity_radar_portfolio.py \
            docs/roadmap/product-roadmap.md \
            docs/operator-reviewed-kpi-portfolio-report.md \
            tests/test_product_maturity_radar_portfolio.py \
            tests/test_platform_capability_matrix.py
          git commit -m "feat(product): align guarded remediation control truth"
          git push origin HEAD:agent/guarded-remediation-product-control

      - name: Fail when bounded validation is incomplete
        if: steps.patch.outputs.ready != 'true'
        shell: bash
        run: exit 1
