name: Premium Gate

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  premium-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -c constraints-ci.txt -e '.[dev,test,docs]'
      - name: Run premium gate
        run: bash premium-gate.sh

      - name: Upload SARIF
        if: always() && hashFiles('.sdetkit/out/security.sarif') != ''
        uses: github/codeql-action/upload-sarif@87557b9c84dde89fdd9b10e88954ac2f4248e463  # v4
        with:
          sarif_file: .sdetkit/out/security.sarif

      - name: Upload evidence pack
        if: always() && hashFiles('.sdetkit/out/evidence.zip') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: evidence-pack
          path: .sdetkit/out/evidence.zip
