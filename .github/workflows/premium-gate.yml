# Local equivalent command:
#   python -m sdetkit workflow-governance-report --root . --format text
#   See docs/ci/workflow-local-equivalents.md#premium-gate for workflow-specific operator notes.
name: Premium Gate

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  premium-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Setup Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            constraints-ci.txt
            pyproject.toml
            requirements*.txt

      - name: Install
        run: |
          python -m pip install -c constraints-ci.txt --upgrade pip
          python -m pip install -c constraints-ci.txt -e '.[dev,test,docs]'
      - name: Run premium gate
        run: bash premium-gate.sh

      - name: Upload SARIF
        if: always() && hashFiles('.sdetkit/out/security.sarif') != ''
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a  # v4
        with:
          sarif_file: .sdetkit/out/security.sarif

      - name: Upload evidence pack
        if: always() && hashFiles('.sdetkit/out/evidence.zip') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          retention-days: 14
          name: evidence-pack
          path: .sdetkit/out/evidence.zip
