name: Formatter verifier trajectory proof

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  prove-and-finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: feature/formatter-verifier-trajectory-proof
          fetch-depth: 0

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.12"

      - name: Align verifier contracts and product control
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text(encoding="utf-8")
              if new in text:
                  return
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{path}: expected one marker, found {count}")
              file.write_text(text.replace(old, new, 1), encoding="utf-8")

          replace_once(
              "src/sdetkit/formatter_candidate_verifier.py",
              '''    replayable_benchmark_harness,
              repo_memory,
              trajectory_store,
          )
          ''',
              '''    remediation_research_contract,
              replayable_benchmark_harness,
              repo_memory,
              trajectory_store,
          )
          ''',
          )
          replace_once(
              "src/sdetkit/formatter_candidate_verifier.py",
              "        **formatter_candidate_benchmark.remediation_research_contract.authority_boundary(),\n",
              "        **remediation_research_contract.authority_boundary(),\n",
          )

          replace_once(
              "pyproject.toml",
              '''[[tool.mypy.overrides]]
          module = "sdetkit.formatter_candidate_benchmark"
          ignore_errors = false
          ''',
              '''[[tool.mypy.overrides]]
          module = [
            "sdetkit.formatter_candidate_benchmark",
            "sdetkit.formatter_candidate_verifier",
          ]
          ignore_errors = false
          ''',
          )

          replace_once(
              "docs/contracts/quality-truth-baseline.v1.json",
              '    "source_module_count": 524,',
              '    "source_module_count": 525,',
          )
          replace_once(
              "docs/contracts/quality-truth-baseline.v1.json",
              '      "sdetkit.formatter_candidate_benchmark",\n      "sdetkit.merge_readiness",',
              '      "sdetkit.formatter_candidate_benchmark",\n      "sdetkit.formatter_candidate_verifier",\n      "sdetkit.merge_readiness",',
          )

          replace_once(
              "tests/test_quality_truth_baseline.py",
              '    assert payload["observed"]["source_module_count"] == 524\n',
              '    assert payload["observed"]["source_module_count"] == 525\n',
          )
          replace_once(
              "tests/test_quality_truth_baseline.py",
              '    assert len(checked) == 36\n',
              '    assert len(checked) == 37\n',
          )
          replace_once(
              "tests/test_quality_truth_baseline.py",
              '    assert "sdetkit.formatter_candidate_benchmark" in checked\n',
              '    assert "sdetkit.formatter_candidate_benchmark" in checked\n    assert "sdetkit.formatter_candidate_verifier" in checked\n',
          )
          replace_once(
              "tests/test_quality_truth_baseline.py",
              '    assert "sdetkit.formatter_candidate_benchmark" not in inventory["modules"]\n',
              '    assert "sdetkit.formatter_candidate_benchmark" not in inventory["modules"]\n    assert "sdetkit.formatter_candidate_verifier" not in inventory["modules"]\n',
          )
          replace_once(
              "tests/test_quality_truth_baseline.py",
              '            "actual": 524,\n',
              '            "actual": 525,\n',
          )

          replace_once(
              "docs/docs-map.md",
              "[Formatter candidate benchmark](formatter-candidate-benchmark.md)",
              "[Formatter candidate benchmark](formatter-candidate-benchmark.md), [Formatter verifier and trajectory proof](formatter-verifier-trajectory-proof.md)",
          )
          replace_once(
              "mkdocs.yml",
              "      - Formatter candidate benchmark: formatter-candidate-benchmark.md\n",
              "      - Formatter candidate benchmark: formatter-candidate-benchmark.md\n      - Formatter verifier and trajectory proof: formatter-verifier-trajectory-proof.md\n",
          )

          replace_once(
              "docs/roadmap/product-roadmap.md",
              "| Candidate benchmark: formatter-only | A disposable local fixture executes the pinned formatter, retains exact before/after digests and diff evidence, proves all six research scenarios, verifies rollback, reports false positives explicitly, and grants no mutation or promotion authority. |\n",
              "| Candidate benchmark: formatter-only | A disposable local fixture executes the pinned formatter, retains exact before/after digests and diff evidence, proves all six research scenarios, verifies rollback, reports false positives explicitly, and grants no mutation or promotion authority. |\n| Verifier and trajectory proof | The retained formatter packet is independently checked for exact scope, artifact digests, evidence shadowing, proof capture, rollback bytes, and authority boundaries before review-first trajectory and RepoMemory artifacts are written. |\n",
          )
          replace_once(
              "docs/roadmap/product-roadmap.md",
              "| 1 | **Verifier and trajectory proof** | Connect the retained formatter-candidate evidence to ProtectedVerifier, ReplayableBenchmarkHarness, TrajectoryStore, and RepoMemory. | Claimed files equal actual writes, proof inputs are not mutated or shadowed, rollback restores exact bytes, and reviewed trajectories retain zero unsafe false-authority decisions. |\n| 2 | **Conditional narrow policy promotion** | Consider exactly one family only after independent proof and human review. | A separate authenticated contract preserves branch-only scope, rollback, audit, no merge authority, and all denied security, release, dependency, workflow-permission, and semantic-equivalence surfaces. |\n",
              "| 1 | **Conditional narrow policy promotion** | Consider exactly one family only after independent proof and human review. | A separate authenticated contract preserves branch-only scope, rollback, audit, no merge authority, and all denied security, release, dependency, workflow-permission, and semantic-equivalence surfaces. |\n",
          )
          replace_once(
              "docs/roadmap/product-roadmap.md",
              "The formatter-only candidate benchmark is implemented through a disposable local fixture and the versioned research contract. The active `guarded_remediation_promotion` lane now advances to verifier and trajectory proof without changing SafetyGate policy or granting patch authority.",
              "The formatter-only candidate benchmark and its verifier/trajectory proof are implemented through disposable evidence, ProtectedVerifier, ReplayableBenchmarkHarness, TrajectoryStore, and read-only RepoMemory. The active `guarded_remediation_promotion` lane now advances only to conditional narrow policy consideration; SafetyGate policy, patch authority, merge authority, and semantic-equivalence claims remain unchanged.",
          )
          PY

      - name: Install proof dependencies
        run: |
          python -m pip install -q --upgrade pip
          python -m pip install -q -c constraints-ci.txt -e .[dev,test,docs,packaging]

      - name: Format lint and type-check focused scope
        run: |
          python -m ruff check --fix \
            src/sdetkit/formatter_candidate_verifier.py \
            tests/test_formatter_candidate_verifier.py \
            tests/test_quality_truth_baseline.py
          python -m ruff format \
            src/sdetkit/formatter_candidate_verifier.py \
            tests/test_formatter_candidate_verifier.py \
            tests/test_quality_truth_baseline.py
          python -m ruff check \
            src/sdetkit/formatter_candidate_verifier.py \
            tests/test_formatter_candidate_verifier.py \
            tests/test_quality_truth_baseline.py
          python -m mypy src/sdetkit/formatter_candidate_verifier.py

      - name: Run focused contract proof
        run: |
          python -m pytest -q \
            tests/test_formatter_candidate_verifier.py \
            tests/test_formatter_candidate_benchmark.py \
            tests/test_protected_verifier.py \
            tests/test_trajectory_store.py \
            tests/test_repo_memory.py \
            tests/test_platform_capability_matrix.py \
            tests/test_quality_truth_baseline.py \
            -o addopts=
          python scripts/check_quality_truth_baseline.py \
            --root . \
            --contract docs/contracts/quality-truth-baseline.v1.json \
            --out build/quality/quality-truth-check.json \
            --typing-debt-out build/quality/typing-debt-inventory.json

      - name: Run real benchmark and verifier trajectory proof
        shell: bash
        run: |
          rm -rf build/formatter-candidate-benchmark build/formatter-candidate-verifier
          mkdir -p build/formatter-candidate-benchmark build/formatter-candidate-verifier
          python -m sdetkit.formatter_candidate_benchmark \
            --source-repository "${GITHUB_REPOSITORY}" \
            --source-commit-sha "$(git rev-parse HEAD)" \
            --pr-number "${{ github.event.pull_request.number }}" \
            --reviewer-id "maintainer-review-record" \
            --reviewed-at "2026-07-21T01:00:00Z" \
            --reviewer-decision accept \
            --reviewer-notes "Accepted formatter evidence for verifier and trajectory proof." \
            --contract-json docs/contracts/remediation-research.v1.json \
            --out-dir build/formatter-candidate-benchmark \
            --format json \
            > build/formatter-candidate-benchmark/cli-output.json
          python -m sdetkit.formatter_candidate_verifier \
            --benchmark-dir build/formatter-candidate-benchmark \
            --out-dir build/formatter-candidate-verifier \
            --repo "${GITHUB_REPOSITORY}" \
            --branch "${GITHUB_HEAD_REF}" \
            --commit-sha "$(git rev-parse HEAD)" \
            --pr-number "${{ github.event.pull_request.number }}" \
            --reviewed-at "2026-07-21T01:00:00Z" \
            --format json \
            > build/formatter-candidate-verifier/cli-output.json
          python - <<'PY'
          import json
          from pathlib import Path

          root = Path("build/formatter-candidate-verifier")
          report = json.loads((root / "formatter-candidate-verifier.json").read_text())
          memory = json.loads((root / "formatter-repo-memory.json").read_text())
          trajectory = json.loads((root / "formatter-trajectory.jsonl").read_text().strip())
          verifier = json.loads((root / "protected-verifier-result.json").read_text())

          assert report["status"] == "passed"
          assert all(report["checks"].values())
          assert report["protected_verifier_status"] == "structurally_verified_candidate"
          assert report["trajectory_record_count"] == 1
          assert report["trajectory_review_first_count"] == 1
          assert report["trajectory_auto_fix_allowed_count"] == 0
          assert report["repo_memory_known_safe_candidate_count"] == 0
          assert report["controlled_validation_status"] == "controlled_validation_passed"
          assert trajectory["decision"]["review_first"] is True
          assert trajectory["decision"]["auto_fix_allowed"] is False
          assert trajectory["proof"]["verifier_result"] == "structurally_verified_candidate"
          assert memory["decision_boundary"]["automation_allowed"] is False
          assert memory["decision_boundary"]["merge_authorized"] is False
          assert verifier["decision"]["automation_allowed"] is False
          assert verifier["decision"]["merge_authorized"] is False
          for field in (
              "automation_allowed",
              "patch_application_allowed",
              "merge_authorized",
              "publication_authorized",
              "security_dismissal_allowed",
              "semantic_equivalence_proven",
          ):
              assert report[field] is False
          PY

      - name: Run strict docs proof
        run: NO_MKDOCS_2_WARNING=1 python -m mkdocs build --strict

      - name: Commit clean review branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/formatter-verifier-trajectory-proof.yml
          git add \
            src/sdetkit/formatter_candidate_verifier.py \
            tests/test_formatter_candidate_verifier.py \
            docs/formatter-verifier-trajectory-proof.md \
            docs/docs-map.md \
            docs/roadmap/product-roadmap.md \
            mkdocs.yml \
            pyproject.toml \
            docs/contracts/quality-truth-baseline.v1.json \
            tests/test_quality_truth_baseline.py
          git commit -m "feat(remediation): prove formatter verifier trajectory"
          git push origin HEAD:feature/formatter-verifier-trajectory-proof
