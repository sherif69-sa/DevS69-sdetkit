# Local equivalent command:
#   python -m sdetkit workflow-governance-report --root . --format text
#   See docs/ci/workflow-local-equivalents.md#repo-audit for workflow-specific operator notes.
name: Repo Audit

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: repo-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repo-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Run sdetkit repo audit action
        uses: ./.github/actions/repo-audit
        with:
          path: .
          profile: default
          fail_on: ${{ github.event_name == 'pull_request' && 'warn' || 'error' }}
          write_summary: true
          output_json: true
          upload_json: true
          upload_sarif: true
