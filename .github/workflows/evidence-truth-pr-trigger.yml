name: Evidence truth PR trigger

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  execute-bootstrap:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Execute staged bootstrap
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git clone -q --depth 1 --branch agent/evidence-truth-dogfood \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" repo
          cd repo
          python tests/test_doctor_evidence_truth.py
