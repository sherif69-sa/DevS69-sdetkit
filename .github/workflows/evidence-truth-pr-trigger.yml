name: Evidence truth PR trigger

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  execute-bootstrap:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Execute staged bootstrap
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -u
          git clone -q --depth 1 --branch agent/evidence-truth-dogfood \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" repo
          cd repo
          python - <<'PY'
          from pathlib import Path
          import subprocess
          import textwrap

          workflow = Path('.github/workflows/evidence-truth-bootstrap.yml')
          lines = workflow.read_text(encoding='utf-8').splitlines()
          scripts = []
          index = 0
          while index < len(lines):
              line = lines[index]
              if line.startswith('      - name: '):
                  name = line.split(': ', 1)[1]
                  cursor = index + 1
                  while cursor < len(lines) and not lines[cursor].startswith('      - name: '):
                      if lines[cursor] == '        run: |':
                          cursor += 1
                          block = []
                          while cursor < len(lines):
                              current = lines[cursor]
                              if current.startswith('      - name: '):
                                  break
                              if current.startswith('        '):
                                  block.append(current[8:])
                              else:
                                  block.append(current)
                              cursor += 1
                          script = textwrap.dedent('\n'.join(block)).rstrip() + '\n'
                          scripts.append((name, script))
                          break
                      cursor += 1
              index += 1

          expected = [
              'Apply focused evidence-truth patch',
              'Install proof dependencies',
              'Format and lint focused scope',
              'Run focused proof',
              'Run clean-wheel dogfood',
              'Commit clean review branch',
          ]
          names = [name for name, _ in scripts]
          if names != expected:
              raise SystemExit(f'unexpected bootstrap steps: {names!r}')

          for name, script in scripts:
              if name == 'Commit clean review branch':
                  script = script.replace(
                      'git rm .github/workflows/evidence-truth-bootstrap.yml',
                      'git rm .github/workflows/evidence-truth-bootstrap.yml .github/workflows/evidence-truth-pr-trigger.yml',
                      1,
                  )
              result = subprocess.run(
                  ['bash', '-euo', 'pipefail', '-c', script],
                  text=True,
                  capture_output=True,
                  check=False,
              )
              if result.returncode != 0:
                  print(f'FAILED_STEP={name}')
                  combined = (result.stdout + '\n' + result.stderr).splitlines()
                  for line in combined[-100:]:
                      print(line)
                  raise SystemExit(result.returncode)
              print(f'PASSED_STEP={name}')
          PY
