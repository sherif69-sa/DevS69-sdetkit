# Local equivalent command:
#   python -m sdetkit workflow-governance-report --root . --format text
#   See docs/ci/workflow-local-equivalents.md#dependency-audit for workflow-specific operator notes.
name: Dependency Audit

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "15 4 * * *"

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml
            requirements-test.txt
            requirements-docs.txt

      - name: Install audit tooling
        run: |
          python -m pip install -c constraints-ci.txt pip-audit==2.10.1

      - name: Audit dependencies (blocking, baseline aware)
        run: |
          python -m pip install -c constraints-ci.txt -e .
          pip-audit --format json -o pip-audit-report.json -r requirements-test.txt -r requirements-docs.txt --ignore-vuln CVE-2026-4539 --ignore-vuln CVE-2025-69534
          python .github/scripts/check_pip_audit_baseline.py

      - name: Upload pip-audit artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: pip-audit-report
          retention-days: 7
          path: pip-audit-report.json
