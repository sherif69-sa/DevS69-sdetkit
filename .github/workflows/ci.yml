name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      run_network_tests:
        description: "Run tests marked @pytest.mark.network (opt-in; default is offline-only)"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:


  workflow-contracts:
    name: Workflow contracts
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"

      - name: Validate workflow and required-check contracts
        run: |
          mkdir -p build/workflow-contracts
          python scripts/check_workflow_contracts.py \
            --root . \
            --topology-contract docs/contracts/workflow-topology.v1.json \
            --required-checks-contract docs/contracts/required-checks.v1.json \
            --out-json build/workflow-contracts/report.json \
            --out-md build/workflow-contracts/report.md

      - name: Upload workflow contract report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: workflow-contract-report
          path: build/workflow-contracts/
          retention-days: 14
          if-no-files-found: error

  repo-audit:
    name: Repo audit report
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        id: checkout_merge
        continue-on-error: true

      - name: Checkout PR head (fallback)
        if: steps.checkout_merge.outcome != 'success' && github.event_name == 'pull_request'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install project
        run: |
          python -m pip install -c constraints-ci.txt --upgrade pip
          python -m pip install -c constraints-ci.txt -e .

      - name: Run repo audit
        run: sdetkit repo check --format json --out report.json --force

      - name: Upload repo audit artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: repo-audit-report
          path: report.json

  fast-ci:
    name: Fast CI lane (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    env:
      PYTEST_ADDOPTS: "-n auto"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install project + dev/test extras
        run: |
          python -m pip install -c constraints-ci.txt --upgrade pip
          python -m pip install -c constraints-ci.txt -e .[dev,test]

      - name: Ruff lint baseline
        run: python -m ruff check src tests

      - name: Public surface alignment contract
        run: |
          python scripts/check_public_surface_alignment.py
          python -m pytest -q tests/test_cli_help_discoverability_contract.py tests/test_public_surface_alignment.py

      - name: Generated artifact freshness guard
        run: python scripts/check_generated_artifacts_freshness.py

      - name: Pre-merge changed-files strict gate
        if: ${{ github.event_name == 'pull_request' }}
        env:
          QUALITY_DIFF_BASE: ${{ github.event.pull_request.base.sha }}
        run: bash quality.sh premerge

      - name: Canonical fast gate (offline default)
        if: ${{ github.event.inputs.run_network_tests != 'true' }}
        run: bash ci.sh quick --skip-docs --artifact-dir build

      - name: Canonical fast gate (with network tests)
        if: ${{ github.event.inputs.run_network_tests == 'true' }}
        run: bash ci.sh quick --skip-docs --run-network --artifact-dir build

      - name: Collect security threshold diagnostics (non-blocking)
        if: always()
        continue-on-error: true
        run: |
          mkdir -p build
          python -m sdetkit security enforce --format json --max-error 0 --max-warn 0 --max-info 0 --out build/security-enforce.json

      - name: Generate kit sample artifacts
        if: always()
        run: |
          mkdir -p build
          python -m sdetkit --help > build/help-root.txt
          python -m sdetkit kits list --format json > build/kits.json
          python -m sdetkit kits describe release --format json > build/kits-release.json
          python -m sdetkit release gate fast --format json > build/release-gate-fast.json || true
          python -m sdetkit intelligence flake classify --history examples/kits/intelligence/flake-history.json > build/intelligence-flake.json
          python -m sdetkit integration check --profile examples/kits/integration/profile.json > build/integration-check.json
          python -m sdetkit forensics compare --from examples/kits/forensics/run-a.json --to examples/kits/forensics/run-b.json > build/forensics-compare.json
          python -m sdetkit doctor --format json --out build/doctor.json || true

      - name: Build unified CI summary artifact
        if: always()
        run: |
          mkdir -p build
          python scripts/build_ci_summary.py --artifact-dir build --out-json build/ci-summary.json --out-md build/ci-summary.md

      - name: Upload CI gate diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ci-gate-diagnostics-py${{ matrix.python-version }}
          path: |
            build/gate-fast.json
            build/security-enforce.json
            build/help-root.txt
            build/kits.json
            build/kits-release.json
            build/release-gate-fast.json
            build/intelligence-flake.json
            build/integration-check.json
            build/forensics-compare.json
            build/doctor.json
            build/ci-summary.json
            build/ci-summary.md
          retention-days: 14
          if-no-files-found: warn

  ci-example-60s:
    name: 60-second CI example artifact
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install project
        run: |
          python -m pip install -c constraints-ci.txt --upgrade pip
          python -m pip install -c constraints-ci.txt -e .

      - name: Run deterministic example
        run: |
          mkdir -p build
          python -m sdetkit example --format json > build/ci-example.json

      - name: Upload example artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ci-example-json
          path: build/ci-example.json

  package-validate:
    name: Build + twine check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install packaging tooling
        run: |
          python -m pip install -c constraints-ci.txt --upgrade pip
          python -m pip install -c constraints-ci.txt -e .[dev,packaging]

      - name: Build distributions
        run: python -m build

      - name: Twine check
        run: python -m twine check dist/*

      - name: Wheel contents check
        run: python -m check_wheel_contents --ignore W009 dist/*.whl

      - name: Emit package-validate summary
        run: |
          mkdir -p build
          python - <<'PY'
          import json
          from datetime import UTC, datetime
          payload = {
            "ok": True,
            "generated_at": datetime.now(UTC).isoformat(),
            "checks": ["build", "twine_check", "wheel_contents_check"],
          }
          with open("build/package-validate.json", "w", encoding="utf-8") as f:
            f.write(json.dumps(payload, ensure_ascii=True, sort_keys=True, separators=(",", ":")) + "\n")
          PY

      - name: Upload dist artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: dist
          path: |
            dist/*
            build/package-validate.json

  smoke-install:
    name: Smoke install from built wheel (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: package-validate
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Download dist artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist
          path: dist

      - name: Install wheel in isolated venv + installed-wheel contracts
        shell: bash
        run: |
          python -m venv .venv-smoke
          . .venv-smoke/bin/activate
          WHEEL_PATH="$(find dist -type f -name '*.whl' | head -n 1)"
          if [[ -z "$WHEEL_PATH" ]]; then
            echo "No wheel found under dist/ after artifact download" >&2
            exit 1
          fi
          python -m pip install -c constraints-ci.txt "$WHEEL_PATH"
          python tests/contract/check_installed_wheel.py \
            --python .venv-smoke/bin/python \
            --repo-root .

  full-ci:
    name: Full CI lane
    runs-on: ubuntu-latest
    needs: [fast-ci, smoke-install, repo-audit]
    env:
      PYTEST_ADDOPTS: "-n auto"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install project + all extras
        run: |
          python -m pip install -c constraints-ci.txt --upgrade pip
          python -m pip install -c constraints-ci.txt -e .[dev,test,docs]

      - name: Pre-commit
        run: python -m pre_commit run -a

      - name: Prepare ephemeral test-observation input directory
        run: mkdir -p "${RUNNER_TEMP}/sdetkit-trusted-test-input"

      - name: Coverage gate
        id: coverage
        env:
          COV_FAIL_UNDER: "95"
          PYTEST_ADDOPTS: "-n auto --junitxml=${{ runner.temp }}/sdetkit-trusted-test-input/junit.xml"
        run: bash quality.sh cov

      - name: Build full-suite failure summary
        id: full_suite_failure_summary
        if: ${{ always() && steps.coverage.outcome != 'skipped' }}
        run: |
          mkdir -p build/full-suite-failure-summary
          python -m sdetkit.ci_failure_summary \
            --junit-xml "${RUNNER_TEMP}/sdetkit-trusted-test-input/junit.xml" \
            --workflow "CI" \
            --job "Full CI lane" \
            --run-id "${GITHUB_RUN_ID}" \
            --head-sha "${GITHUB_SHA}" \
            --command "bash quality.sh cov" \
            --event-name "${GITHUB_EVENT_NAME}" \
            --ref-name "${GITHUB_REF}" \
            --out-dir build/full-suite-failure-summary \
            --format json \
            > build/full-suite-failure-summary-cli.json
          echo "artifact_written=true" >> "${GITHUB_OUTPUT}"

      - name: Upload full-suite failure summary artifact
        if: ${{ always() && steps.coverage.outcome == 'failure' && steps.full_suite_failure_summary.outputs.artifact_written == 'true' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: full-suite-failure-summary
          path: |
            build/full-suite-failure-summary/full-suite-failure-summary.json
            build/full-suite-failure-summary/full-suite-failure-summary.md
            build/full-suite-failure-summary-cli.json
          retention-days: 14
          if-no-files-found: error

      - name: Normalize trusted-main test observations
        id: trusted_observations
        if: ${{ always() && github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.coverage.outcome != 'skipped' }}
        run: |
          if [[ ! -s "${RUNNER_TEMP}/sdetkit-trusted-test-input/junit.xml" ]]; then
            echo "trusted_test_observations=not_available_no_junit"
            echo "artifact_written=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          PYTHONPATH=src python -m sdetkit.trusted_test_observation_capture \
            --junit-xml "${RUNNER_TEMP}/sdetkit-trusted-test-input/junit.xml" \
            --source-workflow "CI" \
            --source-job "Full CI lane" \
            --source-run-id "${GITHUB_RUN_ID}" \
            --source-head-sha "${GITHUB_SHA}" \
            --event-name "${GITHUB_EVENT_NAME}" \
            --ref-name "${GITHUB_REF}" \
            --out-dir build/trusted-test-observations \
            --format json \
            > build/trusted-test-observations-cli.json

          echo "artifact_written=true" >> "${GITHUB_OUTPUT}"

      - name: Upload trusted-main test observation artifact
        if: ${{ always() && github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.trusted_observations.outputs.artifact_written == 'true' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: trusted-test-observations
          path: |
            build/trusted-test-observations/trusted-test-observations.json
            build/trusted-test-observations/trusted-test-observations.md
            build/trusted-test-observations-cli.json
          retention-days: 90
          if-no-files-found: error

      - name: Docs build
        run: NO_MKDOCS_2_WARNING=1 python -m mkdocs build --strict
