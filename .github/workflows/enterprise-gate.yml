name: Enterprise Gate

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        id: checkout_merge
        continue-on-error: true

      - name: Checkout PR head (fallback)
        if: steps.checkout_merge.outcome != 'success' && github.event_name == 'pull_request'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1
      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"

      - name: Install package
        run: |
          python -m pip install -U pip
          python -m pip install -e .

      - name: Doctor
        run: |
          sdetkit doctor --all

      - name: Repo check (enterprise)
        run: |
          python - <<'PY'
          from pathlib import Path
          import shutil

          for path in (Path(".sdetkit/cache"), Path(".sdetkit/ops-artifacts")):
              shutil.rmtree(path, ignore_errors=True)
          Path("sdet_check.json").unlink(missing_ok=True)
          PY
          rc=0
          sdetkit repo check . --profile enterprise --format json --out sdet_check.json --force || rc=$?
          python - <<'PY'
          import json
          import sys

          with open("sdet_check.json", "r", encoding="utf-8") as fh:
              payload = json.load(fh)
          findings = payload.get("findings", [])
          if findings:
              raise SystemExit(f"enterprise gate failed: findings={len(findings)}")
          print("enterprise gate ok: findings=0")
          PY
          test "$rc" -eq 0

      - name: Upload report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: sdet_check
          path: sdet_check.json
