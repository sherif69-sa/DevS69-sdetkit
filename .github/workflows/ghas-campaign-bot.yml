name: GHAS Campaign Bot

on:
  workflow_dispatch:
  schedule:
    - cron: "45 5 * * 4"

permissions:
  contents: read
  issues: write
  security-events: read

jobs:
  campaign-planner:
    runs-on: ubuntu-latest
    steps:
      - name: Create GHAS campaign planner issue
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
        env:
          GHAS_TOKEN: ${{ secrets.GHAS_READ_TOKEN }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const weekOf = new Date().toISOString().slice(0, 10);
            const labels = [
              { name: 'maintenance', color: '0E8A16', description: 'Automated maintenance tracking' },
              { name: 'security', color: 'b60205', description: 'Security operations and hardening work' },
              { name: 'ghas', color: '5319e7', description: 'GitHub Advanced Security automation and triage' },
              { name: 'priority:medium', color: 'fbca04', description: 'Medium-priority work item' },
            ];

            for (const label of labels) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name: label.name });
              } catch {
                await github.rest.issues.createLabel({ owner, repo, ...label });
              }
            }

            const ghasToken = process.env.GHAS_TOKEN || github.token;
            const headers = {
              accept: 'application/vnd.github+json',
              authorization: `Bearer ${ghasToken}`,
              'x-github-api-version': '2022-11-28',
            };

            const notes = [];
            const dayMs = 24 * 60 * 60 * 1000;

            async function fetchAlerts(path, label) {
              try {
                const response = await github.request(`GET ${path}`, {
                  owner,
                  repo,
                  state: 'open',
                  per_page: 100,
                  headers,
                });
                return Array.isArray(response.data) ? response.data : [];
              } catch (error) {
                notes.push(`${label} unavailable: ${error.message}. Add GHAS_READ_TOKEN if broader security scopes are required.`);
                return [];
              }
            }

            function ageBucketDays(createdAt) {
              const createdMs = new Date(createdAt).getTime();
              if (!Number.isFinite(createdMs)) return 'unknown';
              const ageDays = Math.floor((Date.now() - createdMs) / dayMs);
              if (ageDays >= 30) return '30+d';
              if (ageDays >= 14) return '14-29d';
              if (ageDays >= 7) return '7-13d';
              return '0-6d';
            }

            function summarizeCodeAlerts(alerts) {
              const severityCounts = new Map();
              const ageCounts = new Map();
              let autofixHints = 0;
              for (const alert of alerts) {
                const severity = alert.rule?.security_severity_level || alert.rule?.severity || 'unknown';
                severityCounts.set(severity, (severityCounts.get(severity) || 0) + 1);
                const age = ageBucketDays(alert.created_at);
                ageCounts.set(age, (ageCounts.get(age) || 0) + 1);
                if (alert.most_recent_instance?.analysis_key || alert.tool?.name === 'CodeQL') {
                  autofixHints += 1;
                }
              }
              return { severityCounts, ageCounts, autofixHints };
            }

            function summarizeSecretAlerts(alerts) {
              let bypassed = 0;
              const ageCounts = new Map();
              for (const alert of alerts) {
                const age = ageBucketDays(alert.created_at || alert.updated_at);
                ageCounts.set(age, (ageCounts.get(age) || 0) + 1);
                if (alert.push_protection_bypassed === true) {
                  bypassed += 1;
                }
              }
              return { bypassed, ageCounts };
            }

            async function fetchRepoSecurityConfiguration() {
              try {
                const response = await github.request('GET /repos/{owner}/{repo}/code-security-configuration', {
                  owner,
                  repo,
                  headers,
                });
                return response.data;
              } catch (error) {
                notes.push(`Repository security configuration unavailable: ${error.message}`);
                return null;
              }
            }

            const codeAlerts = await fetchAlerts('/repos/{owner}/{repo}/code-scanning/alerts', 'Code scanning');
            const secretAlerts = await fetchAlerts('/repos/{owner}/{repo}/secret-scanning/alerts', 'Secret scanning');
            const codeSummary = summarizeCodeAlerts(codeAlerts);
            const secretSummary = summarizeSecretAlerts(secretAlerts);
            const configuration = await fetchRepoSecurityConfiguration();

            const title = `🧭 GHAS campaign planner (${weekOf})`;
            const mapToLines = (map, label, preferredOrder = []) => {
              if (!map || map.size === 0) return [`- ${label}: none`];
              const rank = new Map(preferredOrder.map((name, index) => [name, index]));
              return [...map.entries()]
                .sort((a, b) => {
                  const left = rank.has(a[0]) ? rank.get(a[0]) : Number.MAX_SAFE_INTEGER;
                  const right = rank.has(b[0]) ? rank.get(b[0]) : Number.MAX_SAFE_INTEGER;
                  if (left !== right) return left - right;
                  return String(a[0]).localeCompare(String(b[0]));
                })
                .map(([key, value]) => `- ${label} ${key}: **${value}**`);
            };
            const severityOrder = ['critical', 'high', 'medium', 'low', 'warning', 'note', 'unknown'];
            const ageOrder = ['0-6d', '7-13d', '14-29d', '30+d', 'unknown'];

            const body = [
              'This issue is auto-generated to turn open GHAS alerts into actionable remediation campaigns.',
              '',
              '## Why this exists',
              '- GitHub security campaigns help teams burn down alert backlogs in focused slices.',
              '- Code scanning campaigns can benefit from Copilot Autofix suggestions and assignment workflows when those features are available.',
              '- Secret scanning campaigns help prioritize alerts that were bypassed or have aged beyond the weekly review window.',
              '',
              '## Open alert slices',
              `- Open code scanning alerts: **${codeAlerts.length}**`,
              `- CodeQL/Copilot Autofix candidate alerts: **${codeSummary.autofixHints}**`,
              `- Open secret scanning alerts: **${secretAlerts.length}**`,
              `- Push-protection bypassed secret alerts: **${secretSummary.bypassed}**`,
              '',
              '### Code scanning by severity',
              ...mapToLines(codeSummary.severityCounts, 'severity', severityOrder),
              '',
              '### Code scanning by age',
              ...mapToLines(codeSummary.ageCounts, 'age', ageOrder),
              '',
              '### Secret scanning by age',
              ...mapToLines(secretSummary.ageCounts, 'age', ageOrder),
              '',
              '## Security configuration context',
              configuration
                ? `- Repository configuration: **${configuration.name || 'attached'}** (target type: ${configuration.target_type || 'n/a'})`
                : '- Repository configuration details were not available. This is expected for user-owned repos or tokens without admin/security scope.',
              configuration && configuration.code_security
                ? `- Code security status: **${configuration.code_security}**`
                : '- Code security status: unavailable from API response.',
              configuration && configuration.secret_protection
                ? `- Secret protection status: **${configuration.secret_protection}**`
                : '- Secret protection status: unavailable from API response.',
              '',
              '## Suggested weekly execution lane',
              '- [ ] Create or refresh a security campaign for any 14+ day code scanning backlog.',
              '- [ ] Use Copilot Autofix suggestions where available, then validate fixes in CI before merge.',
              '- [ ] Group push-protection bypass secret alerts into a focused follow-up campaign and record owner/disposition.',
              '- [ ] Link the resulting issue or PR back to this planner for traceability.',
              '',
              '## Review links',
              `- Code scanning: https://github.com/${owner}/${repo}/security/code-scanning`,
              `- Secret scanning: https://github.com/${owner}/${repo}/security/secret-scanning`,
              `- Security overview: https://github.com/${owner}/${repo}/security`,
              '',
              '## Notes',
              ...(notes.length ? notes.map((note) => `- ${note}`) : ['- GHAS APIs responded without fallback warnings.']),
            ].join('\n');

            const openIssues = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              labels: 'ghas',
              per_page: 100,
            });
            const priorIssues = openIssues.data.filter((issue) => issue.title.startsWith('🧭 GHAS campaign planner'));

            for (const oldIssue of priorIssues) {
              if (oldIssue.title !== title) {
                await github.rest.issues.update({ owner, repo, issue_number: oldIssue.number, state: 'closed' });
              }
            }

            const existing = priorIssues.find((issue) => issue.title === title);
            if (existing) {
              await github.rest.issues.update({ owner, repo, issue_number: existing.number, body });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
                labels: ['maintenance', 'security', 'ghas', 'priority:medium'],
              });
            }
