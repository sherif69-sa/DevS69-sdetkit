name: GHAS Metrics Export Bot

on:
  workflow_dispatch:
  schedule:
    - cron: "30 6 * * 5"

permissions:
  actions: read
  contents: read
  issues: write
  security-events: read

jobs:
  ghas-metrics-export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Collect GHAS metrics snapshot
        id: collect
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
        env:
          GHAS_TOKEN: ${{ secrets.GHAS_READ_TOKEN }}
        with:
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const weekOf = new Date().toISOString().slice(0, 10);
            const labels = [
              { name: 'maintenance', color: '0E8A16', description: 'Automated maintenance tracking' },
              { name: 'security', color: 'b60205', description: 'Security operations and hardening work' },
              { name: 'ghas', color: '5319e7', description: 'GitHub Advanced Security automation and triage' },
              { name: 'priority:medium', color: 'fbca04', description: 'Medium-priority work item' },
            ];

            for (const label of labels) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name: label.name });
              } catch {
                await github.rest.issues.createLabel({ owner, repo, ...label });
              }
            }

            const ghasToken = process.env.GHAS_TOKEN || github.token;
            const headers = {
              accept: 'application/vnd.github+json',
              authorization: `Bearer ${ghasToken}`,
              'x-github-api-version': '2022-11-28',
            };
            const notes = [];
            const dayMs = 24 * 60 * 60 * 1000;
            const staleWorkflowDays = 14;

            function ageInDays(isoAt) {
              const at = new Date(isoAt || '').getTime();
              if (!Number.isFinite(at)) {
                return null;
              }
              return Math.max(0, Math.floor((Date.now() - at) / dayMs));
            }

            async function fetchAlerts(path, label) {
              try {
                return await github.paginate(`GET ${path}`, {
                  owner,
                  repo,
                  state: 'open',
                  per_page: 100,
                  headers,
                });
              } catch (error) {
                notes.push(`${label} unavailable: ${error.message}. Add GHAS_READ_TOKEN if broader security scopes are required.`);
                return [];
              }
            }

            function ageDays(alert) {
              const raw = alert.created_at || alert.updated_at || alert.dismissed_at;
              const createdMs = new Date(raw).getTime();
              if (!Number.isFinite(createdMs)) return 0;
              return Math.max(0, Math.floor((Date.now() - createdMs) / dayMs));
            }

            function ageBuckets(alerts) {
              const buckets = { '0-6d': 0, '7-13d': 0, '14-29d': 0, '30+d': 0 };
              for (const alert of alerts) {
                const age = ageDays(alert);
                if (age >= 30) buckets['30+d'] += 1;
                else if (age >= 14) buckets['14-29d'] += 1;
                else if (age >= 7) buckets['7-13d'] += 1;
                else buckets['0-6d'] += 1;
              }
              return buckets;
            }

            function severityCounts(alerts, picker) {
              const counts = {};
              for (const alert of alerts) {
                const severity = String(picker(alert) || 'unknown').toLowerCase();
                counts[severity] = (counts[severity] || 0) + 1;
              }
              return counts;
            }

            const trackedWorkflows = [
              'security.yml',
              'osv-scanner.yml',
              'dependency-audit.yml',
              'sbom.yml',
              'dependency-review.yml',
              'ghas-review-bot.yml',
              'ghas-campaign-bot.yml',
              'ghas-alert-sla-bot.yml',
              'ghas-metrics-export-bot.yml',
              'ghas-codeql-hotspots-bot.yml',
              'security-configuration-audit-bot.yml',
              'security-maintenance-bot.yml',
              'workflow-governance-bot.yml',
              'dependency-radar-bot.yml',
            ];

            const workflowFreshness = [];
            for (const workflowFile of trackedWorkflows) {
              try {
                const runs = await github.rest.actions.listWorkflowRuns({
                  owner,
                  repo,
                  workflow_id: workflowFile,
                  per_page: 1,
                });
                const latest = runs.data.workflow_runs?.[0];
                const updatedAgeDays = ageInDays(latest?.updated_at);
                workflowFreshness.push({
                  workflow: workflowFile,
                  latest_result: latest ? (latest.conclusion || latest.status || 'unknown') : 'no-runs',
                  updated_at: latest?.updated_at || null,
                  updated_age_days: updatedAgeDays,
                  stale_14d: updatedAgeDays !== null ? updatedAgeDays >= staleWorkflowDays : null,
                  url: latest?.html_url || `https://github.com/${owner}/${repo}/actions/workflows/${workflowFile}`,
                });
              } catch (error) {
                notes.push(`Unable to inspect ${workflowFile}: ${error.message}`);
                workflowFreshness.push({
                  workflow: workflowFile,
                  latest_result: 'inspection-failed',
                  updated_at: null,
                  updated_age_days: null,
                  stale_14d: null,
                  url: `https://github.com/${owner}/${repo}/actions/workflows/${workflowFile}`,
                });
              }
            }

            const codeAlerts = await fetchAlerts('/repos/{owner}/{repo}/code-scanning/alerts', 'Code scanning alerts');
            const dependabotAlerts = await fetchAlerts('/repos/{owner}/{repo}/dependabot/alerts', 'Dependabot alerts');
            const secretAlerts = await fetchAlerts('/repos/{owner}/{repo}/secret-scanning/alerts', 'Secret scanning alerts');

            const snapshot = {
              generated_at: new Date().toISOString(),
              repository: `${owner}/${repo}`,
              alerts: {
                code_scanning: {
                  total_open: codeAlerts.length,
                  age_buckets: ageBuckets(codeAlerts),
                  severity: severityCounts(
                    codeAlerts,
                    (alert) => alert.rule?.security_severity_level || alert.rule?.severity
                  ),
                },
                dependabot: {
                  total_open: dependabotAlerts.length,
                  age_buckets: ageBuckets(dependabotAlerts),
                  severity: severityCounts(
                    dependabotAlerts,
                    (alert) => alert.security_vulnerability?.severity || alert.severity
                  ),
                },
                secret_scanning: {
                  total_open: secretAlerts.length,
                  age_buckets: ageBuckets(secretAlerts),
                  push_protection_bypassed: secretAlerts.filter(
                    (alert) => alert.push_protection_bypassed === true
                  ).length,
                },
              },
              workflows: workflowFreshness,
              notes,
            };

            fs.mkdirSync('build', { recursive: true });
            fs.writeFileSync('build/ghas-metrics.json', JSON.stringify(snapshot, null, 2) + '\n');

            const body = [
              'This issue is auto-generated to publish a reusable GHAS metrics snapshot for dashboards, audits, and weekly review.',
              '',
              '## Open alert totals',
              `- Code scanning: **${snapshot.alerts.code_scanning.total_open}**`,
              `- Dependabot: **${snapshot.alerts.dependabot.total_open}**`,
              `- Secret scanning: **${snapshot.alerts.secret_scanning.total_open}**`,
              `- Secret scanning push-protection bypasses: **${snapshot.alerts.secret_scanning.push_protection_bypassed}**`,
              '',
              '## Age buckets',
              `- Code scanning: \`${JSON.stringify(snapshot.alerts.code_scanning.age_buckets)}\``,
              `- Dependabot: \`${JSON.stringify(snapshot.alerts.dependabot.age_buckets)}\``,
              `- Secret scanning: \`${JSON.stringify(snapshot.alerts.secret_scanning.age_buckets)}\``,
              '',
              '## Workflow freshness',
              '| Workflow | Latest result | Updated at | Age (days) | 14d stale | Link |',
              '| --- | --- | --- | --- | --- | --- |',
              ...workflowFreshness.map((row) => `| ${row.workflow} | ${row.latest_result} | ${row.updated_at || 'n/a'} | ${row.updated_age_days ?? 'n/a'} | ${row.stale_14d === null ? 'n/a' : (row.stale_14d ? 'yes' : 'no')} | [open](${row.url}) |`),
              '',
              '## Artifact',
              '- Action artifact: `ghas-metrics-snapshot` (`build/ghas-metrics.json`)',
              '- Use this JSON snapshot for weekly trend review, dashboards, or evidence packs.',
              '',
              '## Notes',
              ...(notes.length ? notes.map((note) => `- ${note}`) : ['- GHAS APIs responded without fallback warnings.']),
            ].join('\n');

            fs.writeFileSync('build/ghas-metrics-issue.md', body + '\n');
            core.setOutput('issue_title', `📊 GHAS metrics snapshot (${weekOf})`);

      - name: Upload GHAS metrics artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ghas-metrics-snapshot
          path: |
            build/ghas-metrics.json
            build/ghas-metrics-issue.md

      - name: Publish GHAS metrics issue
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
        env:
          ISSUE_TITLE: ${{ steps.collect.outputs.issue_title }}
        with:
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const title = process.env.ISSUE_TITLE;
            const body = fs.readFileSync('build/ghas-metrics-issue.md', 'utf8');

            const openIssues = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              labels: 'ghas',
              per_page: 100,
            });
            const priorIssues = openIssues.data.filter((issue) => issue.title.startsWith('📊 GHAS metrics snapshot'));

            for (const oldIssue of priorIssues) {
              if (oldIssue.title !== title) {
                await github.rest.issues.update({ owner, repo, issue_number: oldIssue.number, state: 'closed' });
              }
            }

            const existing = priorIssues.find((issue) => issue.title === title);
            if (existing) {
              await github.rest.issues.update({ owner, repo, issue_number: existing.number, body });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
                labels: ['maintenance', 'security', 'ghas', 'priority:medium'],
              });
            }
