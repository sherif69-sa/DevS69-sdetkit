name: Formatter policy proposal direct baseline assertion fix

on:
  pull_request:
    types: [synchronize]

permissions:
  contents: write

jobs:
  fix:
    if: github.head_ref == 'feature/formatter-policy-proposal'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout proposal branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: feature/formatter-policy-proposal
          fetch-depth: 0

      - name: Correct stale mismatch assertion and self-remove
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path("tests/test_quality_truth_baseline.py")
          text = path.read_text(encoding="utf-8")
          old = '            "actual": 525,\n'
          new = '            "actual": 526,\n'
          if text.count(old) != 1:
              raise SystemExit(f"expected one stale actual count, found {text.count(old)}")
          path.write_text(text.replace(old, new), encoding="utf-8")
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/formatter-policy-proposal-direct-test-fix.yml
          git add tests/test_quality_truth_baseline.py
          git diff --cached --check
          git commit -m "fix(remediation): align proposal source count assertion"
          git push origin HEAD:feature/formatter-policy-proposal
