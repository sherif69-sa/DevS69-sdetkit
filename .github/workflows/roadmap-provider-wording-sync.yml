name: Roadmap provider wording sync

on:
  pull_request:
    types: [synchronize, reopened]

permissions:
  contents: write

jobs:
  sync:
    if: github.head_ref == 'feature/azure-devops-proof-discovery'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Restore provider capability phrases
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("docs/roadmap/product-roadmap.md")
          text = path.read_text(encoding="utf-8")
          old = "| Jenkins, CircleCI, and Azure DevOps proof-command discovery |"
          new = (
              "| Jenkins proof-command discovery, CircleCI proof-command discovery, "
              "and Azure DevOps proof-command discovery |"
          )
          if text.count(old) != 1:
              raise SystemExit("expected combined provider roadmap row not found once")
          path.write_text(text.replace(old, new, 1), encoding="utf-8")
          PY
          git rm .github/workflows/roadmap-provider-wording-sync.yml
      - name: Commit exact roadmap wording
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/roadmap/product-roadmap.md
          git commit -m "fix(roadmap): preserve provider capability wording"
          git push origin HEAD:${{ github.head_ref }}
