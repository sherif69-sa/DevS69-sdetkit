name: Formatter policy proposal stale baseline correction

on:
  pull_request:
    types: [synchronize]

permissions:
  contents: write

jobs:
  correct:
    if: github.head_ref == 'feature/formatter-policy-proposal'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout proposal branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: feature/formatter-policy-proposal
          fetch-depth: 0

      - name: Correct stale expected count and clean diagnostic later
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          script = Path("scripts/formatter_policy_proposal_align.py")
          text = script.read_text(encoding="utf-8")
          old = '    text = text.replace("== 525", "== 526")\n'
          new = old + '    text = text.replace("\\\"actual\\\": 525", "\\\"actual\\\": 526")\n'
          if text.count(old) != 1:
              raise SystemExit(f"alignment marker count={text.count(old)}")
          script.write_text(text.replace(old, new), encoding="utf-8")

          workflow = Path(".github/workflows/formatter-policy-proposal-proof-v2.yml")
          text = workflow.read_text(encoding="utf-8")
          old = "            scripts/formatter_policy_proposal_align.py\n"
          new = old + "            formatter-policy-proposal-diagnostic.txt\n"
          if text.count(old) != 1:
              raise SystemExit(f"cleanup marker count={text.count(old)}")
          workflow.write_text(text.replace(old, new), encoding="utf-8")
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/formatter-policy-proposal-baseline-fix.yml
          git add scripts/formatter_policy_proposal_align.py .github/workflows/formatter-policy-proposal-proof-v2.yml
          git diff --cached --check
          git commit -m "fix(remediation): align proposal source count assertion"
          git push origin HEAD:feature/formatter-policy-proposal
