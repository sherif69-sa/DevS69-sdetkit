name: Decision Envelope Formatter

on:
  push:
    branches:
      - agent/decision-envelope-v2
    paths:
      - .github/workflows/decision-envelope-format.yml

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - name: Check out formatter branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: agent/decision-envelope-v2

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.12"

      - name: Install pinned Ruff
        run: python -m pip install -c constraints-ci.txt ruff==0.15.22

      - name: Format exact decision-envelope scope
        run: |
          python -m ruff format \
            src/sdetkit/decision_envelope.py \
            tests/test_decision_envelope.py
          python -m ruff format --check \
            src/sdetkit/decision_envelope.py \
            tests/test_decision_envelope.py \
            tests/test_decision_envelope_nested_authority.py

      - name: Remove one-shot formatter workflow
        run: rm .github/workflows/decision-envelope-format.yml

      - name: Commit exact formatter output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            src/sdetkit/decision_envelope.py \
            tests/test_decision_envelope.py \
            .github/workflows/decision-envelope-format.yml
          git diff --cached --quiet && exit 0
          git commit -m "style(product): apply pinned decision-envelope formatter"
          git push origin HEAD:agent/decision-envelope-v2
