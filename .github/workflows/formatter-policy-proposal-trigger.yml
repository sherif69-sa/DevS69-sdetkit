name: Formatter policy proposal one-use trigger

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  actions: write
  contents: write

jobs:
  dispatch:
    if: github.head_ref == 'feature/formatter-policy-proposal'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout proposal branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: feature/formatter-policy-proposal
          fetch-depth: 0

      - name: Remove trigger before dispatch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/formatter-policy-proposal-trigger.yml
          git commit -m "chore(remediation): remove one-use proposal trigger"
          git push origin HEAD:feature/formatter-policy-proposal

      - name: Dispatch proposal proof workflow
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          curl --fail-with-body \
            --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/formatter-policy-proposal-proof.yml/dispatches" \
            --data '{"ref":"feature/formatter-policy-proposal"}'
