name: Apply remediation research contract patch

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: ${{ github.head_ref == 'agent/remediation-research-contract' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Align product control and navigation
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              target = Path(path)
              text = target.read_text(encoding="utf-8")
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{path}: expected one replacement target, found {count}")
              target.write_text(text.replace(old, new), encoding="utf-8")

          replace_once(
              "docs/roadmap/product-roadmap.md",
              "- `docs/contracts/safety-gate-policy-matrix.v1.json`\n- `build/sdetkit/adoption-product-kpi-report.json`",
              "- `docs/contracts/safety-gate-policy-matrix.v1.json`\n- `docs/contracts/remediation-research.v1.json`\n- `build/sdetkit/adoption-product-kpi-report.json`",
          )
          replace_once(
              "docs/roadmap/product-roadmap.md",
              "| KPI portfolio projection | The maturity radar, KPI report, capability matrix, roadmap, and operator guidance are projected without duplicating source authority. |\n| Public 1.2.0 release |",
              "| KPI portfolio projection | The maturity radar, KPI report, capability matrix, roadmap, and operator guidance are projected without duplicating source authority. |\n| Remediation research contract | A versioned local-first contract validates formatter-only candidate evidence, exact scope, inventories, proof, rollback, reviewer state, scenarios, limitations, and false-authority counts without granting mutation authority. |\n| Public 1.2.0 release |",
          )
          replace_once(
              "docs/roadmap/product-roadmap.md",
              "| 1 | **Product control: `guarded_remediation_promotion`** | Define the versioned, review-first remediation-research contract for one reversible PR-owned mechanical family. | The contract covers no-op, oracle, unsafe-patch, out-of-scope, ambiguous, rollback, reviewer, proof, and false-authority evidence without changing SafetyGate policy. |\n| 2 | **Candidate benchmark: formatter-only** | Evaluate the first mechanical family without promotion. | Benchmark and verifier evidence prove zero out-of-scope writes, zero test weakening, deterministic rollback, retained artifacts, exact source digests, and explicit false-positive reporting. |",
              "| 1 | **Candidate benchmark: formatter-only** | Evaluate the first mechanical family through the versioned remediation-research contract without promotion. | Benchmark evidence proves zero out-of-scope writes, zero test weakening, deterministic rollback, retained artifacts, exact source digests, and explicit false-positive reporting. |\n| 2 | **Verifier and trajectory proof** | Connect the candidate evidence to ProtectedVerifier, ReplayableBenchmarkHarness, TrajectoryStore, and RepoMemory. | Claimed files equal actual writes, proof inputs are not mutated or shadowed, rollback restores exact bytes, and reviewed trajectories retain zero unsafe false-authority decisions. |\n| 3 | **Conditional narrow policy promotion** | Consider exactly one family only after independent proof and human review. | A separate authenticated contract preserves branch-only scope, rollback, audit, no merge authority, and all denied security, release, dependency, workflow-permission, and semantic-equivalence surfaces. |",
          )
          replace_once(
              "docs/roadmap/product-roadmap.md",
              "The portfolio projection consumes this verified artifact without becoming a new source of authority. Denominator expansion is complete, but two observations still do not support a broad maturity claim. Continue collecting reviewed evidence while the next implementation lane advances to `guarded_remediation_promotion`: a versioned, review-first remediation-research contract with no SafetyGate policy change or patch authority.",
              "The portfolio projection consumes this verified artifact without becoming a new source of authority. Denominator expansion is complete, but two observations still do not support a broad maturity claim. The versioned remediation-research contract is implemented and tested at `docs/contracts/remediation-research.v1.json`; it validates local evidence only and grants no SafetyGate policy change or patch authority. The active `guarded_remediation_promotion` lane now advances to the formatter-only candidate benchmark.",
          )

          replace_once(
              "docs/contracts/platform-capability-matrix.v1.json",
              '"suggested_owner_files": ["src/sdetkit/safety_gate.py", "src/sdetkit/protected_verifier.py", "tests"],',
              '"suggested_owner_files": ["src/sdetkit/remediation_research_contract.py", "src/sdetkit/replayable_benchmark_harness.py", "src/sdetkit/protected_verifier.py", "tests"],',
          )
          replace_once(
              "docs/contracts/platform-capability-matrix.v1.json",
              '''    {
                "authority": "reporting_only",
                "capability_id": "product_maturity_kpi_portfolio_projection",''',
              '''    {
                "authority": "reporting_only",
                "capability_id": "remediation_research_contract",
                "owner_files": [
                  "src/sdetkit/remediation_research_contract.py",
                  "docs/contracts/remediation-research.v1.json",
                  "docs/remediation-research-contract.md"
                ],
                "proof_tests": ["tests/test_remediation_research_contract.py"],
                "status": "implemented_and_tested",
                "title": "Versioned local-first remediation research evidence contract"
              },
              {
                "authority": "reporting_only",
                "capability_id": "product_maturity_kpi_portfolio_projection",''',
          )

          replace_once(
              "tests/test_platform_capability_matrix.py",
              '    "product_maturity_kpi_portfolio_projection",\n}',
              '    "product_maturity_kpi_portfolio_projection",\n    "remediation_research_contract",\n}',
          )
          replace_once(
              "tests/test_platform_capability_matrix.py",
              '    assert "product_maturity_kpi_portfolio_projection" in capability_ids\n    assert payload["external_or_manual_blockers"] == []',
              '    assert "product_maturity_kpi_portfolio_projection" in capability_ids\n    assert "remediation_research_contract" in capability_ids\n    assert payload["external_or_manual_blockers"] == []',
          )
          replace_once(
              "tests/test_platform_capability_matrix.py",
              '    assert "`guarded_remediation_promotion`" in roadmap\n    assert "expand reviewed KPI denominators" not in roadmap',
              '    assert "`guarded_remediation_promotion`" in roadmap\n    assert "docs/contracts/remediation-research.v1.json" in roadmap\n    assert "The versioned remediation-research contract is implemented and tested." in roadmap\n    assert "Candidate benchmark: formatter-only" in roadmap\n    assert "expand reviewed KPI denominators" not in roadmap',
          )

          replace_once(
              "docs/docs-map.md",
              "| Product direction | [Product roadmap](roadmap/product-roadmap.md), [Current product delta](current-product-delta.md), [Platform capability matrix](contracts/platform-capability-matrix.v1.json), [Reviewed KPI evidence contract](contracts/adoption-product-kpi-evidence.v1.json) | Use the roadmap for execution order, the delta for released-versus-main truth, the matrix for implemented capabilities and gaps, and the KPI contract for reviewed product measurements. Keep all four secondary to the operator path. |",
              "| Product direction | [Product roadmap](roadmap/product-roadmap.md), [Current product delta](current-product-delta.md), [Platform capability matrix](contracts/platform-capability-matrix.v1.json), [Reviewed KPI evidence contract](contracts/adoption-product-kpi-evidence.v1.json), [Remediation research contract](contracts/remediation-research.v1.json), [Remediation research guide](remediation-research-contract.md) | Use the roadmap for execution order, the delta for released-versus-main truth, the matrix for implemented capabilities and gaps, the KPI contract for reviewed product measurements, and the remediation contract for review-first candidate evidence. Keep these secondary to the operator path. |",
          )
          replace_once(
              "docs/docs-map.md",
              "| Maintenance / autopilot | [Artifact reference](artifact-reference.md#maintenance-autopilot-upload-set), [Operations handbook](operations-handbook.md), [Automation bots](automation-bots.md) | Treat plans, candidates, and safe-fix outputs as evidence until reviewed policy approves the next step. |",
              "| Maintenance / autopilot | [Artifact reference](artifact-reference.md#maintenance-autopilot-upload-set), [Operations handbook](operations-handbook.md), [Automation bots](automation-bots.md), [Remediation research guide](remediation-research-contract.md) | Treat plans, candidates, safe-fix outputs, and remediation-research reports as evidence until reviewed policy approves the next step. |",
          )
          replace_once(
              "docs/docs-map.md",
              "| Roadmap control panels | [Product roadmap](roadmap/product-roadmap.md), [Current product delta](current-product-delta.md), [Platform capability matrix](contracts/platform-capability-matrix.v1.json), [Reviewed KPI evidence contract](contracts/adoption-product-kpi-evidence.v1.json), [Curated advanced docs material map](orphan-docs-material-map.md), [Artifact reference](artifact-reference.md) | Use maintained product-control contracts to choose focused slices; do not let generated trackers or unreviewed metrics replace product direction. |",
              "| Roadmap control panels | [Product roadmap](roadmap/product-roadmap.md), [Current product delta](current-product-delta.md), [Platform capability matrix](contracts/platform-capability-matrix.v1.json), [Reviewed KPI evidence contract](contracts/adoption-product-kpi-evidence.v1.json), [Remediation research contract](contracts/remediation-research.v1.json), [Remediation research guide](remediation-research-contract.md), [Curated advanced docs material map](orphan-docs-material-map.md), [Artifact reference](artifact-reference.md) | Use maintained product-control contracts to choose focused slices; do not let generated trackers, candidate reports, or unreviewed metrics replace product direction. |",
          )

          replace_once(
              "mkdocs.yml",
              "      - Adaptive remediation policy: adaptive-remediation-policy.md\n      - Adaptive next-wave dashboard: adaptive-dashboard.md",
              "      - Adaptive remediation policy: adaptive-remediation-policy.md\n      - Remediation research contract: remediation-research-contract.md\n      - Adaptive next-wave dashboard: adaptive-dashboard.md",
          )
          PY

      - name: Install project and proof tooling
        run: |
          python -m pip install -c constraints-ci.txt --upgrade pip
          python -m pip install -c constraints-ci.txt -e .[dev,test,docs]

      - name: Format and lint changed Python files
        run: |
          python -m ruff format src/sdetkit/remediation_research_contract.py tests/test_remediation_research_contract.py tests/test_platform_capability_matrix.py
          python -m ruff check src/sdetkit/remediation_research_contract.py tests/test_remediation_research_contract.py tests/test_platform_capability_matrix.py

      - name: Run focused contract proof
        env:
          PYTHONPATH: src
        run: |
          python -m pytest -q tests/test_remediation_research_contract.py tests/test_platform_capability_matrix.py tests/test_product_maturity_radar_portfolio.py -o addopts=

      - name: Build strict docs
        run: NO_MKDOCS_2_WARNING=1 python -m mkdocs build --strict

      - name: Commit clean review head
        shell: bash
        run: |
          git rm .github/workflows/remediation-research-contract-bootstrap.yml
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/sdetkit/remediation_research_contract.py tests/test_remediation_research_contract.py tests/test_platform_capability_matrix.py docs/contracts/remediation-research.v1.json docs/contracts/platform-capability-matrix.v1.json docs/remediation-research-contract.md docs/roadmap/product-roadmap.md docs/docs-map.md mkdocs.yml
          git commit -m "feat(safety): add remediation research contract"
          git push origin HEAD:"${GITHUB_HEAD_REF}"
