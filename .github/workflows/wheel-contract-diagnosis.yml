name: Wheel interpreter proof

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  fix-and-prove:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: agent/evidence-truth-dogfood
          fetch-depth: 0

      - id: py311
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.11"

      - id: py312
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.12"

      - name: Preserve the virtual-environment interpreter path
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("tests/contract/check_installed_wheel.py")
          text = path.read_text(encoding="utf-8")
          old = "    cli_python = Path(ns.python).resolve()\n"
          new = "    cli_python = Path(os.path.abspath(ns.python))\n"
          if text.count(old) != 1:
              raise SystemExit("installed-wheel interpreter marker mismatch")
          path.write_text(text.replace(old, new, 1), encoding="utf-8")
          PY

      - name: Build exact wheel
        env:
          PY312: ${{ steps.py312.outputs.python-path }}
        run: |
          "$PY312" -m pip install -q -c constraints-ci.txt -e .[dev,packaging]
          "$PY312" -m ruff format --check tests/contract/check_installed_wheel.py
          "$PY312" -m ruff check tests/contract/check_installed_wheel.py
          rm -rf dist build/wheel-interpreter-proof
          "$PY312" -m build > build-wheel.log 2>&1

      - name: Prove official wheel contract on Python 3.11 and 3.12
        shell: bash
        env:
          PY311: ${{ steps.py311.outputs.python-path }}
          PY312: ${{ steps.py312.outputs.python-path }}
        run: |
          set -euo pipefail
          WHEEL_PATH="$(find dist -type f -name '*.whl' | head -n 1)"
          for version in 311 312; do
            variable="PY${version}"
            interpreter="${!variable}"
            venv=".venv-wheel-${version}"
            "$interpreter" -m venv "$venv"
            "$venv/bin/python" -m pip install -q -c constraints-ci.txt "$WHEEL_PATH"
            "$venv/bin/python" tests/contract/check_installed_wheel.py \
              --python "$venv/bin/python" \
              --repo-root .
          done

      - name: Commit proven interpreter fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/wheel-contract-diagnosis.yml
          git add tests/contract/check_installed_wheel.py
          git commit -m "fix(evidence): preserve isolated wheel interpreter"
          git push origin HEAD:agent/evidence-truth-dogfood
