name: Formatter verifier diagnosis

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: feature/formatter-verifier-trajectory-proof

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.12"

      - name: Apply exact post-ratchet source state
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text(encoding="utf-8")
              if new in text:
                  return
              if text.count(old) != 1:
                  raise SystemExit(f"{path}: marker mismatch")
              file.write_text(text.replace(old, new, 1), encoding="utf-8")

          replace_once(
              "src/sdetkit/formatter_candidate_verifier.py",
              '''    replayable_benchmark_harness,
              repo_memory,
              trajectory_store,
          )
          ''',
              '''    remediation_research_contract,
              replayable_benchmark_harness,
              repo_memory,
              trajectory_store,
          )
          ''',
          )
          replace_once(
              "src/sdetkit/formatter_candidate_verifier.py",
              "        **formatter_candidate_benchmark.remediation_research_contract.authority_boundary(),\n",
              "        **remediation_research_contract.authority_boundary(),\n",
          )
          replace_once(
              "pyproject.toml",
              '''[[tool.mypy.overrides]]
          module = "sdetkit.formatter_candidate_benchmark"
          ignore_errors = false
          ''',
              '''[[tool.mypy.overrides]]
          module = [
            "sdetkit.formatter_candidate_benchmark",
            "sdetkit.formatter_candidate_verifier",
          ]
          ignore_errors = false
          ''',
          )
          replace_once(
              "tests/test_quality_truth_baseline.py",
              '    assert payload["observed"]["source_module_count"] == 524\n',
              '    assert payload["observed"]["source_module_count"] == 525\n',
          )
          replace_once(
              "tests/test_quality_truth_baseline.py",
              '    assert len(checked) == 36\n',
              '    assert len(checked) == 37\n',
          )
          replace_once(
              "tests/test_quality_truth_baseline.py",
              '    assert "sdetkit.formatter_candidate_benchmark" in checked\n',
              '    assert "sdetkit.formatter_candidate_benchmark" in checked\n    assert "sdetkit.formatter_candidate_verifier" in checked\n',
          )
          replace_once(
              "tests/test_quality_truth_baseline.py",
              '    assert "sdetkit.formatter_candidate_benchmark" not in inventory["modules"]\n',
              '    assert "sdetkit.formatter_candidate_benchmark" not in inventory["modules"]\n    assert "sdetkit.formatter_candidate_verifier" not in inventory["modules"]\n',
          )
          replace_once(
              "tests/test_quality_truth_baseline.py",
              '            "actual": 524,\n',
              '            "actual": 525,\n',
          )
          PY

      - name: Install focused proof dependencies
        run: |
          python -m pip install -q --upgrade pip
          python -m pip install -q -c constraints-ci.txt -e .[dev,test]

      - name: Capture style and type diagnostics
        id: proof
        shell: bash
        run: |
          set +e
          {
            python -m ruff check --fix \
              src/sdetkit/formatter_candidate_verifier.py \
              tests/test_formatter_candidate_verifier.py \
              tests/test_quality_truth_baseline.py
            python -m ruff format \
              src/sdetkit/formatter_candidate_verifier.py \
              tests/test_formatter_candidate_verifier.py \
              tests/test_quality_truth_baseline.py
            python -m ruff check \
              src/sdetkit/formatter_candidate_verifier.py \
              tests/test_formatter_candidate_verifier.py \
              tests/test_quality_truth_baseline.py
            python -m mypy src/sdetkit/formatter_candidate_verifier.py
          } > formatter-verifier-diagnostics.log 2>&1
          rc=$?
          set -e
          printf '%s\n' "$rc" > formatter-verifier-diagnostics.rc
          echo "rc=$rc" >> "$GITHUB_OUTPUT"

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: formatter-verifier-diagnostics
          path: |
            formatter-verifier-diagnostics.log
            formatter-verifier-diagnostics.rc
          if-no-files-found: error
          retention-days: 7

      - name: Preserve result
        if: always()
        run: exit "${{ steps.proof.outputs.rc || '1' }}"
