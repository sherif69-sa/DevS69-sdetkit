name: Pre-commit Autoupdate

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * 1"

permissions:
  contents: write
  pull-requests: write

jobs:
  autoupdate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install pre-commit
        run: |
          python -m pip install -c constraints-ci.txt pre-commit

      - name: Update hooks
        run: pre-commit autoupdate

      - name: Create pull request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1  # v8.1.1
        with:
          commit-message: "chore(pre-commit): autoupdate hooks"
          title: "chore(pre-commit): autoupdate hooks"
          body: |
            Automated pre-commit hook update to keep local/CI lint and security tooling current.
          branch: "bot/pre-commit-autoupdate"
          labels: |
            dependencies
            automation
