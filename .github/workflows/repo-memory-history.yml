name: RepoMemory Profile History

on:
  push:
    branches: [main]

permissions:
  contents: read
  actions: read
  pull-requests: read
  security-events: read

concurrency:
  group: repo-memory-profile-history-main
  cancel-in-progress: false

jobs:
  record:
    name: Record trusted main RepoMemory history
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout trusted main revision
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml
            requirements-test.txt

      - name: Install trusted-main evidence dependencies
        run: |
          python -m pip install -c constraints-ci.txt -r requirements-test.txt -e .

      - name: Build trusted-main live RepoMemory profile
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p \
            build/repo-memory-history/fixture-report \
            build/repo-memory-history/live-report \
            build/repo-memory-history/pattern-insights \
            build/repo-memory-history/flaky-test-registry \
            build/repo-memory-history/candidate-validation \
            build/repo-memory-history/profile

          live_root="${RUNNER_TEMP}/sdetkit-repo-memory-history-live-repositories"
          rm -rf "$live_root"

          PYTHONPATH=src python -m sdetkit.pr_quality_live_benchmark_workspace \
            --out-dir "$live_root" \
            --format json \
            > build/repo-memory-history/live-workspace-cli.json

          PYTHONPATH=src python -m sdetkit.replayable_benchmark_harness \
            --scenario tests/fixtures/remediation_benchmark/nop_formatting_patch.json \
            --scenario tests/fixtures/remediation_benchmark/oracle_formatting_patch.json \
            --scenario tests/fixtures/remediation_benchmark/unsafe_protected_path_patch.json \
            --out-dir build/repo-memory-history/fixture-report \
            --format json \
            > build/repo-memory-history/fixture-report-cli.json

          mapfile -t live_args < <(
            LIVE_ROOT="$live_root" python - <<'PY'
          import json
          import os
          from pathlib import Path

          manifest = json.loads(
              (Path(os.environ["LIVE_ROOT"]) / "workspace-manifest.json").read_text(
                  encoding="utf-8"
              )
          )
          for item in manifest["scenarios"]:
              print("--isolated-scenario")
              print(item["fixture_path"])
              print("--isolated-repo-root")
              print(item["repo_root"])
          PY
          )

          PYTHONPATH=src python -m sdetkit.replayable_benchmark_harness \
            "${live_args[@]}" \
            --out-dir build/repo-memory-history/live-report \
            --format json \
            > build/repo-memory-history/live-report-cli.json

          python - <<'PY'
          import json
          from pathlib import Path

          payload = {
              "schema_version": "sdetkit.trajectory_pattern_insights.v1",
              "record_count": 0,
              "recurring_safe_fix_patterns": [],
              "recurring_review_first_surfaces": [],
              "source": "trusted_main_snapshot",
          }
          Path("build/repo-memory-history/pattern-insights/pattern-insights.json").write_text(
              json.dumps(payload, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY

          PYTHONPATH=src python -m sdetkit.pr_quality_candidate_validation \
            --scenario tests/fixtures/pr_quality_candidate_visibility/formatting_candidate_verified.json \
            --scenario tests/fixtures/pr_quality_candidate_visibility/broader_diff_review_first.json \
            --out-dir build/repo-memory-history/candidate-validation \
            --format json \
            > build/repo-memory-history/candidate-validation-cli.json

          PYTHONPATH=src python -m sdetkit.trusted_flaky_test_registry_producer \
            --source-run-id "${GITHUB_RUN_ID}" \
            --source-head-sha "${GITHUB_SHA}" \
            --out-dir build/repo-memory-history/flaky-test-registry \
            --format json \
            > build/repo-memory-history/flaky-test-registry-cli.json

          PYTHONPATH=src python -m sdetkit.repo_memory \
            --pattern-insights build/repo-memory-history/pattern-insights/pattern-insights.json \
            --benchmark-report build/repo-memory-history/fixture-report/benchmark-report.json \
            --live-benchmark-report build/repo-memory-history/live-report/benchmark-report.json \
            --flaky-test-registry-evidence build/repo-memory-history/flaky-test-registry/flaky-test-registry-evidence.json \
            --controlled-candidate-validation-evidence build/repo-memory-history/candidate-validation/candidate-validation.json \
            --out-dir build/repo-memory-history/profile \
            --format json \
            > build/repo-memory-history/profile-cli.json

          python - <<'PY'
          import json
          from pathlib import Path

          profile = json.loads(
              Path("build/repo-memory-history/profile/repo-memory-profile.json").read_text(
                  encoding="utf-8"
              )
          )

          assert profile["profile_status"] == "live_proof_supported_memory"
          assert profile["inputs"]["live_contract_proven"] is True
          assert profile["proof_provenance"]["git_verified_scenario_count"] == 5
          assert profile["proof_provenance"]["expected_failed_scenario_count"] == 5
          assert profile["proof_provenance"]["network_boundary_blocked_scenario_count"] == 1
          assert profile["proof_provenance"]["anti_cheat_rejection_scenario_count"] == 2

          controlled = profile["controlled_candidate_validation"]
          assert controlled["collection_status"] == "collected"
          assert controlled["status"] == "controlled_validation_passed"
          assert controlled["scenario_count"] == 2
          assert controlled["passed_count"] == 2
          assert controlled["current_pr_decision_input"] is False
          assert controlled["decision_boundary"]["automation_allowed"] is False
          assert controlled["decision_boundary"]["merge_authorized"] is False

          flaky = profile["flaky_test_registry"]
          assert flaky["collection_status"] == "collected"
          assert flaky["entry_count"] == 0
          assert flaky["source"]["kind"] == "trusted_main_artifact"
          assert flaky["source"]["workflow"] == "RepoMemory Profile History"
          assert flaky["source"]["observation_status"] == "no_test_observations_available"
          assert flaky["source"]["observations_collected"] is False
          assert flaky["decision_boundary"]["automation_allowed"] is False
          assert flaky["decision_boundary"]["merge_authorized"] is False

          boundary = profile["decision_boundary"]
          assert boundary["automation_allowed"] is False
          assert boundary["merge_authorized"] is False
          assert boundary["semantic_equivalence_proven"] is False

          print("Trusted-main RepoMemory live profile passed.")
          PY

      - name: Select prior trusted main history artifact
        id: prior
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          mkdir -p build/repo-memory-history/prior-download

          prior_run_id=""
          prior_head_sha=""

          while IFS=$'\t' read -r candidate_run_id candidate_head_sha; do
            if [ -z "$candidate_run_id" ] || [ "$candidate_run_id" = "${GITHUB_RUN_ID}" ]; then
              continue
            fi

            if git merge-base --is-ancestor "$candidate_head_sha" "$GITHUB_SHA"; then
              prior_run_id="$candidate_run_id"
              prior_head_sha="$candidate_head_sha"
              break
            fi
          done < <(
            gh api --paginate \
              "repos/${GITHUB_REPOSITORY}/actions/workflows/repo-memory-history.yml/runs?branch=main&event=push&status=completed&per_page=100" \
              --jq '.workflow_runs[] | select(.conclusion == "success") | [.id, .head_sha] | @tsv'
          )

          if [ -z "$prior_run_id" ]; then
            echo "prior_history_jsonl=" >> "$GITHUB_OUTPUT"
            echo "prior_diagnostic_signal_snapshot_jsonl=" >> "$GITHUB_OUTPUT"
            echo "prior_run_id=" >> "$GITHUB_OUTPUT"
            echo "prior_head_sha=" >> "$GITHUB_OUTPUT"
            echo "No prior successful trusted-main history artifact found; starting initial history chain."
            exit 0
          fi

          gh run download "$prior_run_id" \
            --repo "$GITHUB_REPOSITORY" \
            --name repo-memory-profile-history \
            --dir build/repo-memory-history/prior-download

          prior_history_jsonl="$(
            find build/repo-memory-history/prior-download \
              -name repo-memory-profile-history.jsonl \
              -print \
              -quit
          )"

          if [ -z "$prior_history_jsonl" ] || [ ! -f "$prior_history_jsonl" ]; then
            echo "Prior trusted-main run was selected but supplied no history JSONL artifact."
            exit 1
          fi

          prior_security_disposition_jsonl="$(
            find build/repo-memory-history/prior-download               -name security-reviewed-disposition-history.jsonl               -print               -quit
          )"

          prior_diagnostic_signal_snapshot_jsonl="$(
            find build/repo-memory-history/prior-download \
              -name diagnostic-signal-snapshot-history.jsonl \
              -print \
              -quit
          )"

          if [ -z "$prior_diagnostic_signal_snapshot_jsonl" ]; then
            diagnostic_prior_root="${RUNNER_TEMP}/sdetkit-prior-diagnostic-snapshot-history"
            rm -rf "$diagnostic_prior_root"
            mkdir -p "$diagnostic_prior_root"

            while IFS=$'\t' read -r candidate_run_id candidate_head_sha; do
              if [ -z "$candidate_run_id" ] \
                || [ "$candidate_run_id" = "${GITHUB_RUN_ID}" ] \
                || [ "$candidate_run_id" = "$prior_run_id" ]; then
                continue
              fi
              if ! git merge-base --is-ancestor "$candidate_head_sha" "$GITHUB_SHA"; then
                continue
              fi

              candidate_dir="$diagnostic_prior_root/$candidate_run_id"
              mkdir -p "$candidate_dir"
              if ! gh run download "$candidate_run_id" \
                --repo "$GITHUB_REPOSITORY" \
                --name repo-memory-profile-history \
                --dir "$candidate_dir" >/dev/null 2>&1; then
                continue
              fi

              candidate_jsonl="$(
                find "$candidate_dir" \
                  -name diagnostic-signal-snapshot-history.jsonl \
                  -print \
                  -quit
              )"
              if [ -n "$candidate_jsonl" ] && [ -f "$candidate_jsonl" ]; then
                prior_diagnostic_signal_snapshot_jsonl="$candidate_jsonl"
                break
              fi
            done < <(
              gh api --paginate \
                "repos/${GITHUB_REPOSITORY}/actions/workflows/repo-memory-history.yml/runs?branch=main&event=push&status=completed&per_page=100" \
                --jq '.workflow_runs[] | select(.conclusion == "success") | [.id, .head_sha] | @tsv'
            )
          fi

          echo "prior_history_jsonl=$prior_history_jsonl" >> "$GITHUB_OUTPUT"
          echo "prior_security_disposition_jsonl=$prior_security_disposition_jsonl" >> "$GITHUB_OUTPUT"
          echo "prior_diagnostic_signal_snapshot_jsonl=$prior_diagnostic_signal_snapshot_jsonl" >> "$GITHUB_OUTPUT"
          echo "prior_run_id=$prior_run_id" >> "$GITHUB_OUTPUT"
          echo "prior_head_sha=$prior_head_sha" >> "$GITHUB_OUTPUT"

          echo "Selected prior trusted-main history run: $prior_run_id"
          echo "Selected prior trusted-main history head: $prior_head_sha"

      - name: Record trusted main RepoMemory profile history
        shell: bash
        env:
          PRIOR_HISTORY_JSONL: ${{ steps.prior.outputs.prior_history_jsonl }}
        run: |
          set -euo pipefail

          args=(
            --profile-json build/repo-memory-history/profile/repo-memory-profile.json
            --source-run-id "${GITHUB_RUN_ID}"
            --source-head-sha "${GITHUB_SHA}"
            --out-dir build/repo-memory-history/output
            --format json
          )

          if [ -n "$PRIOR_HISTORY_JSONL" ]; then
            args+=(--prior-history-jsonl "$PRIOR_HISTORY_JSONL")
          fi

          PYTHONPATH=src python -m sdetkit.repo_memory_profile_history \
            "${args[@]}" \
            > build/repo-memory-history/history-cli.json

          python - <<'PY'
          import json
          import os
          from pathlib import Path

          summary = json.loads(
              Path(
                  "build/repo-memory-history/output/repo-memory-history-summary.json"
              ).read_text(encoding="utf-8")
          )

          assert summary["status"] == "history_recorded"
          assert summary["record_count"] >= 1
          assert summary["live_contract_proven_record_count"] >= 1
          assert summary["latest_record"]["source_run_id"] == os.environ["GITHUB_RUN_ID"]
          assert summary["latest_record"]["source_head_sha"] == os.environ["GITHUB_SHA"]
          assert summary["latest_record"]["profile_status"] == "live_proof_supported_memory"
          assert summary["latest_record"]["live_contract_proven"] is True
          assert summary["controlled_validation_record_count"] >= 1
          assert summary["controlled_validation_scenario_count"] >= 2
          assert summary["controlled_structurally_verified_count"] >= 1
          assert summary["controlled_review_first_count"] >= 1
          assert summary["latest_record"]["controlled_validation_status"] == "controlled_validation_passed"
          assert summary["latest_record"]["controlled_current_pr_decision_input"] is False

          boundary = summary["decision_boundary"]
          assert boundary["automation_allowed"] is False
          assert boundary["merge_authorized"] is False
          assert boundary["semantic_equivalence_proven"] is False
          assert boundary["prior_history_is_read_only_input"] is True
          assert boundary["controlled_validation_is_advisory_only"] is True

          print("Trusted-main RepoMemory history snapshot passed.")
          PY

      - name: Collect accepted-main reviewed security disposition inputs
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          out_dir="build/repo-memory-history/security-reviewed-dispositions"
          mkdir -p "$out_dir"

          gh api \
            -H "Accept: application/vnd.github+json" \
            "repos/$REPOSITORY/commits/${GITHUB_SHA}/pulls?per_page=10" \
            > "$out_dir/associated-merged-pr.json"

          pr_number="$(
            HEAD_SHA="$GITHUB_SHA" python - <<'PY'
          import json
          import os
          from pathlib import Path

          candidates = json.loads(
              Path("build/repo-memory-history/security-reviewed-dispositions/associated-merged-pr.json")
              .read_text(encoding="utf-8")
          )
          matches = [
              item
              for item in candidates
              if item.get("merged_at") and item.get("merge_commit_sha") == os.environ["HEAD_SHA"]
          ]
          if len(matches) > 1:
              raise SystemExit("accepted-main commit maps to multiple merged PRs")
          if matches:
              print(matches[0]["number"])
          PY
          )"

          collection_status="collected"
          collection_reason=""
          printf '[]\n' > "$out_dir/changed-files.json"
          printf '[]\n' > "$out_dir/dismissed-alerts-raw.json"

          if [ -n "$pr_number" ]; then
            gh api --paginate \
              -H "Accept: application/vnd.github+json" \
              "repos/$REPOSITORY/pulls/$pr_number/files?per_page=100" \
              --jq '.[]' \
              | jq -s '.' > "$out_dir/changed-files.json"

            if ! gh api --paginate \
              -H "Accept: application/vnd.github+json" \
              "repos/$REPOSITORY/code-scanning/alerts?state=dismissed&pr=$pr_number&per_page=100" \
              --jq '.[]' \
              | jq -s '.' > "$out_dir/dismissed-alerts-raw.json"; then
              collection_status="unavailable"
              collection_reason="GitHub code-scanning dismissed-alert evidence was unavailable or not permitted."
              printf '[]\n' > "$out_dir/dismissed-alerts-raw.json"
            fi
          fi

          COLLECTION_STATUS="$collection_status" COLLECTION_REASON="$collection_reason" python - <<'PY'
          import json
          import os
          from pathlib import Path

          source = Path(
              "build/repo-memory-history/security-reviewed-dispositions/dismissed-alerts-raw.json"
          )
          alerts = json.loads(source.read_text(encoding="utf-8"))
          if not isinstance(alerts, list):
              raise SystemExit("dismissed-alert API response must be a list")
          payload = {
              "collection_status": os.environ["COLLECTION_STATUS"],
              "collection_reason": os.environ["COLLECTION_REASON"],
              "alerts": alerts,
          }
          Path(
              "build/repo-memory-history/security-reviewed-dispositions/dismissed-alerts.json"
          ).write_text(json.dumps(payload, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          PY

      - name: Collect accepted-main diagnostic signal snapshot source
        id: diagnostic-snapshot-source
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          out_dir="build/repo-memory-history/diagnostic-signal-snapshots/source"
          associated_pr="build/repo-memory-history/security-reviewed-dispositions/associated-merged-pr.json"
          mkdir -p "$out_dir/download"

          source_match_count="$(
            jq -er --arg sha "${GITHUB_SHA}" \
              '[.[] | select(.merged_at and .merge_commit_sha == $sha)] | length' \
              "$associated_pr"
          )"
          if [ "$source_match_count" -gt 1 ]; then
            echo "Accepted-main commit maps to multiple merged PRs; refusing ambiguous snapshot provenance."
            exit 1
          fi
          if [ "$source_match_count" -eq 0 ]; then
            echo "source_available=false" >> "$GITHUB_OUTPUT"
            echo "No merged PR maps to accepted-main head; no diagnostic snapshot observation will be appended."
            exit 0
          fi

          source_pr_number="$(
            jq -er --arg sha "${GITHUB_SHA}" \
              '[.[] | select(.merged_at and .merge_commit_sha == $sha)][0].number' \
              "$associated_pr"
          )"
          source_head_sha="$(
            jq -er --arg sha "${GITHUB_SHA}" \
              '[.[] | select(.merged_at and .merge_commit_sha == $sha)][0].head.sha' \
              "$associated_pr"
          )"

          gh api --paginate \
            "repos/${REPOSITORY}/actions/workflows/pr-quality-comment.yml/runs?event=pull_request&status=completed&per_page=100" \
            --jq '.workflow_runs[] | select(.conclusion == "success") | [.id, .head_sha, (.pull_requests | map(.number | tostring) | join(","))] | @tsv' \
            > "$out_dir/successful-pr-quality-runs.tsv"

          source_run_id=""
          while IFS=$'\t' read -r candidate_run_id candidate_head_sha candidate_pr_numbers; do
            if [ "$candidate_head_sha" != "$source_head_sha" ]; then
              continue
            fi
            case ",${candidate_pr_numbers}," in
              *,"${source_pr_number}",*)
                source_run_id="$candidate_run_id"
                break
                ;;
            esac
          done < "$out_dir/successful-pr-quality-runs.tsv"

          if [ -z "$source_run_id" ]; then
            echo "No successful PR Quality run was found for merged PR #$source_pr_number at $source_head_sha."
            exit 1
          fi

          gh run download "$source_run_id" \
            --repo "$REPOSITORY" \
            --name pr-quality-comment \
            --dir "$out_dir/download"

          source_snapshot="$(
            find "$out_dir/download" \
              -name diagnostic-signal-snapshot.json \
              -print \
              -quit
          )"
          if [ -z "$source_snapshot" ] || [ ! -f "$source_snapshot" ]; then
            echo "Successful PR Quality run supplied no DiagnosticSignalSnapshot artifact."
            exit 1
          fi

          cp "$source_snapshot" "$out_dir/diagnostic-signal-snapshot.json"
          echo "source_available=true" >> "$GITHUB_OUTPUT"
          echo "source_run_id=$source_run_id" >> "$GITHUB_OUTPUT"
          echo "source_head_sha=$source_head_sha" >> "$GITHUB_OUTPUT"
          echo "source_pr_number=$source_pr_number" >> "$GITHUB_OUTPUT"

      - name: Record trusted accepted-main diagnostic signal snapshot history
        if: steps.diagnostic-snapshot-source.outputs.source_available == 'true'
        shell: bash
        env:
          PRIOR_DIAGNOSTIC_SIGNAL_SNAPSHOT_JSONL: ${{ steps.prior.outputs.prior_diagnostic_signal_snapshot_jsonl }}
          SOURCE_RUN_ID: ${{ steps.diagnostic-snapshot-source.outputs.source_run_id }}
          SOURCE_HEAD_SHA: ${{ steps.diagnostic-snapshot-source.outputs.source_head_sha }}
        run: |
          set -euo pipefail

          mkdir -p build/repo-memory-history/diagnostic-signal-snapshots/output
          args=(
            --diagnostic-signal-snapshot build/repo-memory-history/diagnostic-signal-snapshots/source/diagnostic-signal-snapshot.json
            --associated-pr-json build/repo-memory-history/security-reviewed-dispositions/associated-merged-pr.json
            --source-run-id "$SOURCE_RUN_ID"
            --source-run-conclusion success
            --source-head-sha "$SOURCE_HEAD_SHA"
            --retention-run-id "${GITHUB_RUN_ID}"
            --accepted-main-sha "${GITHUB_SHA}"
            --out-dir build/repo-memory-history/diagnostic-signal-snapshots/output
            --format json
          )
          if [ -n "$PRIOR_DIAGNOSTIC_SIGNAL_SNAPSHOT_JSONL" ]; then
            args+=(--prior-history-jsonl "$PRIOR_DIAGNOSTIC_SIGNAL_SNAPSHOT_JSONL")
          fi

          PYTHONPATH=src python -m sdetkit.diagnostic_signal_snapshot_history \
            "${args[@]}" \
            > build/repo-memory-history/diagnostic-signal-snapshots/history-cli.json

          python - <<'PYCODE'
          import json
          import os
          from pathlib import Path

          summary = json.loads(
              Path(
                  "build/repo-memory-history/diagnostic-signal-snapshots/output/"
                  "diagnostic-signal-snapshot-history-summary.json"
              ).read_text(encoding="utf-8")
          )
          assert summary["status"] == "diagnostic_signal_snapshot_history_recorded"
          assert summary["record_count"] >= 1
          assert summary["advisor_false_positive_rate_status"] == "requires_reviewed_history"
          assert summary["reviewed_false_positive_count"] is None
          assert summary["reviewed_observation_count"] is None
          assert summary["latest_record"]["accepted_main_sha"] == os.environ["GITHUB_SHA"]
          boundary = summary["decision_boundary"]
          assert boundary["current_pr_decision_input"] is False
          assert boundary["feeds_repo_memory"] is False
          assert boundary["patch_application_allowed"] is False
          assert boundary["automation_allowed"] is False
          assert boundary["merge_authorized"] is False
          assert boundary["semantic_equivalence_proven"] is False
          assert boundary["historical_snapshot_authorizes_current_action"] is False
          print("Trusted accepted-main diagnostic signal snapshot history passed.")
          PYCODE

      - name: Record trusted accepted-main reviewed security disposition history
        shell: bash
        env:
          PRIOR_SECURITY_DISPOSITION_JSONL: ${{ steps.prior.outputs.prior_security_disposition_jsonl }}
        run: |
          set -euo pipefail

          args=(
            --associated-pr-json build/repo-memory-history/security-reviewed-dispositions/associated-merged-pr.json
            --changed-files-json build/repo-memory-history/security-reviewed-dispositions/changed-files.json
            --dismissed-alerts-json build/repo-memory-history/security-reviewed-dispositions/dismissed-alerts.json
            --source-run-id "${GITHUB_RUN_ID}"
            --source-head-sha "${GITHUB_SHA}"
            --out-dir build/repo-memory-history/security-reviewed-dispositions/output
            --format json
          )

          if [ -n "$PRIOR_SECURITY_DISPOSITION_JSONL" ]; then
            args+=(--prior-history-jsonl "$PRIOR_SECURITY_DISPOSITION_JSONL")
          fi

          PYTHONPATH=src python -m sdetkit.security_reviewed_disposition_history \
            "${args[@]}" \
            > build/repo-memory-history/security-reviewed-dispositions/history-cli.json

          python - <<'PY'
          import json
          from pathlib import Path

          summary = json.loads(
              Path(
                  "build/repo-memory-history/security-reviewed-dispositions/output/"
                  "security-reviewed-disposition-history-summary.json"
              ).read_text(encoding="utf-8")
          )
          assert summary["status"] == "reviewed_disposition_history_recorded"
          assert summary["record_count"] >= 1
          assert summary["latest_record"]["pr_scope_verification"] == "changed_paths_proven"
          assert summary["latest_record"]["alerts_excluded_outside_changed_paths"] >= 0
          boundary = summary["decision_boundary"]
          assert boundary["historical_disposition_authorizes_current_action"] is False
          assert boundary["automatic_security_fix_allowed"] is False
          assert boundary["automatic_dismissal_allowed"] is False
          assert boundary["automation_allowed"] is False
          assert boundary["merge_authorized"] is False
          assert boundary["prior_history_is_read_only_input"] is True
          print("Trusted accepted-main security disposition history passed.")
          PY

      - name: Upload trusted main RepoMemory history artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: repo-memory-profile-history
          path: |
            build/repo-memory-history/output/
            build/repo-memory-history/profile/
            build/repo-memory-history/live-report/
            build/repo-memory-history/fixture-report/
