# Local equivalent command:
#   python -m sdetkit workflow-governance-report --root . --format text
#   See docs/ci/workflow-local-equivalents.md#repo-memory-history for workflow-specific operator notes.
name: RepoMemory Profile History

on:
  push:
    branches: [main]

permissions:
  contents: read
  actions: read
  pull-requests: read
  security-events: read

concurrency:
  group: repo-memory-profile-history-main
  cancel-in-progress: false

jobs:
  record:
    name: Record trusted main RepoMemory history
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout trusted main revision
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml
            requirements-test.txt

      - name: Install trusted-main evidence dependencies
        run: |
          python -m pip install -c constraints-ci.txt -r requirements-test.txt -e .

      - name: Select trusted-main test observation artifact
        id: test-observations
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          source_root="build/repo-memory-history/test-observation-source"
          rm -rf "$source_root"
          mkdir -p "$source_root/download"

          selected_run_id=""
          selected_head_sha=""
          selected_artifact_id=""
          selected_artifact_expires_at=""

          for attempt in $(seq 1 20); do
            while IFS=$'\t' read -r candidate_run_id candidate_head_sha; do
              if [ -z "$candidate_run_id" ] || [ "$candidate_head_sha" != "${GITHUB_SHA}" ]; then
                continue
              fi

              artifact_json="$source_root/artifacts-$candidate_run_id.json"
              gh api \
                "repos/${GITHUB_REPOSITORY}/actions/runs/$candidate_run_id/artifacts?per_page=100" \
                > "$artifact_json"

              candidate_artifact_count="$(
                jq '[
                  .artifacts[]
                  | select(
                      .name == "trusted-test-observations"
                      and .expired == false
                    )
                ] | length' "$artifact_json"
              )"

              if [ "$candidate_artifact_count" -gt 1 ]; then
                echo "Exact-head CI run supplied multiple trusted-test-observations artifacts; refusing ambiguous provenance."
                exit 1
              fi

              if [ "$candidate_artifact_count" -eq 1 ]; then
                selected_run_id="$candidate_run_id"
                selected_head_sha="$candidate_head_sha"
                selected_artifact_id="$(
                  jq -r '[
                    .artifacts[]
                    | select(
                        .name == "trusted-test-observations"
                        and .expired == false
                      )
                  ][0].id' "$artifact_json"
                )"
                selected_artifact_expires_at="$(
                  jq -r '[
                    .artifacts[]
                    | select(
                        .name == "trusted-test-observations"
                        and .expired == false
                      )
                  ][0].expires_at' "$artifact_json"
                )"
                break
              fi
            done < <(
              gh api --paginate \
                "repos/${GITHUB_REPOSITORY}/actions/workflows/ci.yml/runs?branch=main&event=push&status=completed&per_page=100" \
                --jq '.workflow_runs[] | select(.conclusion == "success") | [.id, .head_sha] | @tsv'
            )

            if [ -n "$selected_run_id" ]; then
              break
            fi

            if [ "$attempt" -lt 20 ]; then
              echo "Waiting for successful exact-head Full CI observation artifact: attempt $attempt/20"
              sleep 15
            fi
          done

          if [ -z "$selected_run_id" ] || [ -z "$selected_artifact_id" ]; then
            echo "No successful exact-head CI run supplied a non-expired trusted-test-observations artifact."
            exit 1
          fi

          gh run download "$selected_run_id" \
            --repo "$GITHUB_REPOSITORY" \
            --name trusted-test-observations \
            --dir "$source_root/download"

          mapfile -t observation_reports < <(
            find "$source_root/download" \
              -type f \
              -name trusted-test-observations.json \
              -print
          )

          if [ "${#observation_reports[@]}" -ne 1 ]; then
            echo "Expected exactly one trusted-test-observations.json payload."
            exit 1
          fi

          observation_report="${observation_reports[0]}"

          OBSERVATION_REPORT="$observation_report" \
          SELECTED_CI_RUN_ID="$selected_run_id" \
          SELECTED_CI_HEAD_SHA="$selected_head_sha" \
          SELECTED_CI_ARTIFACT_ID="$selected_artifact_id" \
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          payload = json.loads(
              Path(os.environ["OBSERVATION_REPORT"]).read_text(
                  encoding="utf-8"
              )
          )

          assert (
              payload["schema_version"]
              == "sdetkit.trusted_test_observation_capture.v1"
          )
          assert payload["status"] == "trusted_main_observations_captured"

          source = payload["source"]
          assert source["workflow"] == "CI"
          assert source["job"] == "Full CI lane"
          assert str(source["run_id"]) == os.environ["SELECTED_CI_RUN_ID"]
          assert source["head_sha"] == os.environ["GITHUB_SHA"]
          assert source["head_sha"] == os.environ["SELECTED_CI_HEAD_SHA"]
          assert source["event_name"] == "push"
          assert source["ref_name"] == "refs/heads/main"
          assert source["trusted_main"] is True
          assert source["input_read_only"] is True
          assert source["commands_executed_by_reader"] is False

          summary = payload["summary"]
          assert summary["observation_count"] >= 1
          assert summary["raw_test_identity_emitted"] is False
          assert summary["flaky_classification_performed"] is False

          observations = payload["observations"]
          assert len(observations) == summary["observation_count"]
          assert all(
              set(item) == {"test_fingerprint", "outcome"}
              for item in observations
          )
          assert all(
              len(item["test_fingerprint"]) == 64
              for item in observations
          )

          boundary = payload["decision_boundary"]
          assert boundary["raw_observation_only"] is True
          for key in (
              "flaky_classification_performed",
              "automatic_quarantine_allowed",
              "automatic_rerun_allowed",
              "current_failure_suppression_allowed",
              "automation_allowed",
              "merge_authorized",
              "semantic_equivalence_proven",
          ):
              assert boundary[key] is False

          print("Trusted exact-head Full CI observation artifact passed.")
          PY

          echo "observation_report=$observation_report" >> "$GITHUB_OUTPUT"
          echo "source_run_id=$selected_run_id" >> "$GITHUB_OUTPUT"
          echo "source_head_sha=$selected_head_sha" >> "$GITHUB_OUTPUT"
          echo "artifact_id=$selected_artifact_id" >> "$GITHUB_OUTPUT"
          echo "artifact_expires_at=$selected_artifact_expires_at" >> "$GITHUB_OUTPUT"

      - name: Select prior trusted main history artifact
        id: prior
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          mkdir -p build/repo-memory-history/prior-download

          prior_run_id=""
          prior_head_sha=""

          while IFS=$'\t' read -r candidate_run_id candidate_head_sha; do
            if [ -z "$candidate_run_id" ] || [ "$candidate_run_id" = "${GITHUB_RUN_ID}" ]; then
              continue
            fi

            if git merge-base --is-ancestor "$candidate_head_sha" "$GITHUB_SHA"; then
              prior_run_id="$candidate_run_id"
              prior_head_sha="$candidate_head_sha"
              break
            fi
          done < <(
            gh api --paginate \
              "repos/${GITHUB_REPOSITORY}/actions/workflows/repo-memory-history.yml/runs?branch=main&event=push&status=completed&per_page=100" \
              --jq '.workflow_runs[] | select(.conclusion == "success") | [.id, .head_sha] | @tsv'
          )

          if [ -z "$prior_run_id" ]; then
            echo "prior_history_jsonl=" >> "$GITHUB_OUTPUT"
            echo "prior_test_observation_history_jsonl=" >> "$GITHUB_OUTPUT"
            echo "prior_diagnostic_signal_snapshot_jsonl=" >> "$GITHUB_OUTPUT"
            echo "prior_run_id=" >> "$GITHUB_OUTPUT"
            echo "prior_head_sha=" >> "$GITHUB_OUTPUT"
            echo "No prior successful trusted-main history artifact found; starting initial history chain."
            exit 0
          fi

          gh run download "$prior_run_id" \
            --repo "$GITHUB_REPOSITORY" \
            --name repo-memory-profile-history \
            --dir build/repo-memory-history/prior-download

          prior_history_jsonl="$(
            find build/repo-memory-history/prior-download \
              -name repo-memory-profile-history.jsonl \
              -print \
              -quit
          )"

          if [ -z "$prior_history_jsonl" ] || [ ! -f "$prior_history_jsonl" ]; then
            echo "Prior trusted-main run was selected but supplied no history JSONL artifact."
            exit 1
          fi

          prior_test_observation_history_jsonl="$(
            find build/repo-memory-history/prior-download               -name trusted-test-observation-history.jsonl               -print               -quit
          )"

          prior_security_disposition_jsonl="$(
            find build/repo-memory-history/prior-download               -name security-reviewed-disposition-history.jsonl               -print               -quit
          )"

          prior_diagnostic_signal_snapshot_jsonl="$(
            find build/repo-memory-history/prior-download \
              -name diagnostic-signal-snapshot-history.jsonl \
              -print \
              -quit
          )"

          if [ -z "$prior_diagnostic_signal_snapshot_jsonl" ]; then
            diagnostic_prior_root="${RUNNER_TEMP}/sdetkit-prior-diagnostic-snapshot-history"
            rm -rf "$diagnostic_prior_root"
            mkdir -p "$diagnostic_prior_root"

            while IFS=$'\t' read -r candidate_run_id candidate_head_sha; do
              if [ -z "$candidate_run_id" ] \
                || [ "$candidate_run_id" = "${GITHUB_RUN_ID}" ] \
                || [ "$candidate_run_id" = "$prior_run_id" ]; then
                continue
              fi
              if ! git merge-base --is-ancestor "$candidate_head_sha" "$GITHUB_SHA"; then
                continue
              fi

              candidate_dir="$diagnostic_prior_root/$candidate_run_id"
              mkdir -p "$candidate_dir"
              if ! gh run download "$candidate_run_id" \
                --repo "$GITHUB_REPOSITORY" \
                --name repo-memory-profile-history \
                --dir "$candidate_dir" >/dev/null 2>&1; then
                continue
              fi

              candidate_jsonl="$(
                find "$candidate_dir" \
                  -name diagnostic-signal-snapshot-history.jsonl \
                  -print \
                  -quit
              )"
              if [ -n "$candidate_jsonl" ] && [ -f "$candidate_jsonl" ]; then
                prior_diagnostic_signal_snapshot_jsonl="$candidate_jsonl"
                break
              fi
            done < <(
              gh api --paginate \
                "repos/${GITHUB_REPOSITORY}/actions/workflows/repo-memory-history.yml/runs?branch=main&event=push&status=completed&per_page=100" \
                --jq '.workflow_runs[] | select(.conclusion == "success") | [.id, .head_sha] | @tsv'
            )
          fi

          echo "prior_history_jsonl=$prior_history_jsonl" >> "$GITHUB_OUTPUT"
          echo "prior_test_observation_history_jsonl=$prior_test_observation_history_jsonl" >> "$GITHUB_OUTPUT"
          echo "prior_security_disposition_jsonl=$prior_security_disposition_jsonl" >> "$GITHUB_OUTPUT"
          echo "prior_diagnostic_signal_snapshot_jsonl=$prior_diagnostic_signal_snapshot_jsonl" >> "$GITHUB_OUTPUT"
          echo "prior_run_id=$prior_run_id" >> "$GITHUB_OUTPUT"
          echo "prior_head_sha=$prior_head_sha" >> "$GITHUB_OUTPUT"

          echo "Selected prior trusted-main history run: $prior_run_id"
          echo "Selected prior trusted-main history head: $prior_head_sha"

      - name: Record trusted main test observation history
        shell: bash
        env:
          OBSERVATION_REPORT: ${{ steps.test-observations.outputs.observation_report }}
          OBSERVATION_SOURCE_RUN_ID: ${{ steps.test-observations.outputs.source_run_id }}
          OBSERVATION_SOURCE_HEAD_SHA: ${{ steps.test-observations.outputs.source_head_sha }}
          PRIOR_TEST_OBSERVATION_HISTORY_JSONL: ${{ steps.prior.outputs.prior_test_observation_history_jsonl }}
        run: |
          set -euo pipefail

          args=(
            --observation-report "$OBSERVATION_REPORT"
            --source-run-id "$OBSERVATION_SOURCE_RUN_ID"
            --source-head-sha "$OBSERVATION_SOURCE_HEAD_SHA"
            --out-dir build/repo-memory-history/test-observation-history
            --format json
          )

          if [ -n "$PRIOR_TEST_OBSERVATION_HISTORY_JSONL" ]; then
            args+=(--prior-history-jsonl "$PRIOR_TEST_OBSERVATION_HISTORY_JSONL")
          fi

          PYTHONPATH=src python -m sdetkit.trusted_test_observation_history \
            "${args[@]}" \
            > build/repo-memory-history/test-observation-history-cli.json

          python - <<'PY'
          import json
          import os
          from pathlib import Path

          root = Path("build/repo-memory-history/test-observation-history")
          summary = json.loads(
              (root / "trusted-test-observation-history-summary.json").read_text(
                  encoding="utf-8"
              )
          )
          records = [
              json.loads(line)
              for line in (
                  root / "trusted-test-observation-history.jsonl"
              ).read_text(encoding="utf-8").splitlines()
              if line.strip()
          ]

          assert (
              summary["schema_version"]
              == "sdetkit.trusted_test_observation_history.v1"
          )
          assert summary["status"] == "history_recorded"
          assert summary["record_count"] == len(records)
          assert summary["record_count"] >= 1
          assert summary["source_run_ids"][-1] == os.environ[
              "OBSERVATION_SOURCE_RUN_ID"
          ]
          assert summary["source_head_shas"][-1] == os.environ["GITHUB_SHA"]
          assert summary["source_head_shas"][-1] == os.environ[
              "OBSERVATION_SOURCE_HEAD_SHA"
          ]
          assert summary["raw_test_identity_emitted"] is False
          assert summary["flaky_classification_performed"] is False
          assert summary["current_pr_decision_input"] is False
          assert summary["prior_history_collected"] is bool(
              os.environ["PRIOR_TEST_OBSERVATION_HISTORY_JSONL"]
          )

          latest = records[-1]
          assert (
              latest["schema_version"]
              == "sdetkit.trusted_test_observation_history.record.v1"
          )
          assert latest["source_run_id"] == os.environ[
              "OBSERVATION_SOURCE_RUN_ID"
          ]
          assert latest["source_head_sha"] == os.environ["GITHUB_SHA"]
          assert latest["source_workflow"] == "CI"
          assert latest["source_job"] == "Full CI lane"
          assert latest["event_name"] == "push"
          assert latest["ref_name"] == "refs/heads/main"

          boundary = summary["decision_boundary"]
          assert boundary["raw_observation_only"] is True
          assert boundary["flaky_classification_performed"] is False
          assert boundary["current_pr_decision_input"] is False
          assert boundary["automatic_quarantine_allowed"] is False
          assert boundary["automatic_rerun_allowed"] is False
          assert boundary["current_failure_suppression_allowed"] is False
          assert boundary["automation_allowed"] is False
          assert boundary["patch_application_allowed"] is False
          assert boundary["merge_authorized"] is False
          assert boundary["semantic_equivalence_proven"] is False

          serialized = json.dumps(
              {"summary": summary, "records": records},
              sort_keys=True,
          )
          assert '"test_id"' not in serialized
          assert '"classname"' not in serialized
          assert '"nodeid"' not in serialized
          assert '"classification"' not in serialized

          print("Trusted-main test observation history handoff passed.")
          PY

      - name: Classify trusted main test observation history
        shell: bash
        env:
          OBSERVATION_SOURCE_RUN_ID: ${{ steps.test-observations.outputs.source_run_id }}
          OBSERVATION_SOURCE_HEAD_SHA: ${{ steps.test-observations.outputs.source_head_sha }}
        run: |
          set -euo pipefail

          mkdir -p build/repo-memory-history/test-observation-classification

          PYTHONPATH=src python -m sdetkit.trusted_test_observation_classification \
            --history-jsonl build/repo-memory-history/test-observation-history/trusted-test-observation-history.jsonl \
            --out-dir build/repo-memory-history/test-observation-classification \
            --format json \
            > build/repo-memory-history/test-observation-classification-cli.json

          python - <<'PY'
          import json
          import os
          from pathlib import Path

          root = Path("build/repo-memory-history/test-observation-classification")
          report = json.loads(
              (root / "trusted-test-observation-classification.json").read_text(
                  encoding="utf-8"
              )
          )

          assert (
              report["schema_version"]
              == "sdetkit.trusted_test_observation_classification.v1"
          )
          assert report["status"] == "advisory_classification_recorded"

          source = report["source"]
          assert source["record_count"] >= 1
          assert source["source_run_ids"][-1] == os.environ[
              "OBSERVATION_SOURCE_RUN_ID"
          ]
          assert source["source_head_shas"][-1] == os.environ["GITHUB_SHA"]
          assert source["source_head_shas"][-1] == os.environ[
              "OBSERVATION_SOURCE_HEAD_SHA"
          ]
          assert source["input_read_only"] is True
          assert source["commands_executed_by_reader"] is False
          assert source["per_observation_provenance_bound"] is True

          summary = report["summary"]
          assert summary["fingerprint_count"] >= 1
          assert summary["fingerprint_count"] == sum(
              summary[key]
              for key in (
                  "flaky",
                  "stable_failing",
                  "stable_passing",
                  "insufficient_history",
              )
          )
          assert summary["classification_performed"] is True
          assert summary["raw_test_identity_emitted"] is False
          assert summary["current_pr_decision_input"] is False

          boundary = report["decision_boundary"]
          assert boundary["advisory_only"] is True
          assert boundary["raw_test_identity_emitted"] is False
          assert boundary["current_pr_decision_input"] is False
          assert boundary["automatic_quarantine_allowed"] is False
          assert boundary["automatic_rerun_allowed"] is False
          assert boundary["current_failure_suppression_allowed"] is False
          assert boundary["automation_allowed"] is False
          assert boundary["patch_application_allowed"] is False
          assert boundary["merge_authorized"] is False
          assert boundary["semantic_equivalence_proven"] is False

          serialized = json.dumps(report, sort_keys=True)
          assert '"test_id"' not in serialized
          assert '"classname"' not in serialized
          assert '"nodeid"' not in serialized

          print("Trusted-main cumulative observation classification passed.")
          PY

      - name: Build trusted-main live RepoMemory profile
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p \
            build/repo-memory-history/fixture-report \
            build/repo-memory-history/live-report \
            build/repo-memory-history/pattern-insights \
            build/repo-memory-history/flaky-test-registry \
            build/repo-memory-history/test-observation-classification \
            build/repo-memory-history/candidate-validation \
            build/repo-memory-history/profile

          live_root="${RUNNER_TEMP}/sdetkit-repo-memory-history-live-repositories"
          rm -rf "$live_root"

          PYTHONPATH=src python -m sdetkit.pr_quality_live_benchmark_workspace \
            --out-dir "$live_root" \
            --format json \
            > build/repo-memory-history/live-workspace-cli.json

          PYTHONPATH=src python -m sdetkit.replayable_benchmark_harness \
            --scenario tests/fixtures/remediation_benchmark/nop_formatting_patch.json \
            --scenario tests/fixtures/remediation_benchmark/oracle_formatting_patch.json \
            --scenario tests/fixtures/remediation_benchmark/unsafe_protected_path_patch.json \
            --out-dir build/repo-memory-history/fixture-report \
            --format json \
            > build/repo-memory-history/fixture-report-cli.json

          mapfile -t live_args < <(
            LIVE_ROOT="$live_root" python - <<'PY'
          import json
          import os
          from pathlib import Path

          manifest = json.loads(
              (Path(os.environ["LIVE_ROOT"]) / "workspace-manifest.json").read_text(
                  encoding="utf-8"
              )
          )
          for item in manifest["scenarios"]:
              print("--isolated-scenario")
              print(item["fixture_path"])
              print("--isolated-repo-root")
              print(item["repo_root"])
          PY
          )

          PYTHONPATH=src python -m sdetkit.replayable_benchmark_harness \
            "${live_args[@]}" \
            --out-dir build/repo-memory-history/live-report \
            --format json \
            > build/repo-memory-history/live-report-cli.json

          python - <<'PY'
          import json
          from pathlib import Path

          payload = {
              "schema_version": "sdetkit.trajectory_pattern_insights.v1",
              "record_count": 0,
              "recurring_safe_fix_patterns": [],
              "recurring_review_first_surfaces": [],
              "source": "trusted_main_snapshot",
          }
          Path("build/repo-memory-history/pattern-insights/pattern-insights.json").write_text(
              json.dumps(payload, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY

          PYTHONPATH=src python -m sdetkit.pr_quality_candidate_validation \
            --scenario tests/fixtures/pr_quality_candidate_visibility/formatting_candidate_verified.json \
            --scenario tests/fixtures/pr_quality_candidate_visibility/broader_diff_review_first.json \
            --out-dir build/repo-memory-history/candidate-validation \
            --format json \
            > build/repo-memory-history/candidate-validation-cli.json

          PYTHONPATH=src python -m sdetkit.trusted_flaky_test_registry_producer \
            --source-run-id "${GITHUB_RUN_ID}" \
            --source-head-sha "${GITHUB_SHA}" \
            --classification-report build/repo-memory-history/test-observation-classification/trusted-test-observation-classification.json \
            --out-dir build/repo-memory-history/flaky-test-registry \
            --format json \
            > build/repo-memory-history/flaky-test-registry-cli.json

          PYTHONPATH=src python -m sdetkit.repo_memory \
            --pattern-insights build/repo-memory-history/pattern-insights/pattern-insights.json \
            --benchmark-report build/repo-memory-history/fixture-report/benchmark-report.json \
            --live-benchmark-report build/repo-memory-history/live-report/benchmark-report.json \
            --flaky-test-registry-evidence build/repo-memory-history/flaky-test-registry/flaky-test-registry-evidence.json \
            --controlled-candidate-validation-evidence build/repo-memory-history/candidate-validation/candidate-validation.json \
            --out-dir build/repo-memory-history/profile \
            --format json \
            > build/repo-memory-history/profile-cli.json

          python - <<'PY'
          import json
          import os
          from pathlib import Path

          profile = json.loads(
              Path("build/repo-memory-history/profile/repo-memory-profile.json").read_text(
                  encoding="utf-8"
              )
          )
          classification = json.loads(
              Path(
                  "build/repo-memory-history/test-observation-classification/"
                  "trusted-test-observation-classification.json"
              ).read_text(encoding="utf-8")
          )
          producer = json.loads(
              Path(
                  "build/repo-memory-history/flaky-test-registry/"
                  "trusted-flaky-test-registry-producer.json"
              ).read_text(encoding="utf-8")
          )

          assert profile["profile_status"] == "live_proof_supported_memory"
          assert profile["inputs"]["live_contract_proven"] is True
          assert profile["proof_provenance"]["git_verified_scenario_count"] == 5
          assert profile["proof_provenance"]["expected_failed_scenario_count"] == 5
          assert profile["proof_provenance"]["network_boundary_blocked_scenario_count"] == 1
          assert profile["proof_provenance"]["anti_cheat_rejection_scenario_count"] == 2

          controlled = profile["controlled_candidate_validation"]
          assert controlled["collection_status"] == "collected"
          assert controlled["status"] == "controlled_validation_passed"
          assert controlled["scenario_count"] == 2
          assert controlled["passed_count"] == 2
          assert controlled["current_pr_decision_input"] is False
          assert controlled["decision_boundary"]["automation_allowed"] is False
          assert controlled["decision_boundary"]["merge_authorized"] is False

          classification_source = classification["source"]
          classification_summary = classification["summary"]
          handoff = producer["classification_handoff"]

          assert classification["status"] == "advisory_classification_recorded"
          assert classification_source["record_count"] >= 1
          assert classification_source["source_head_shas"][-1] == os.environ["GITHUB_SHA"]
          assert classification_source["input_read_only"] is True
          assert classification_source["commands_executed_by_reader"] is False
          assert classification_source["per_observation_provenance_bound"] is True
          assert classification_summary["classification_performed"] is True
          assert classification_summary["raw_test_identity_emitted"] is False
          assert classification_summary["current_pr_decision_input"] is False

          flaky = profile["flaky_test_registry"]
          assert flaky["collection_status"] == "collected"
          assert flaky["entry_count"] == classification_summary["flaky"]
          assert flaky["source"]["kind"] == "trusted_main_artifact"
          assert flaky["source"]["workflow"] == "RepoMemory Profile History"
          assert flaky["source"]["identity_kind"] == "fingerprint_only"
          assert handoff["forwarded_to_registry"] is True
          assert handoff["latest_source_head_sha"] == os.environ["GITHUB_SHA"]
          assert handoff["flaky"] == classification_summary["flaky"]

          producer_status = "_".join(
              ("producer", "vetted", "flaky", "observations", "available")
          )
          if classification_summary["flaky"]:
              assert (
                  flaky["source"]["observation_status"]
                  == producer_status
              )
              assert flaky["source"]["observations_collected"] is True
          else:
              assert (
                  flaky["source"]["observation_status"]
                  == "no_test_observations_available"
              )
              assert flaky["source"]["observations_collected"] is False

          assert all("test_id" not in item for item in flaky["entries"])
          assert all("classname" not in item for item in flaky["entries"])
          assert all("nodeid" not in item for item in flaky["entries"])
          assert flaky["decision_boundary"]["automatic_quarantine_allowed"] is False
          assert flaky["decision_boundary"]["automatic_rerun_allowed"] is False
          assert flaky["decision_boundary"]["current_failure_suppression_allowed"] is False
          assert flaky["decision_boundary"]["automation_allowed"] is False
          assert flaky["decision_boundary"]["merge_authorized"] is False

          boundary = profile["decision_boundary"]
          assert boundary["automation_allowed"] is False
          assert boundary["merge_authorized"] is False
          assert boundary["semantic_equivalence_proven"] is False

          print("Trusted-main RepoMemory live profile passed.")
          PY

      - name: Record trusted main RepoMemory profile history
        shell: bash
        env:
          PRIOR_HISTORY_JSONL: ${{ steps.prior.outputs.prior_history_jsonl }}
        run: |
          set -euo pipefail

          args=(
            --profile-json build/repo-memory-history/profile/repo-memory-profile.json
            --source-run-id "${GITHUB_RUN_ID}"
            --source-head-sha "${GITHUB_SHA}"
            --out-dir build/repo-memory-history/output
            --format json
          )

          if [ -n "$PRIOR_HISTORY_JSONL" ]; then
            args+=(--prior-history-jsonl "$PRIOR_HISTORY_JSONL")
          fi

          PYTHONPATH=src python -m sdetkit.repo_memory_profile_history \
            "${args[@]}" \
            > build/repo-memory-history/history-cli.json

          python - <<'PY'
          import json
          import os
          from pathlib import Path

          summary = json.loads(
              Path(
                  "build/repo-memory-history/output/repo-memory-history-summary.json"
              ).read_text(encoding="utf-8")
          )

          assert summary["status"] == "history_recorded"
          assert summary["record_count"] >= 1
          assert summary["live_contract_proven_record_count"] >= 1
          assert summary["latest_record"]["source_run_id"] == os.environ["GITHUB_RUN_ID"]
          assert summary["latest_record"]["source_head_sha"] == os.environ["GITHUB_SHA"]
          assert summary["latest_record"]["profile_status"] == "live_proof_supported_memory"
          assert summary["latest_record"]["live_contract_proven"] is True
          assert summary["controlled_validation_record_count"] >= 1
          assert summary["controlled_validation_scenario_count"] >= 2
          assert summary["controlled_structurally_verified_count"] >= 1
          assert summary["controlled_review_first_count"] >= 1
          assert summary["latest_record"]["controlled_validation_status"] == "controlled_validation_passed"
          assert summary["latest_record"]["controlled_current_pr_decision_input"] is False

          boundary = summary["decision_boundary"]
          assert boundary["automation_allowed"] is False
          assert boundary["merge_authorized"] is False
          assert boundary["semantic_equivalence_proven"] is False
          assert boundary["prior_history_is_read_only_input"] is True
          assert boundary["controlled_validation_is_advisory_only"] is True

          print("Trusted-main RepoMemory history snapshot passed.")
          PY

      - name: Collect accepted-main observation recovery queue
        id: accepted-main-sources
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          sources_root="build/repo-memory-history/accepted-main-sources"
          mkdir -p "$sources_root"
          : > "$sources_root/queue.tsv"
          : > "$sources_root/recovery-events.tsv"

          gh api --paginate \
            "repos/${REPOSITORY}/actions/workflows/pr-quality-comment.yml/runs?event=pull_request&status=completed&per_page=100" \
            --jq '.workflow_runs[] | select(.conclusion == "success") | [.id, .head_sha, (.pull_requests | map(.number | tostring) | join(","))] | @tsv' \
            > "$sources_root/successful-pr-quality-runs.tsv"

          collect_source() {
            local accepted_main_sha="$1"
            local source_kind="$2"
            local originating_retention_run_id="$3"
            local source_dir="$sources_root/$accepted_main_sha"

            mkdir -p "$source_dir/download" "$source_dir/security-reviewed-dispositions"

            gh api \
              -H "Accept: application/vnd.github+json" \
              "repos/$REPOSITORY/commits/$accepted_main_sha/pulls?per_page=10" \
              > "$source_dir/associated-merged-pr.json"

            local source_match_count
            source_match_count="$(
              jq -er --arg sha "$accepted_main_sha" \
                '[.[] | select(.merged_at and .merge_commit_sha == $sha)] | length' \
                "$source_dir/associated-merged-pr.json"
            )"

            if [ "$source_match_count" -gt 1 ]; then
              echo "Accepted-main commit maps to multiple merged PRs; refusing ambiguous snapshot provenance."
              exit 1
            fi
            if [ "$source_match_count" -eq 0 ]; then
              if [ "$source_kind" = "current_head" ]; then
                echo "No merged PR maps to accepted-main head; no diagnostic snapshot observation will be appended."
              else
                echo "Skipping failed ancestor $accepted_main_sha because it is not a merged-PR accepted-main commit."
              fi
              return 0
            fi

            local source_pr_number source_head_sha
            source_pr_number="$(
              jq -er --arg sha "$accepted_main_sha" \
                '[.[] | select(.merged_at and .merge_commit_sha == $sha)][0].number' \
                "$source_dir/associated-merged-pr.json"
            )"
            source_head_sha="$(
              jq -er --arg sha "$accepted_main_sha" \
                '[.[] | select(.merged_at and .merge_commit_sha == $sha)][0].head.sha' \
                "$source_dir/associated-merged-pr.json"
            )"

            validate_candidate_artifact() {
              local candidate_run_id="$1"
              local candidate_dir="$source_dir/candidates/$candidate_run_id"
              local candidate_snapshot candidate_diagnostic_job

              rm -rf "$candidate_dir"
              mkdir -p "$candidate_dir"

              if ! gh run download "$candidate_run_id" \
                --repo "$REPOSITORY" \
                --name pr-quality-comment \
                --dir "$candidate_dir" >/dev/null 2>&1; then
                return 1
              fi

              candidate_snapshot="$(
                find "$candidate_dir" \
                  -name diagnostic-signal-snapshot.json \
                  -print \
                  -quit
              )"
              candidate_diagnostic_job="$(
                find "$candidate_dir" \
                  -name diagnostic-job.json \
                  -print \
                  -quit
              )"

              if [ -z "$candidate_snapshot" ] || [ ! -f "$candidate_snapshot" ]; then
                return 1
              fi
              if [ -z "$candidate_diagnostic_job" ] || [ ! -f "$candidate_diagnostic_job" ]; then
                return 1
              fi

              CANDIDATE_DIAGNOSTIC_JOB="$candidate_diagnostic_job" \
              SOURCE_PR_NUMBER="$source_pr_number" SOURCE_HEAD_SHA="$source_head_sha" \
              REPOSITORY="$REPOSITORY" python - <<'PY'
          import json
          import os
          from pathlib import Path

          payload = json.loads(Path(os.environ["CANDIDATE_DIAGNOSTIC_JOB"]).read_text(encoding="utf-8"))
          event = payload.get("event") if isinstance(payload, dict) else {}
          if not isinstance(event, dict):
              raise SystemExit(1)
          expected = {
              "event_name": "pull_request",
              "pr_number": int(os.environ["SOURCE_PR_NUMBER"]),
              "head_sha": os.environ["SOURCE_HEAD_SHA"],
              "repo": os.environ["REPOSITORY"],
          }
          observed = {
              "event_name": event.get("event_name"),
              "pr_number": int(event.get("pr_number") or 0),
              "head_sha": str(event.get("head_sha") or ""),
              "repo": str(event.get("repo") or ""),
          }
          if observed != expected:
              raise SystemExit(1)
          PY

              cp "$candidate_snapshot" "$source_dir/diagnostic-signal-snapshot.json"
              cp "$candidate_diagnostic_job" "$source_dir/source-diagnostic-job.json"
              return 0
            }

            local -a bound_source_run_ids=()
            local -a fallback_source_run_ids=()
            local contradictory_pr_metadata_seen=false

            while IFS=$'\t' read -r candidate_run_id candidate_head_sha candidate_pr_numbers; do
              if [ "$candidate_head_sha" != "$source_head_sha" ]; then
                continue
              fi
              if [ -z "$candidate_pr_numbers" ]; then
                fallback_source_run_ids+=("$candidate_run_id")
                continue
              fi
              case ",${candidate_pr_numbers}," in
                *,"${source_pr_number}",*)
                  bound_source_run_ids+=("$candidate_run_id")
                  ;;
                *)
                  contradictory_pr_metadata_seen=true
                  ;;
              esac
            done < "$sources_root/successful-pr-quality-runs.tsv"

            local source_run_id=""
            local source_binding=""

            for candidate_run_id in "${bound_source_run_ids[@]}"; do
              if validate_candidate_artifact "$candidate_run_id"; then
                source_run_id="$candidate_run_id"
                source_binding="pr_number_metadata_and_artifact"
                break
              fi
            done

            if [ -z "$source_run_id" ]; then
              for candidate_run_id in "${fallback_source_run_ids[@]}"; do
                if validate_candidate_artifact "$candidate_run_id"; then
                  source_run_id="$candidate_run_id"
                  source_binding="verified_merged_pr_exact_head_artifact_fallback"
                  break
                fi
              done
            fi

            if [ -z "$source_run_id" ]; then
              if [ "$source_kind" = "current_head" ]; then
                if [ "$contradictory_pr_metadata_seen" = true ]; then
                  echo "No PR Quality artifact proved verified merged PR #$source_pr_number at $source_head_sha; contradictory run metadata was present."
                else
                  echo "No successful PR Quality artifact proved merged PR #$source_pr_number at $source_head_sha."
                fi
                exit 1
              fi
              echo "Failed ancestor $accepted_main_sha supplied no artifact-bound PR Quality source; skipping."
              return 0
            fi

            gh api --paginate \
              -H "Accept: application/vnd.github+json" \
              "repos/$REPOSITORY/pulls/$source_pr_number/files?per_page=100" \
              --jq '.[]' \
              | jq -s '.' > "$source_dir/security-reviewed-dispositions/changed-files.json"

            local collection_status="collected"
            local collection_reason=""
            if ! gh api --paginate \
              -H "Accept: application/vnd.github+json" \
              "repos/$REPOSITORY/code-scanning/alerts?state=dismissed&pr=$source_pr_number&per_page=100" \
              --jq '.[]' \
              | jq -s '.' > "$source_dir/security-reviewed-dispositions/dismissed-alerts-raw.json"; then
              collection_status="unavailable"
              collection_reason="GitHub code-scanning dismissed-alert evidence was unavailable or not permitted."
              printf '[]\n' > "$source_dir/security-reviewed-dispositions/dismissed-alerts-raw.json"
            fi

            COLLECTION_STATUS="$collection_status" COLLECTION_REASON="$collection_reason" \
            SOURCE_DIR="$source_dir" python - <<'PY'
          import json
          import os
          from pathlib import Path

          source_dir = Path(os.environ["SOURCE_DIR"])
          raw_path = source_dir / "security-reviewed-dispositions" / "dismissed-alerts-raw.json"
          alerts = json.loads(raw_path.read_text(encoding="utf-8"))
          if not isinstance(alerts, list):
              raise SystemExit("dismissed-alert API response must be a list")
          payload = {
              "collection_status": os.environ["COLLECTION_STATUS"],
              "collection_reason": os.environ["COLLECTION_REASON"],
              "alerts": alerts,
          }
          (source_dir / "security-reviewed-dispositions" / "dismissed-alerts.json").write_text(
              json.dumps(payload, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY

            printf '%s\t%s\t%s\t%s\t%s\t%s\t%s\n' \
              "$accepted_main_sha" \
              "$source_pr_number" \
              "$source_head_sha" \
              "$source_run_id" \
              "$source_binding" \
              "$source_kind" \
              "$originating_retention_run_id" \
              >> "$sources_root/queue.tsv"

            printf '%s\t%s\t%s\t%s\t%s\n' \
              "$accepted_main_sha" "$source_pr_number" "$source_head_sha" "$source_binding" "$source_kind" \
              >> "$sources_root/recovery-events.tsv"

            echo "Collected accepted-main source: sha=$accepted_main_sha pr=$source_pr_number binding=$source_binding kind=$source_kind"
          }

          gh api --paginate \
            "repos/${REPOSITORY}/actions/workflows/repo-memory-history.yml/runs?branch=main&event=push&status=completed&per_page=100" \
            --jq '.workflow_runs[] | select(.conclusion == "failure") | [.id, .head_sha] | @tsv' \
            > "$sources_root/failed-main-runs-newest-first.tsv"

          tac "$sources_root/failed-main-runs-newest-first.tsv" \
            > "$sources_root/failed-main-runs-oldest-first.tsv"

          while IFS=$'\t' read -r failed_run_id failed_head_sha; do
            if [ -z "$failed_run_id" ] || [ "$failed_head_sha" = "${GITHUB_SHA}" ]; then
              continue
            fi
            if git merge-base --is-ancestor "$failed_head_sha" "${GITHUB_SHA}"; then
              collect_source "$failed_head_sha" "recovered_failed_ancestor" "$failed_run_id"
            fi
          done < "$sources_root/failed-main-runs-oldest-first.tsv"

          collect_source "${GITHUB_SHA}" "current_head" "${GITHUB_RUN_ID}"

          if [ -s "$sources_root/queue.tsv" ]; then
            echo "source_available=true" >> "$GITHUB_OUTPUT"
          else
            echo "source_available=false" >> "$GITHUB_OUTPUT"
          fi
          echo "sources_tsv=$sources_root/queue.tsv" >> "$GITHUB_OUTPUT"

      - name: Record trusted accepted-main diagnostic signal snapshot history
        if: steps.accepted-main-sources.outputs.source_available == 'true'
        shell: bash
        env:
          PRIOR_DIAGNOSTIC_SIGNAL_SNAPSHOT_JSONL: ${{ steps.prior.outputs.prior_diagnostic_signal_snapshot_jsonl }}
        run: |
          set -euo pipefail

          sources_root="build/repo-memory-history/accepted-main-sources"
          queue="$sources_root/queue.tsv"
          iterations_root="build/repo-memory-history/diagnostic-signal-snapshots/iterations"
          final_output="build/repo-memory-history/diagnostic-signal-snapshots/output"
          mkdir -p "$iterations_root"
          history_input="$PRIOR_DIAGNOSTIC_SIGNAL_SNAPSHOT_JSONL"
          index=0

          while IFS=$'\t' read -r accepted_main_sha source_pr_number source_head_sha source_run_id source_binding source_kind originating_retention_run_id; do
            index=$((index + 1))
            source_dir="$sources_root/$accepted_main_sha"
            out_dir="$iterations_root/$index"
            mkdir -p "$out_dir"

            args=(
              --diagnostic-signal-snapshot "$source_dir/diagnostic-signal-snapshot.json"
              --associated-pr-json "$source_dir/associated-merged-pr.json"
              --source-run-id "$source_run_id"
              --source-run-conclusion success
              --source-head-sha "$source_head_sha"
              --retention-run-id "${GITHUB_RUN_ID}:$accepted_main_sha"
              --accepted-main-sha "$accepted_main_sha"
              --out-dir "$out_dir"
              --format json
            )
            if [ -n "$history_input" ]; then
              args+=(--prior-history-jsonl "$history_input")
            fi

            PYTHONPATH=src python -m sdetkit.diagnostic_signal_snapshot_history \
              "${args[@]}" \
              > "$out_dir/history-cli.json"

            history_input="$out_dir/diagnostic-signal-snapshot-history.jsonl"
            rm -rf "$final_output"
            mkdir -p "$final_output"
            cp -R "$out_dir/." "$final_output/"
          done < "$queue"

          QUEUE="$queue" GITHUB_SHA="${GITHUB_SHA}" python - <<'PYCODE'
          import json
          import os
          from pathlib import Path

          queue_rows = [
              line.split("\t")
              for line in Path(os.environ["QUEUE"]).read_text(encoding="utf-8").splitlines()
              if line.strip()
          ]
          summary = json.loads(
              Path(
                  "build/repo-memory-history/diagnostic-signal-snapshots/output/"
                  "diagnostic-signal-snapshot-history-summary.json"
              ).read_text(encoding="utf-8")
          )
          records = [
              json.loads(line)
              for line in Path(
                  "build/repo-memory-history/diagnostic-signal-snapshots/output/"
                  "diagnostic-signal-snapshot-history.jsonl"
              ).read_text(encoding="utf-8").splitlines()
              if line.strip()
          ]
          retained_shas = {record["source"]["accepted_main_sha"] for record in records}
          expected_shas = {row[0] for row in queue_rows}

          assert summary["status"] == "diagnostic_signal_snapshot_history_recorded"
          assert expected_shas.issubset(retained_shas)
          assert summary["advisor_false_positive_rate_status"] == "requires_reviewed_history"
          assert summary["reviewed_false_positive_count"] is None
          assert summary["reviewed_observation_count"] is None

          current_rows = [row for row in queue_rows if row[5] == "current_head"]
          if current_rows:
              assert summary["latest_record"]["accepted_main_sha"] == os.environ["GITHUB_SHA"]

          boundary = summary["decision_boundary"]
          assert boundary["current_pr_decision_input"] is False
          assert boundary["feeds_repo_memory"] is False
          assert boundary["patch_application_allowed"] is False
          assert boundary["automation_allowed"] is False
          assert boundary["merge_authorized"] is False
          assert boundary["semantic_equivalence_proven"] is False
          assert boundary["historical_snapshot_authorizes_current_action"] is False
          print("Trusted accepted-main diagnostic signal snapshot history recovery queue passed.")
          PYCODE

      - name: Record trusted accepted-main reviewed security disposition history
        if: steps.accepted-main-sources.outputs.source_available == 'true'
        shell: bash
        env:
          PRIOR_SECURITY_DISPOSITION_JSONL: ${{ steps.prior.outputs.prior_security_disposition_jsonl }}
        run: |
          set -euo pipefail

          sources_root="build/repo-memory-history/accepted-main-sources"
          queue="$sources_root/queue.tsv"
          iterations_root="build/repo-memory-history/security-reviewed-dispositions/iterations"
          final_output="build/repo-memory-history/security-reviewed-dispositions/output"
          mkdir -p "$iterations_root"
          history_input="$PRIOR_SECURITY_DISPOSITION_JSONL"
          index=0

          while IFS=$'\t' read -r accepted_main_sha source_pr_number source_head_sha source_run_id source_binding source_kind originating_retention_run_id; do
            index=$((index + 1))
            source_dir="$sources_root/$accepted_main_sha"
            out_dir="$iterations_root/$index"
            mkdir -p "$out_dir"

            args=(
              --associated-pr-json "$source_dir/associated-merged-pr.json"
              --changed-files-json "$source_dir/security-reviewed-dispositions/changed-files.json"
              --dismissed-alerts-json "$source_dir/security-reviewed-dispositions/dismissed-alerts.json"
              --source-run-id "accepted-main:$accepted_main_sha"
              --source-head-sha "$accepted_main_sha"
              --out-dir "$out_dir"
              --format json
            )
            if [ -n "$history_input" ]; then
              args+=(--prior-history-jsonl "$history_input")
            fi

            PYTHONPATH=src python -m sdetkit.security_reviewed_disposition_history \
              "${args[@]}" \
              > "$out_dir/history-cli.json"

            history_input="$out_dir/security-reviewed-disposition-history.jsonl"
            rm -rf "$final_output"
            mkdir -p "$final_output"
            cp -R "$out_dir/." "$final_output/"
          done < "$queue"

          QUEUE="$queue" GITHUB_SHA="${GITHUB_SHA}" python - <<'PY'
          import json
          import os
          from pathlib import Path

          queue_rows = [
              line.split("\t")
              for line in Path(os.environ["QUEUE"]).read_text(encoding="utf-8").splitlines()
              if line.strip()
          ]
          summary = json.loads(
              Path(
                  "build/repo-memory-history/security-reviewed-dispositions/output/"
                  "security-reviewed-disposition-history-summary.json"
              ).read_text(encoding="utf-8")
          )
          records = [
              json.loads(line)
              for line in Path(
                  "build/repo-memory-history/security-reviewed-dispositions/output/"
                  "security-reviewed-disposition-history.jsonl"
              ).read_text(encoding="utf-8").splitlines()
              if line.strip()
          ]
          retained_shas = {record["source"]["source_head_sha"] for record in records}
          expected_shas = {row[0] for row in queue_rows}

          assert summary["status"] == "reviewed_disposition_history_recorded"
          assert expected_shas.issubset(retained_shas)

          current_rows = [row for row in queue_rows if row[5] == "current_head"]
          if current_rows:
              assert summary["latest_record"]["source_head_sha"] == os.environ["GITHUB_SHA"]
              assert summary["latest_record"]["pr_scope_verification"] == "changed_paths_proven"

          boundary = summary["decision_boundary"]
          assert boundary["historical_disposition_authorizes_current_action"] is False
          assert boundary["automatic_security_fix_allowed"] is False
          assert boundary["automatic_dismissal_allowed"] is False
          assert boundary["automation_allowed"] is False
          assert boundary["merge_authorized"] is False
          assert boundary["prior_history_is_read_only_input"] is True
          print("Trusted accepted-main security disposition recovery queue passed.")
          PY

      - name: Upload trusted main RepoMemory history artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: repo-memory-profile-history
          path: |
            build/repo-memory-history/output/
            build/repo-memory-history/profile/
            build/repo-memory-history/live-report/
            build/repo-memory-history/fixture-report/
            build/repo-memory-history/pattern-insights/
            build/repo-memory-history/flaky-test-registry/
            build/repo-memory-history/candidate-validation/
            build/repo-memory-history/test-observation-history/
            build/repo-memory-history/test-observation-classification/
            build/repo-memory-history/diagnostic-signal-snapshots/
            build/repo-memory-history/security-reviewed-dispositions/
          if-no-files-found: error
          retention-days: 90
